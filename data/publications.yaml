  title: Database of Candidate Targets for the LIFE Mission
  venue_md: '*Research Notes of the AAS* 8, 267 (2024)'
  primary_url: https://scixplorer.org/abs/2024RNAAS...8..267M/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2515-5172/ad887e/ampdf
    scix: https://scixplorer.org/abs/2024RNAAS...8..267M/abstract
    doi: https://doi.org/10.3847/2515-5172/ad887e
  bibcode: 2024RNAAS...8..267M
  lab_led: false
  abstract: We present the database of potential targets for the Large Interferometer For Exoplanets (LIFE), a space-based
    mid-infrared nulling interferometer mission proposed for the Voyage 2050 science program of the European Space Agency.
    The database features stars, their planets and disks, main astrophysical parameters, and ancillary observations. It allows
    users to create target lists based on various criteria to predict, for instance, exoplanet detection yields for the LIFE
    mission. As such, it enables mission design trade-offs, provides context for the analysis of data obtained by LIFE, and
    flags critical missing data. Work on the database is in progress, but given its relevance to LIFE and other space missions,
    including the Habitable Worlds Observatory, we present its main features here. A preliminary version of the LIFE database
    is publicly available on the German Astrophysical Virtual Observatory.
  lay_summary: The LIFE space mission aims to study the atmospheres of nearby exoplanets in the mid-infrared. This paper presents
    a curated database of candidate target stars, their known planets, and circumstellar disks, providing the observational
    foundation for mission planning and target selection.
