- slug: tinetti-2021-ariel
  section: perspectives
  subsection: null
  year: 2021
  authors_md: Tinetti G et al. (incl. **T Lichtenberg**)
  title: 'Ariel: Enabling planetary science across light-years'
  venue_md: ESA Ariel Definition Study Report (2021)
  primary_url: https://scixplorer.org/abs/2021arXiv210404824T/abstract
  links:
    pdf: https://arxiv.org/pdf/2104.04824
    scix: https://scixplorer.org/abs/2021arXiv210404824T/abstract
    doi: https://doi.org/10.5194/epsc2022-1114
  bibcode: 2021arXiv210404824T
  lab_led: false
  abstract: Ariel, the Atmospheric Remote-sensing Infrared Exoplanet Large-survey, was adopted as the fourth medium-class
    mission in ESA's Cosmic Vision programme to be launched in 2029. During its 4-year mission, Ariel will study what exoplanets
    are made of, how they formed and how they evolve, by surveying a diverse sample of about 1000 extrasolar planets, simultaneously
    in visible and infrared wavelengths. It is the first mission dedicated to measuring the chemical composition and thermal
    structures of hundreds of transiting exoplanets, enabling planetary science far beyond the boundaries of the Solar System.
    The payload consists of an off-axis Cassegrain telescope (primary mirror 1100 mm x 730 mm ellipse) and two separate instruments
    (FGS and AIRS) covering simultaneously 0.5-7.8 micron spectral range. The satellite is best placed into an L2 orbit to
    maximise the thermal stability and the field of regard. The payload module is passively cooled via a series of V-Groove
    radiators; the detectors for the AIRS are the only items that require active cooling via an active Ne JT cooler. The Ariel
    payload is developed by a consortium of more than 50 institutes from 16 ESA countries, which include the UK, France, Italy,
    Belgium, Poland, Spain, Austria, Denmark, Ireland, Portugal, Czech Republic, Hungary, the Netherlands, Sweden, Norway,
    Estonia, and a NASA contribution. This presentation provides an overall summary of the science and instrument design for
    Ariel and presents the many activities that the Ariel team have planned to engage the science community at large and the
    public prior to launch. These include the Ariel Dry-Run program and citizen-science programs such as ExoClock and the
    Ariel Data Challenges.
  lay_summary: Ariel is an ESA medium-class space mission launching in 2029 to survey the atmospheres of roughly 1000 exoplanets
    from gas giants to rocky worlds. By measuring atmospheric compositions across a diverse sample, Ariel will reveal how
    exoplanets form, evolve, and whether their chemistries relate to their host star environments.
  lay_summary_draft: null
