  title: The Importance of Thermal Emission Spectroscopy for Understanding Terrestrial Exoplanets
  venue_md: '*Astro2020*, BAAS 51, 3, 271 (2019)'
  primary_url: https://scixplorer.org/abs/2019BAAS...51c.271L/abstract
  links:
    pdf: https://scixplorer.org/link_gateway/2019BAAS...51c.271L/PUB_PDF
    scix: https://scixplorer.org/abs/2019BAAS...51c.271L/abstract
  bibcode: 2019BAAS...51c.271L
  lab_led: false
  abstract: The primary objective of this white paper is to illustrate the importance of the thermal infrared in characterizing
    terrestrial planets, leveraging our experience in characterizing extra-solar jovian worlds. Thermal emission measurements
    provide access to the atmospheric temperature structure, molecular abundances, and cloud properties of exoplanets. For
    terrestrial planets specifically, the mid-infrared contains key molecular features of water, ozone, methane, and carbon
    dioxide that are essential for assessing habitability and potential biosignatures. We argue that a future space mission
    capable of mid-infrared spectroscopy of terrestrial exoplanets should be a high priority for the coming decades.
  lay_summary: Thermal infrared spectroscopy provides unique access to molecular features in exoplanet atmospheres that complement
    shorter-wavelength observations. This white paper argues that mid-infrared emission measurements are essential for understanding
    terrestrial exoplanet atmospheres and should be a priority for future space missions.
  lay_summary_draft: null
