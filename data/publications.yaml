  authors_md: Rauer et al. (incl. **T Lichtenberg**)
  title: The PLATO mission
  venue_md: '*Experimental Astronomy* 59, 26 (2025)'
  primary_url: https://scixplorer.org/abs/2025ExA....59...26R/abstract
  links:
    pdf: https://link.springer.com/content/pdf/10.1007/s10686-025-09985-9.pdf
    scix: https://scixplorer.org/abs/2025ExA....59...26R/abstract
    doi: https://doi.org/10.1007/s10686-025-09985-9
  bibcode: 2025ExA....59...26R
  lab_led: false
  abstract: PLATO (PLAnetary Transits and Oscillations of stars) is ESA’s M3 mission designed to detect and characterise extrasolar
    planets and perform asteroseismic monitoring of a large number of stars. PLATO will detect small planets (down to <2R
    Earth Earth ) around bright stars (<11 mag), including terrestrial planets in the habitable zone of solar-like stars.
    With the complement of radial velocity observations from the ground, planets will be characterised for their radius, mass,
    and age with high accuracy (5%, 10%, 10% for an Earth-Sun combination respectively). PLATO will provide us with a large-scale
    catalogue of well-characterised small planets up to intermediate orbital periods, relevant for a meaningful comparison
    to planet formation theories and to better understand planet evolution. It will make possible comparative exoplanetology
    to place our Solar System planets in a broader context. In parallel, PLATO will study (host) stars using asteroseismology,
    allowing us to determine the stellar properties with high accuracy, substantially enhancing our knowledge of stellar structure
    and evolution. The payload instrument consists of 26 cameras with 12cm aperture each. For at least four years, the mission
    will perform high-precision photometric measurements. Here we review the science objectives, present PLATO‘s target samples
    and fields, provide an overview of expected core science performance as well as a description of the instrument and the
    mission profile towards the end of the serial production of the flight cameras. PLATO is scheduled for a launch date end
    2026. This overview therefore provides a summary of the mission to the community in preparation of the upcoming operational
    phases.
  lay_summary: PLATO is an ESA space mission designed to discover and characterize Earth-like planets in the habitable zones
    of Sun-like stars. By combining ultra-precise transit photometry with asteroseismology, PLATO will determine planetary
    radii, masses, and ages with unprecedented accuracy for hundreds of rocky worlds.
  lay_summary_draft: null
