- slug: nicholls-2025-convective
  section: research
  subsection: published
  year: 2025
  authors_md: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**, **L Soucasse**, **S Smeets**'
  title: Convective shutdown in the atmospheres of lava worlds
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 536, 2957-2971 (2025)'
  primary_url: https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract
  links:
    pdf: https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/stae2772/61218697/stae2772.pdf
    scix: https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract
  bibcode: 2025MNRAS.536.2957N
  lab_led: true
  abstract: 'Atmospheric energy transport is central to the cooling of primordial magma oceans. Theoretical studies of atmospheres
    on lava planets have assumed that convection is the only process involved in setting the atmospheric temperature structure.
    This significantly influences the ability for a magma ocean to cool. It has been suggested that convective stability in
    these atmospheres could preclude permanent magma oceans. We develop a new 1D radiative-convective model in order to investigate
    when the atmospheres overlying magma oceans are convectively stable. Using a coupled interior-atmosphere framework, we
    simulate the early evolution of two terrestrial-mass exoplanets: TRAPPIST-1 c and HD 63433 d. Our simulations suggest
    that the atmosphere of HD 63433 d exhibits deep isothermal layers which are convectively stable. However, it is able to
    maintain a permanent magma ocean and an atmosphere depleted in H₂O.
    It is possible to maintain permanent magma oceans underneath atmospheres without convection. Absorption features of CO₂ and SO₂
    within synthetic emission spectra are associated with mantle redox state, meaning that future observations of HD 63433
    d may provide constraints on the geochemical properties of a magma ocean analogous with the early Earth. Simulations of
    TRAPPIST-1 c indicate that it is expected to have solidified within 100 Myr, outgassing a thick atmosphere in the process. Cool isothermal stratospheres
    generated by low-molecular-weight atmospheres can mimic the emission of an atmosphere-less body. Future work should consider
    how atmospheric escape and chemistry modulates the lifetime of magma oceans, and the role of tidal heating in sustaining
    atmospheric convection.'
  lay_summary: Models of lava planets typically assume their thick atmospheres transport heat upward through convection, similar
    to boiling water. We find that some lava world atmospheres develop deep layers where convection shuts down entirely, yet
    the planet can still maintain a permanent magma ocean. This matters for interpreting upcoming telescope observations,
    because the atmospheric structure and chemistry change dramatically when convection is absent.
  lay_summary_draft: Models of lava planets typically assume their thick atmospheres transport heat upward through convection,
    similar to boiling water. We find that some lava world atmospheres develop deep layers where convection shuts down entirely,
    yet the planet can still maintain a permanent magma ocean. This matters for interpreting upcoming telescope observations,
    because the atmospheric structure and chemistry change dramatically when convection is absent.
  _raw: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**, **L Soucasse**, **S Smeets**. [Convective shutdown in the atmospheres
    of lava worlds.](https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract) *Monthly Notices of the Royal Astronomical Society*
    536, 2957-2971 (2025). [pdf](https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/stae2772/61218697/stae2772.pdf)'
- slug: nicholls-2024-magma
  section: research
  subsection: published
  year: 2024
  authors_md: '**Nicholls H**, **T Lichtenberg**, DJ Bower, RT Pierrehumbert'
  title: Magma ocean evolution at arbitrary redox state
  venue_md: '*Journal of Geophysical Research: Planets* 129, 2024JE008576 (2024)'
  primary_url: https://scixplorer.org/abs/2024JGRE..12908576N/abstract
  links:
    pdf: https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2024JE008576
    scix: https://scixplorer.org/abs/2024JGRE..12908576N/abstract
  bibcode: 2024JGRE..12908576N
  lab_led: true
  abstract: Interactions between magma oceans and overlying atmospheres on young rocky planets leads to an evolving feedback
    of outgassing, greenhouse forcing, and mantle melt fraction. Previous studies have predominantly focused on the solidification
    of oxidized Earth-similar planets, but the diversity in mean density and irradiation observed in the low-mass exoplanet
    census motivate exploration of strongly varying geochemical scenarios. We aim to explore how variable redox properties
    alter the duration of magma ocean solidification, the equilibrium thermodynamic state, melt fraction of the mantle, and
    atmospheric composition. We develop a 1D coupled interior-atmosphere model that can simulate the time-evolution of lava
    planets. This is applied across a grid of fixed redox states, orbital separations, hydrogen endowments, and C/H ratios
    around a Sun-like star. The composition of these atmospheres is highly variable before and during solidification. The
    evolutionary path of an Earth-like planet at 1 AU ranges between permanent magma ocean states and solidification within
    1 Myr. Recently solidified planets typically host H<SUB>2</SUB>O- or H<SUB>2</SUB>-dominated atmospheres in the absence
    of escape. Orbital separation is the primary factor determining magma ocean evolution, followed by the total hydrogen
    endowment, mantle oxygen fugacity, and finally the planet's C/H ratio. Collisional absorption by H<SUB>2</SUB> induces
    a greenhouse effect which can prevent or stall magma ocean solidification. Through this effect, as well as the outgassing
    of other volatiles, geochemical properties exert significant control over the fate of magma oceans on rocky planets.
  lay_summary: The chemistry of a young planet's magma ocean, specifically how oxidized or reduced it is, controls which gases
    enter the atmosphere and how quickly the surface solidifies. We systematically explored this across a wide range of chemical
    conditions and found that hydrogen-rich atmospheres produced under reducing conditions can trap enough heat to prevent
    a magma ocean from ever freezing. The planet's oxidation state thus acts as a chemical switch between permanent magma
    ocean worlds and planets that solidify within a million years.
  lay_summary_draft: The chemistry of a young planet's magma ocean, specifically how oxidized or reduced it is, controls which
    gases enter the atmosphere and how quickly the surface solidifies. We systematically explored this across a wide range
    of chemical conditions and found that hydrogen-rich atmospheres produced under reducing conditions can trap enough heat
    to prevent a magma ocean from ever freezing. The planet's oxidation state thus acts as a chemical switch between permanent
    magma ocean worlds and planets that solidify within a million years.
  _raw: '**Nicholls H**, **T Lichtenberg**, DJ Bower, RT Pierrehumbert. [Magma ocean evolution at arbitrary redox state.](https://scixplorer.org/abs/2024JGRE..12908576N/abstract)
    *Journal of Geophysical Research: Planets* 129, 2024JE008576 (2024). [pdf](https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2024JE008576)'
- slug: cesario-2024-large
  section: research
  subsection: published
  year: 2024
  authors_md: '**Cesario L**, **T Lichtenberg** et al'
  title: Large Interferometer For Exoplanets (LIFE). XIV. Finding terrestrial protoplanets in the galactic neighborhood
  venue_md: '*Astronomy & Astrophysics* 692, A172 (2024)'
  primary_url: https://scixplorer.org/abs/2024arXiv241013457C
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2024/12/aa50764-24.pdf
    scix: https://scixplorer.org/abs/2024arXiv241013457C
  bibcode: 2024A&A...692A.172C
  lab_led: true
  abstract: Context. The increased brightness temperature of young rocky protoplanets during their magma ocean epoch makes
    them potentially amenable to atmospheric characterization at distances from the Solar System far greater than thermally
    equilibrated terrestrial exoplanets, offering observational opportunities for unique insights into the origin of secondary
    atmospheres and the near surface conditions of prebiotic environments. Aims. The Large Interferometer For Exoplanets (LIFE)
    mission will employ a space-based midinfrared nulling interferometer to directly measure the thermal emission of terrestrial
    exoplanets. In this work, we seek to assess the capabilities of various instrumental design choices of the LIFE mission
    concept for the detection of cooling protoplanets with transient high-temperature magma ocean atmospheres at the tail
    end of planetary accretion. In particular, we investigate the minimum integration times necessary to detect transient
    magma ocean exoplanets in young stellar associations in the Solar neighborhood. Methods. Using the LIFE mission instrument
    simulator (LIFEsim), we assessed how specific instrumental parameters and design choices, such as wavelength coverage,
    aperture diameter, and photon throughput, facilitate or disadvantage the detection of protoplan-ets. We focused on the
    observational sensitivities of distance to the observed planetary system, protoplanet brightness temperature (using a
    blackbody assumption), and orbital distance of the potential protoplanets around both G- and M-dwarf stars. Results. Our
    simulations suggest that LIFE will be able to detect (S/N ≥ 7) hot protoplanets in young stellar associations up to distances
    of 100 pc from the Solar System for reasonable integration times (up to a few hours). Detection of an Earth-sized protoplanet
    orbiting a Solar-sized host star at 1 AU requires less than 30 minutes of integration time. M-dwarfs generally need shorter
    integration times. The contribution from wavelength regions smaller than 6 µm is important for decreasing the detection
    threshold and discriminating emission temperatures. Conclusions. The LIFE mission is capable of detecting cooling terrestrial
    protoplanets within minutes to hours in several local young stellar associations hosting potential targets. The anticipated
    compositional range of magma ocean atmospheres motivates further architectural design studies to characterize the crucial
    transition from primary to secondary atmospheres.
  lay_summary: Young rocky planets glow brightly in infrared light while their surfaces are still molten, making them visible
    at much greater distances than cooled, habitable-zone planets. We assessed whether the proposed LIFE space telescope could
    detect these young, molten worlds and found it could spot Earth-sized protoplanets in nearby star-forming regions within
    minutes to hours of observation. Detecting planets in this early molten stage would reveal how secondary atmospheres first
    form on rocky worlds.
  lay_summary_draft: Young rocky planets glow brightly in infrared light while their surfaces are still molten, making them
    visible at much greater distances than cooled, habitable-zone planets. We assessed whether the proposed LIFE space telescope
    could detect these young, molten worlds and found it could spot Earth-sized protoplanets in nearby star-forming regions
    within minutes to hours of observation. Detecting planets in this early molten stage would reveal how secondary atmospheres
    first form on rocky worlds.
  _raw: '**Cesario L**, **T Lichtenberg** et al. [Large Interferometer For Exoplanets (LIFE). XIV. Finding terrestrial protoplanets
    in the galactic neighborhood.](https://scixplorer.org/abs/2024arXiv241013457C) *Astronomy & Astrophysics* 692, A172 (2024).
    [pdf](https://www.aanda.org/articles/aa/pdf/2024/12/aa50764-24.pdf)'
