- slug: lyra-2019-planet
  section: perspectives
  subsection: null
  year: 2019
  authors_md: Lyra W et al. (incl. **T Lichtenberg**)
  title: Planet formation — The case for large efforts on the computational side
  venue_md: '*Astro2020*, BAAS 51, 3, 129 (2019)'
  primary_url: https://scixplorer.org/abs/2019BAAS...51c.129L/abstract
  links:
    pdf: https://arxiv.org/pdf/1903.04546
    scix: https://scixplorer.org/abs/2019BAAS...51c.129L/abstract
  bibcode: 2019BAAS...51c.129L
  lab_led: false
  abstract: Modern astronomy has finally been able to observe protoplanetary disks in reasonable resolution and detail, unveiling
    the processes happening during planet formation. These observed processes are understood under the framework of disk-planet
    interaction, a process studied analytically and modeled numerically for over 40 years. Long a theoreticians' game, the
    wealth of observational data has been allowing for increasingly stringent tests of the theoretical models. Modeling efforts
    are crucial to support the interpretation of direct imaging analyses, not just for potential detections but also to put
    meaningful upper limits on mass accretion rates and other physical quantities in current and future large-scale surveys.
    This white paper addresses the questions of what efforts on the computational side are required in the next decade to
    advance our theoretical understanding, explain the observational data, and guide new observations. We identified the nature
    of accretion, ab initio planet formation, early evolution, and circumplanetary disks as major fields of interest in computational
    planet formation. We recommend that modelers relax the approximations of alpha-viscosity and isothermal equations of state,
    on the grounds that these models use flawed assumptions, even if they give good visual qualitative agreement with observations.
    We similarly recommend that population synthesis move away from 1D hydrodynamics. The computational resources to reach
    these goals should be developed during the next decade, through improvements in algorithms and the hardware for hybrid
    CPU/GPU clusters. Coupled with high angular resolution and great line sensitivity in ground based interferometers, ELTs
    and JWST, these advances in computational efforts should allow for large strides in the field in the next decade.
  lay_summary: Modern telescope observations are revealing the detailed structure of protoplanetary disks where planets form.
    This white paper argues that large-scale computational efforts, including high-resolution simulations of disk-planet interactions,
    are essential for interpreting these observations and advancing our understanding of planet formation.
  lay_summary_draft: null
  _raw: Lyra W et al. (incl. **T Lichtenberg**). [Planet formation — The case for large efforts on the computational side.](https://scixplorer.org/abs/2019BAAS...51c.129L/abstract)
    *Astro2020*, BAAS 51, 3, 129 (2019). [pdf](https://arxiv.org/pdf/1903.04546)
- slug: khullar-2019-astrobites
  section: perspectives
  subsection: null
  year: 2019
  authors_md: Khullar G et al. (incl. **T Lichtenberg**)
  title: Astrobites as a Community-led Model for Education, Science Communication, and Accessibility in Astrophysics
  venue_md: '*Astro2020*, BAAS 51, 7, 230 (2019)'
  primary_url: https://scixplorer.org/abs/2019BAAS...51g.230K/abstract
  links:
    pdf: https://arxiv.org/pdf/1907.09496
    scix: https://scixplorer.org/abs/2019BAAS...51g.230K/abstract
  bibcode: 2019BAAS...51g.230K
  lab_led: false
  abstract: 'As recent advancements in physics and astronomy rewrite textbooks in a very rapid pace, there is a growing need
    in keeping abreast of the latest knowledge in these fields. Reading preprints is one of the effective ways to do this.
    However, by having journal clubs where people can read and discuss journals together, the benefits of reading journals
    become more prevalent. We present an investigative study of understanding the factors that affect the success of preprint
    journal clubs in astronomy, more commonly known as Astro-ph/Astro-Coffee (hereafter called AC). A survey was disseminated
    to understand how universities and institutions from different countries implement AC. We interviewed 9 survey respondents
    and from their responses, and we identified four important factors that make AC successful: commitment (how the organizer
    and attendees participate in AC), environment (how conducive and comfortable AC is conducted), content (the discussed
    topics in AC and how they are presented), and objective [the main goal (s) of conducting AC]. These four factors are shown
    to correlate with each other. We also present the format of our AC, an elective class which was evaluated during the Spring
    semester 2020 (March 2020-June 2020). Our evaluation with the attendees showed that enrollees (those who are enrolled
    and are required to present papers regularly) tend to be more committed in attending compared to audiences (those who
    are not enrolled and are not required to present papers regularly). In addition, participants tend to find papers outside
    their research field harder to read, which makes introducing and explaining basic knowledge without the assumption of
    the audience already knowing the topic very important. Finally, we showed an improvement in the weekly number of papers
    read after attending AC of those who present papers regularly, and a high satisfaction rating of our AC. We summarize
    the areas of improvement in our AC implementation, and we encourage other institutions to evaluate their own AC in accordance
    with the four aforementioned factors to assess the effectiveness of their AC in reaching their goals.'
  lay_summary: Astrobites is a graduate-student-run platform that publishes daily summaries of astrophysics research papers
    in accessible language. This paper describes how Astrobites serves as a model for community-led science communication
    and education, supporting early-career astronomers and broadening access to the scientific literature.
  lay_summary_draft: null
  _raw: Khullar G et al. (incl. **T Lichtenberg**). [Astrobites as a Community-led Model for Education, Science Communication,
    and Accessibility in Astrophysics.](https://scixplorer.org/abs/2019BAAS...51g.230K/abstract) *Astro2020*, BAAS 51, 7,
    230 (2019). [pdf](https://arxiv.org/pdf/1907.09496)
- slug: nicholls-2025-agni
  section: instrumentation
  subsection: null
  year: 2025
  authors_md: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**'
  title: 'AGNI: A radiative-convective model for lava planet atmospheres'
  venue_md: '*Journal of Open Source Software* 10, 7726 (2025)'
  primary_url: https://doi.org/10.21105/joss.07726
  links:
    pdf: https://www.theoj.org/joss-papers/joss.07726/10.21105.joss.07726.pdf
    doi: https://doi.org/10.21105/joss.07726
    scix: https://scixplorer.org/abs/2025JOSS...10.7726N/abstract
  bibcode: null
  lab_led: true
  abstract: 'It is important that we are able to accurately model the atmospheres of (exo)planets. This is because atmospheres
    play a central role in setting a planet''s thermochemical environment at a given point in time, and also in regulating
    how it evolves over geological timescales. Additionally, it is primarily by observation of their atmospheres that we are
    able to characterise exoplanets. There is particular demand for accurate models in the context of so-called lava worlds:
    planets with molten interiors (or `magma oceans''). AGNI is a Julia program designed to solve for the temperature and
    radiation environment within the atmospheres of rocky (exo)planets. It leverages a well established FORTRAN code to calculate
    radiative fluxes from a given atmospheric temperature structure and composition, which, alongside representations of convection
    and other processes, enables an energy-conserving numerical solution for the atmospheric conditions. In contrast to most
    other numerical atmosphere models, AGNI uses a Newton-Raphson optimisation method to obtain its solution, which enables
    improved performance and scalability. Our model was specifically developed for use alongside planetary interior models
    within a coupled simulation framework. However, it can also be applied to scientific problems standalone when used as
    an executable program; it reads TOML configuration files and outputs figures and NetCDF datasets. AGNI can also function
    as a software library; it is used in this sense within the Jupyter notebook tutorials of our GitHub repository (https://nichollsh.github.io/AGNI/dev/)'
  lay_summary: Modeling the atmospheres of rocky exoplanets requires accurate calculations of how radiation and convection
    transport energy, especially for planets with molten surfaces. AGNI is an open-source atmospheric model purpose-built
    for lava worlds that uses an efficient numerical solver to calculate temperature profiles and radiation environments.
    It is designed to couple with interior evolution models within the PROTEUS simulation framework, enabling self-consistent
    simulations of how rocky planets evolve over time.
  lay_summary_draft: Modeling the atmospheres of rocky exoplanets requires accurate calculations of how radiation and convection
    transport energy, especially for planets with molten surfaces. AGNI is an open-source atmospheric model purpose-built
    for lava worlds that uses an efficient numerical solver to calculate temperature profiles and radiation environments.
    It is designed to couple with interior evolution models within the PROTEUS simulation framework, enabling self-consistent
    simulations of how rocky planets evolve over time.
  _raw: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**. [AGNI: A radiative-convective model for lava planet atmospheres.](https://doi.org/10.21105/joss.07726)
    *Journal of Open Source Software* 10, 7726 (2025). [pdf](https://www.theoj.org/joss-papers/joss.07726/10.21105.joss.07726.pdf)'
