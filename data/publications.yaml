- slug: lichtenberg-2018-impact
  section: research
  subsection: published
  year: 2018
  authors_md: '**Lichtenberg T**, GJ Golabek, CP Dullemond, M Schönbächler, TV Gerya, MR Meyer'
  title: Impact splash chondrule formation during planetesimal recycling
  venue_md: '*Icarus* 302, 27–43 (2018)'
  primary_url: https://scixplorer.org/abs/2018Icar..302...27L
  links:
    pdf: https://arxiv.org/pdf/1711.02103.pdf
    blog: http://goo.gl/5bDqGC
    scix: https://scixplorer.org/abs/2018Icar..302...27L
  bibcode: 2018Icar..302...27L
  lab_led: true
  abstract: Chondrules, mm-sized igneous-textured spherules, are the dominant bulk silicate constituent of chondritic meteorites
    and originate from highly energetic, local processes during the first million years after the birth of the Sun. So far,
    an astrophysically consistent chondrule formation scenario explaining major chemical, isotopic and textural features,
    in particular Fe,Ni metal abundances, bulk Fe/Mg ratios and intra-chondrite chemical and isotopic diversity, remains elusive.
    Here, we examine the prospect of forming chondrules from impact splashes among planetesimals heated by radioactive decay
    of short-lived radionuclides using thermomechanical models of their interior evolution. We show that intensely melted
    planetesimals with interior magma oceans became rapidly chemically equilibrated and physically differentiated. Therefore,
    collisional interactions among such bodies would have resulted in chondrule-like but basaltic spherules, which are not
    observed in the meteoritic record. This inconsistency with the expected dynamical interactions hints at an incomplete
    understanding of the planetary growth regime during the lifetime of the solar protoplanetary disk. To resolve this conundrum,
    we examine how the observed chemical and isotopic features of chondrules constrain the dynamical environment of accreting
    chondrite parent bodies by interpreting the meteoritic record as an impact-generated proxy of early solar system planetesimals
    that underwent repeated collision and reaccretion cycles. Using a coupled evolution-collision model we demonstrate that
    the vast majority of collisional debris feeding the asteroid main belt must be derived from planetesimals which were partially
    molten at maximum. Therefore, the precursors of chondrite parent bodies either formed primarily small, from sub-canonical
    aluminum-26 reservoirs, or collisional destruction mechanisms were efficient enough to shatter planetesimals before they
    reached the magma ocean phase. Finally, we outline the window in parameter space for which chondrule formation from planetesimal
    collisions can be reconciled with the meteoritic record and how our results can be used to further constrain early solar
    system dynamics.
  lay_summary: Chondrules, millimeter-sized glassy beads found in most meteorites, formed in energetic events during the first
    million years of the Solar System, but their origin remains debated. We tested whether collisions between partially molten
    planetesimals could produce chondrules with the right chemistry and found that the precursor bodies must not have been
    fully melted. This constrains either the timing and size of early planetesimals or the efficiency of collisional destruction
    in the young Solar System.
  lay_summary_draft: Chondrules, millimeter-sized glassy beads found in most meteorites, formed in energetic events during
    the first million years of the Solar System, but their origin remains debated. We tested whether collisions between partially
    molten planetesimals could produce chondrules with the right chemistry and found that the precursor bodies must not have
    been fully melted. This constrains either the timing and size of early planetesimals or the efficiency of collisional
    destruction in the young Solar System.
  _raw: '**Lichtenberg T**, GJ Golabek, CP Dullemond, M Schönbächler, TV Gerya, MR Meyer. [Impact splash chondrule formation
    during planetesimal recycling.](https://scixplorer.org/abs/2018Icar..302...27L) *Icarus* 302, 27–43 (2018). [pdf](https://arxiv.org/pdf/1711.02103.pdf),
    [blog](http://goo.gl/5bDqGC)'
