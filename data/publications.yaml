- slug: lichtenberg-2016-isotopic
  section: research
  subsection: published
  year: 2016
  authors_md: '**Lichtenberg T**, RJ Parker, MR Meyer'
  title: Isotopic enrichment of forming planetary systems from supernova pollution
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 462, 3979–3992 (2016). [pdf](https://academic.oup.com/mnras/article-pdf/462/4/3979/18756772/stw1929.pdf),
    [video](http://bit.ly/supernova_pollution)'
  primary_url: https://scixplorer.org/abs/2016MNRAS.462.3979L
  links:
    pdf: https://academic.oup.com/mnras/article-pdf/462/4/3979/18756772/stw1929.pdf
    video: http://bit.ly/supernova_pollution
    blog: http://nccr-planets.ch/blog/2016/08/10/supernova-ejecta-pollute-young-planetary-systems/
    scix: https://scixplorer.org/abs/2016MNRAS.462.3979L
  bibcode: 2016MNRAS.462.3979L
  lab_led: true
  abstract: Heating by short-lived radioisotopes (SLRs) such as <SUP>26</SUP>Al and <SUP>60</SUP>Fe fundamentally shaped the
    thermal history and interior structure of Solar system planetesimals during the early stages of planetary formation. The
    subsequent thermo-mechanical evolution, such as internal differentiation or rapid volatile degassing, yields important
    implications for the final structure, composition and evolution of terrestrial planets. SLR-driven heating in the Solar
    system is sensitive to the absolute abundance and homogeneity of SLRs within the protoplanetary disc present during the
    condensation of the first solids. In order to explain the diverse compositions found for extrasolar planets, it is important
    to understand the distribution of SLRs in active planet formation regions (star clusters) during their first few Myr of
    evolution. By constraining the range of possible effects, we show how the imprint of SLRs can be extrapolated to exoplanetary
    systems and derive statistical predictions for the distribution of <SUP>26</SUP>Al and <SUP>60</SUP>Fe based on N-body
    simulations of typical to large clusters (10<SUP>3</SUP>-10<SUP>4</SUP> stars) with a range of initial conditions. We
    quantify the pollution of protoplanetary discs by supernova ejecta and show that the likelihood of enrichment levels similar
    to or higher than the Solar system can vary considerably, depending on the cluster morphology. Furthermore, many enriched
    systems show an excess in radiogenic heating compared to Solar system levels, which implies that the formation and evolution
    of planetesimals could vary significantly depending on the birth environment of their host stars.
  lay_summary: Short-lived radioactive isotopes like aluminum-26 heated the building blocks of our Solar System and drove
    their internal evolution, but it is unclear how common such enrichment is elsewhere. We simulated the dispersal of supernova
    ejecta through young star clusters and found that the likelihood of Solar-System-level enrichment varies widely depending
    on the cluster's size and structure. Many planetary systems may receive even higher doses, implying that planetesimal
    evolution could differ substantially across the galaxy.
  lay_summary_draft: Short-lived radioactive isotopes like aluminum-26 heated the building blocks of our Solar System and
    drove their internal evolution, but it is unclear how common such enrichment is elsewhere. We simulated the dispersal
    of supernova ejecta through young star clusters and found that the likelihood of Solar-System-level enrichment varies
    widely depending on the cluster's size and structure. Many planetary systems may receive even higher doses, implying that
    planetesimal evolution could differ substantially across the galaxy.
  _raw: '**Lichtenberg T**, RJ Parker, MR Meyer. [Isotopic enrichment of forming planetary systems from supernova pollution.](https://scixplorer.org/abs/2016MNRAS.462.3979L)
    *Monthly Notices of the Royal Astronomical Society* 462, 3979–3992 (2016). [pdf](https://academic.oup.com/mnras/article-pdf/462/4/3979/18756772/stw1929.pdf),
    [video](http://bit.ly/supernova_pollution), [blog](http://nccr-planets.ch/blog/2016/08/10/supernova-ejecta-pollute-young-planetary-systems/)'
- slug: lichtenberg-2016-effects
  section: research
  subsection: published
  year: 2016
  authors_md: '**Lichtenberg T**, GJ Golabek, TV Gerya, MR Meyer'
  title: The effects of short-lived radionuclides and porosity on the early thermo-mechanical evolution of planetesimals
  venue_md: '*Icarus* 274, 350–365 (2016). [pdf](https://arxiv.org/pdf/1603.05979.pdf), [video](http://bit.ly/planetesimal_evolution)'
  primary_url: https://scixplorer.org/abs/2016Icar..274..350L
  links:
    pdf: https://arxiv.org/pdf/1603.05979.pdf
    video: http://bit.ly/planetesimal_evolution
    blog: http://nccr-planets.ch/blog/2016/04/15/asteroid-interiors/
    scix: https://scixplorer.org/abs/2016Icar..274..350L
  bibcode: 2016Icar..274..350L
  lab_led: true
  abstract: The thermal history and internal structure of chondritic planetesimals, assembled before the giant impact phase
    of chaotic growth, potentially yield important implications for the final composition and evolution of terrestrial planets.
    These parameters critically depend on the internal balance of heating versus cooling, which is mostly determined by the
    presence of short-lived radionuclides (SLRs), such as <SUP>26</SUP>Al and <SUP>60</SUP>Fe, as well as the heat conductivity
    of the material. The heating by SLRs depends on their initial abundances, the formation time of the planetesimal and its
    size. It has been argued that the cooling history is determined by the porosity of the granular material, which undergoes
    dramatic changes via compaction processes and tends to decrease with time. In this study we assess the influence of these
    parameters on the thermo-mechanical evolution of young planetesimals with both 2D and 3D simulations. Using the code family
    I2ELVIS/I3ELVIS we have run numerous 2D and 3D numerical finite-difference fluid dynamic models with varying planetesimal
    radius, formation time and initial porosity. Our results indicate that powdery materials lowered the threshold for melting
    and convection in planetesimals, depending on the amount of SLRs present. A subset of planetesimals retained a powdery
    surface layer which lowered the thermal conductivity and hindered cooling. The effect of initial porosity was small, however,
    compared to those of planetesimal size and formation time, which dominated the thermo-mechanical evolution and were the
    primary factors for the onset of melting and differentiation. We comment on the implications of this work concerning the
    structure and evolution of these planetesimals, as well as their behavior as possible building blocks of terrestrial planets.
  lay_summary: The porous, powdery texture of freshly formed planetesimals acts as thermal insulation, potentially trapping
    radioactive heat and promoting internal melting. We modeled how porosity and radioactive heating interact in 2D and 3D
    simulations and found that while porosity lowers the melting threshold, the size and formation time of a planetesimal
    are far more important in determining whether it differentiates. These results constrain which meteorite parent bodies
    underwent internal melting and how they contributed to terrestrial planet formation.
  lay_summary_draft: The porous, powdery texture of freshly formed planetesimals acts as thermal insulation, potentially trapping
    radioactive heat and promoting internal melting. We modeled how porosity and radioactive heating interact in 2D and 3D
    simulations and found that while porosity lowers the melting threshold, the size and formation time of a planetesimal
    are far more important in determining whether it differentiates. These results constrain which meteorite parent bodies
    underwent internal melting and how they contributed to terrestrial planet formation.
  _raw: '**Lichtenberg T**, GJ Golabek, TV Gerya, MR Meyer. [The effects of short-lived radionuclides and porosity on the
    early thermo-mechanical evolution of planetesimals.](https://scixplorer.org/abs/2016Icar..274..350L) *Icarus* 274, 350–365
    (2016). [pdf](https://arxiv.org/pdf/1603.05979.pdf), [video](http://bit.ly/planetesimal_evolution), [blog](http://nccr-planets.ch/blog/2016/04/15/asteroid-interiors/)'
- slug: lichtenberg-2015-modeling
  section: research
  subsection: published
  year: 2015
  authors_md: '**Lichtenberg T** & DRG Schleicher'
  title: Modeling gravitational instabilities in self-gravitating protoplanetary disks with adaptive mesh refinement techniques
  venue_md: '*Astronomy & Astrophysics* 579, A32 (2015)'
  primary_url: https://scixplorer.org/abs/2015A%26A...579A..32L/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2014/11/aa24478-14.pdf
    video: http://bit.ly/gi_disk
    scix: https://scixplorer.org/abs/2015A%26A...579A..32L/abstract
  bibcode: 2015A&A...579A..32L
  lab_led: true
  abstract: The astonishing diversity in the observed planetary population requires theoretical efforts and advances in planet
    formation theories. The use of numerical approaches provides a method to tackle the weaknesses of current models and is
    an important tool to close gaps in poorly constrained areas such as the rapid formation of giant planets in highly evolved
    systems. So far, most numerical approaches make use of Lagrangian-based smoothed-particle hydrodynamics techniques or
    grid-based 2D axisymmetric simulations. We present a new global disk setup to model the first stages of giant planet formation
    via gravitational instabilities (GI) in 3D with the block-structured adaptive mesh refinement (AMR) hydrodynamics code
    enzo. With this setup, we explore the potential impact of AMR techniques on the fragmentation and clumping due to large-scale
    instabilities using different AMR configurations. Additionally, we seek to derive general resolution criteria for global
    simulations of self-gravitating disks of variable extent. We run a grid of simulations with varying AMR settings, including
    runs with a static grid for comparison. Additionally, we study the effects of varying the disk radius. The physical settings
    involve disks with R<SUB>disk</SUB> = 10,100 and 300 AU, with a mass of M<SUB>disk</SUB> ≈ 0.05 M<SUB>☉</SUB> and a central
    object of subsolar mass (M<SUB>⋆</SUB> = 0.646 M<SUB>☉</SUB>). To validate our thermodynamical approach we include a set
    of simulations with a dynamically stable profile (Q<SUB>init</SUB> = 3) and similar grid parameters. The development of
    fragmentation and the buildup of distinct clumps in the disk is strongly dependent on the chosen AMR grid settings. By
    combining our findings from the resolution and parameter studies we find a general lower limit criterion to be able to
    resolve GI induced fragmentation features and distinct clumps, which induce turbulence in the disk and seed giant planet
    formation. Irrespective of the physical extension of the disk, topologically disconnected clump features are only resolved
    if the fragmentation-active zone of the disk is resolved with at least 100 cells. The latter corresponds to a minimum
    requirement for all global disk setups. Our simulations illustrate the capabilities of AMR-based modeling techniques for
    planet formation simulations and underline the importance of balanced refinement settings to reproduce fragmenting structures.
    The clumps in our models are migrating inward and are eventually destroyed because of tidal disruptions, reflecting the
    absence of radiative feedback from the central star, which may stabilize the clumps on larger scales. We expect that the
    inclusion of additional physics, like a radiation transport mechanism and the formation of sink particles, will provide
    a detailed framework to study the formation of planets via gravitational instabilities in a global disk view.
  lay_summary: Giant planets might form rapidly when protoplanetary disks become gravitationally unstable and fragment into
    clumps, but capturing this process in simulations is numerically challenging. We developed a new 3D setup using adaptive
    mesh refinement to resolve the fragmentation of self-gravitating disks, identifying a minimum resolution requirement for
    reliably resolving gravitational collapse. The resulting clumps migrate inward and are tidally destroyed, indicating that
    additional physics such as radiative feedback is needed to stabilize them into surviving planets.
  lay_summary_draft: Giant planets might form rapidly when protoplanetary disks become gravitationally unstable and fragment
    into clumps, but capturing this process in simulations is numerically challenging. We developed a new 3D setup using adaptive
    mesh refinement to resolve the fragmentation of self-gravitating disks, identifying a minimum resolution requirement for
    reliably resolving gravitational collapse. The resulting clumps migrate inward and are tidally destroyed, indicating that
    additional physics such as radiative feedback is needed to stabilize them into surviving planets.
  _raw: '**Lichtenberg T** & DRG Schleicher. [Modeling gravitational instabilities in self-gravitating protoplanetary disks
    with adaptive mesh refinement techniques.](https://scixplorer.org/abs/2015A%26A...579A..32L/abstract) *Astronomy & Astrophysics*
    579, A32 (2015). [pdf](https://www.aanda.org/articles/aa/pdf/2014/11/aa24478-14.pdf), [video](http://bit.ly/gi_disk)'
- slug: lichtenberg-2025-constraining
  section: reviews
  subsection: null
  year: 2025
  authors_md: '**Lichtenberg T**, O Shorttle, J Teske, EMR Kempton'
  title: Constraining exoplanet interiors using observations of their atmospheres
  venue_md: '*Science* 390, eads3360 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv251008844L
  links:
    pdf: https://www.science.org/doi/pdf/10.1126/science.ads3360
    scix: https://scixplorer.org/abs/2025arXiv251008844L
  bibcode: 2025Sci...390S3660L
  lab_led: true
  abstract: Astronomical surveys have identified numerous exoplanets with bulk compositions that are unlike the planets of
    the Solar System, including rocky super-Earths and gas-enveloped sub-Neptunes. Observing the atmospheres of these objects
    provides information on the geological processes that influence their climates and surfaces. In this Review, we summarize
    the current understanding of these planets, including insights into the interaction between the atmosphere and interior
    based on observations made with the JWST. We describe the expected climatic and interior planetary regimes for planets
    with different density and stellar flux and how those regimes might be observationally distinguished. We also identify
    the observational, experimental, and theoretical innovations that will be required to characterize Earth-like exoplanets.
  lay_summary: Rocky exoplanets come in a wider range of sizes and compositions than anything in our Solar System, from bare
    rocky surfaces to gas-enveloped sub-Neptunes. This review synthesizes what atmospheric observations, particularly from
    JWST, are revealing about the geological processes shaping these worlds. It identifies the observational, experimental,
    and theoretical advances needed to eventually characterize truly Earth-like exoplanets.
  lay_summary_draft: Rocky exoplanets come in a wider range of sizes and compositions than anything in our Solar System, from
    bare rocky surfaces to gas-enveloped sub-Neptunes. This review synthesizes what atmospheric observations, particularly
    from JWST, are revealing about the geological processes shaping these worlds. It identifies the observational, experimental,
    and theoretical advances needed to eventually characterize truly Earth-like exoplanets.
  _raw: '**Lichtenberg T**, O Shorttle, J Teske, EMR Kempton. [Constraining exoplanet interiors using observations of their
    atmospheres.](https://scixplorer.org/abs/2025arXiv251008844L) *Science* 390, eads3360 (2025). [pdf](https://www.science.org/doi/pdf/10.1126/science.ads3360)'
- slug: lichtenberg-2025-super-earths
  section: reviews
  subsection: null
  year: 2025
  authors_md: '**Lichtenberg T**, Y Miguel'
  title: Super-Earths and Earth-like Exoplanets
  venue_md: '*Treatise on Geochemistry*, 3rd edition (2025)'
  primary_url: https://scixplorer.org/abs/2024arXiv240504057L
  links:
    pdf: https://arxiv.org/pdf/2405.04057
    scix: https://scixplorer.org/abs/2024arXiv240504057L
  bibcode: 2025TrGeo...7...51L
  lab_led: true
  abstract: In the last few years astronomical surveys have expanded the reach of planetary science into the realm of small
    and dense extrasolar worlds. These share a number of characteristics with the terrestrial and icy planetary objects of
    the Solar System, but keep stretching previous understanding of the known limits of planetary thermodynamics, material
    properties, and climate regimes. Improved compositional and thermal constraints on exoplanets below ~2 Earth radii
    suggest efficient accretion of atmosphere-forming volatile elements in a fraction of planetary systems, pointing to rapid
    formation, planet-scale melting, and chemical equilibration between the core, mantle, and atmosphere of rocky and volatile-rich
    exoplanets. Meaningful interpretation of novel observational data from these worlds necessitates cross-disciplinary expansion
    of known material properties under extreme thermodynamic, non-solar conditions, and accounting for dynamic feedbacks between
    interior and atmospheric processes. Exploration of the atmosphere and surface composition of individual, short-period
    super-Earths in the next few years will enable key inferences on magma ocean dynamics, the redox state of rocky planetary
    mantles, and mixing between volatile and refractory phases in planetary regimes that are absent from the present-day Solar
    System, and reminiscent of the conditions of the prebiotic Earth. The atmospheric characterization of climate diversity
    and the statistical search for biosignatures on terrestrial exoplanets on temperate orbits will require space-based direct
    imaging surveys, capable of resolving emission features of major and trace gases in both shortwave and mid-infrared wavelengths.
  lay_summary: Astronomical surveys are now detecting rocky exoplanets small enough to be compared with Earth, but their compositions
    and climates challenge existing planetary science frameworks. This review covers what we know about super-Earths and Earth-like
    exoplanets, from their formation through magma ocean stages to their present-day atmospheres. Characterizing temperate,
    potentially habitable worlds will ultimately require space-based direct imaging missions capable of resolving their atmospheric
    composition.
  lay_summary_draft: Astronomical surveys are now detecting rocky exoplanets small enough to be compared with Earth, but their
    compositions and climates challenge existing planetary science frameworks. This review covers what we know about super-Earths
    and Earth-like exoplanets, from their formation through magma ocean stages to their present-day atmospheres. Characterizing
    temperate, potentially habitable worlds will ultimately require space-based direct imaging missions capable of resolving
    their atmospheric composition.
  _raw: '**Lichtenberg T**, Y Miguel. [Super-Earths and Earth-like Exoplanets.](https://scixplorer.org/abs/2024arXiv240504057L)
    *Treatise on Geochemistry*, 3rd edition (2025). [pdf](https://arxiv.org/pdf/2405.04057)'
