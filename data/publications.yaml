- slug: nicholls-2025-self-limited
  section: research
  subsection: published
  year: 2025
  authors_md: '**Nicholls H**, CM Guimond, CFC Hay, RD Chatterjee, **T Lichtenberg**, RT Pierrehumbert'
  title: Self-limited tidal heating and prolonged magma oceans in the L 98-59 system
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 541, 2566–2584 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv250503604N/abstract
  links:
    pdf: https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/staf1167/63775631/staf1167.pdf
    scix: https://scixplorer.org/abs/2025arXiv250503604N/abstract
    doi: https://doi.org/10.1093/mnras/staf1167
  bibcode: 2025MNRAS.541.2566N
  lab_led: true
  abstract: Rocky exoplanets accessible to characterization often lie on close-in orbits where tidal heating within their
    interiors is significant, with the L 98-59 planetary system being a prime example. As a long-term energy source for ongoing
    mantle melting and outgassing, tidal heating has been considered as a way to replenish lost atmospheres on rocky planets
    around active M-dwarfs. We simulate the early evolution of L 98-59 b, c, and d using a time-evolved interior-atmosphere
    modelling framework, with a self-consistent implementation of tidal heating and redox-controlled outgassing. Emerging
    from our calculations is a novel self-limiting mechanism between radiative cooling, tidal heating, and mantle rheology,
    which we term the 'radiation-tide-rheology feedback'. Our coupled modelling yields self-limiting tidal heating estimates
    that are up to two orders of magnitude lower than previous calculations, and yet are still large enough to enable the
    extension of primordial magma oceans to Gyr time-scales. Comparisons with a semi-analytic model demonstrate that this
    negative feedback is a robust mechanism which can probe a given planet's initial conditions, atmospheric composition,
    and interior structure. The orbit and instellation of the sub-Venus L 98-59 b likely place it in a regime where tidal
    heating has kept the planet molten up to the present day, even if it were to have lost its atmosphere. For c and d, a
    long-lived magma ocean can be induced by tides only with additional atmospheric regulation of energy transport.
  lay_summary: 'Rocky exoplanets on tight orbits experience internal tidal heating, similar to how Jupiter''s gravity keeps
    Io volcanically active. We discovered a self-regulating feedback: as tidal heating melts the mantle, the softened rock
    dissipates tidal energy less efficiently, capping the heating rate far below previous estimates. Despite this self-limitation,
    tidal heating in the L 98-59 system can still sustain magma oceans for billions of years.'
  lay_summary_draft: 'Rocky exoplanets on tight orbits experience internal tidal heating, similar to how Jupiter''s gravity
    keeps Io volcanically active. We discovered a self-regulating feedback: as tidal heating melts the mantle, the softened
    rock dissipates tidal energy less efficiently, capping the heating rate far below previous estimates. Despite this self-limitation,
    tidal heating in the L 98-59 system can still sustain magma oceans for billions of years.'
  _raw: '**Nicholls H**, CM Guimond, CFC Hay, RD Chatterjee, **T Lichtenberg**, RT Pierrehumbert. [Self-limited tidal heating
    and prolonged magma oceans in the L 98-59 system.](https://scixplorer.org/abs/2025arXiv250503604N/abstract) *Monthly Notices
    of the Royal Astronomical Society* 541, 2566–2584 (2025). [pdf](https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/staf1167/63775631/staf1167.pdf)'
- slug: apai-2025-terminology
  section: research
  subsection: published
  year: 2025
  authors_md: Apai D, R Barnes, MM Murphy, **T Lichtenberg** et al
  title: A Terminology and Quantitative Framework for Assessing the Habitability of Solar System and Extraterrestrial Worlds
  venue_md: '*The Planetary Science Journal* 6, 165 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv250522808A/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/addda8/pdf
    scix: https://scixplorer.org/abs/2025arXiv250522808A/abstract
    doi: https://doi.org/10.3847/psj/addda8
  bibcode: 2025arXiv250522808A
  lab_led: false
  abstract: 'The search for extraterrestrial life in the Solar System and beyond is a key science driver in astrobiology,
    planetary science, and astrophysics. A critical step is the identification and characterization of potential habitats,
    both to guide the search and to interpret its results. However, a well-accepted, self-consistent, flexible, and quantitative
    terminology and method of assessment of habitability are lacking. Our paper fills this gap based on a three year-long
    study by the NExSS Quantitative Habitability Science Working Group. We reviewed past studies of habitability, but find
    that the lack of a universally valid definition of life prohibits a universally applicable definition of habitability.
    A more nuanced approach is needed. We introduce a quantitative habitability assessment framework (QHF) that enables self-consistent,
    probabilistic assessment of the compatibility of two models: First, a habitat model, which describes the probability distributions
    of key conditions in the habitat. Second, a viability model, which describes the probability that a metabolism is viable
    given a set of environmental conditions. We provide an open-source implementation of this framework and four examples
    as a proof of concept: (a) Comparison of two exoplanets for observational target prioritization; (b) Interpretation of
    atmospheric O₂ detection in two exoplanets; (c) Subsurface habitability of Mars; and (d) Ocean habitability in Europa.
    These examples demonstrate that our framework can self-consistently inform astrobiology research over a broad range of
    questions. The proposed framework is modular so that future work can expand the range and complexity of models available,
    both for habitats and for metabolisms.'
  lay_summary: Assessing whether a planet could support life requires a consistent framework, but existing terminology around
    habitability is used inconsistently across the scientific community. This paper proposes a standardized quantitative framework
    and terminology for evaluating the habitability of both Solar System and extrasolar worlds.
  lay_summary_draft: null
  _raw: Apai D, R Barnes, MM Murphy, **T Lichtenberg** et al. [A Terminology and Quantitative Framework for Assessing the
    Habitability of Solar System and Extraterrestrial Worlds.](https://scixplorer.org/abs/2025arXiv250522808A/abstract) *The
    Planetary Science Journal* 6, 165 (2025). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/addda8/pdf)
- slug: boer-2025-absence
  section: research
  subsection: published
  year: 2025
  authors_md: '**Boer ID**, **H Nicholls**, **T Lichtenberg**'
  title: Absence of a Runaway Greenhouse Limit on Lava Planets
  venue_md: '*The Astrophysical Journal* 987, 172 (2025)'
  primary_url: https://scixplorer.org/abs/2025ApJ...987..172B
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/add69f/pdf
    scix: https://scixplorer.org/abs/2025ApJ...987..172B
    doi: https://doi.org/10.3847/1538-4357/add69f
  bibcode: 2025ApJ...987..172B
  lab_led: true
  abstract: 'Climate transitions on exoplanets offer valuable insights into the atmospheric processes governing planetary
    habitability. Previous pure-steam atmospheric models show a thermal limit in outgoing long-wave radiation, which has been
    used to define the inner edge of the classical habitable zone and guide exoplanet surveys aiming to identify and characterize
    potentially habitable worlds. We expand upon previous modelling by treating (i) the dissolution of volatiles into a magma
    ocean underneath the atmosphere, (ii) a broader volatile range of the atmospheric composition including H₂O, CO₂, CO,
    H₂, CH₄, and N₂, and (iii) a surface-temperature- and mantle-redox-dependent equilibrium chemistry. We find that multicomponent
    atmospheres of outgassed composition located above partially or fully molten mantles do not exhibit the characteristic
    thermal radiation limit that arises from pure-steam models, thereby undermining the canonical concept of a runaway greenhouse
    limit, and hence challenging the conventional approach of using it to define an irradiation-based habitable zone. Our
    results show that atmospheric heat loss to space is strongly dependent on the oxidation and melting state of the underlying
    planetary mantle, through their significant influence on the atmosphere''s equilibrium composition. This suggests an evolutionary
    hysteresis in climate scenarios: Initially molten and cooling planets do not converge to the same climate regime as solidified
    planets that heat up by external irradiation. Steady-state models cannot recover evolutionary climate transitions, which
    instead require self-consistent models of the temporal evolution of the coupled feedback processes between interior and
    atmosphere over geologic time.'
  lay_summary: 'The ''runaway greenhouse'' concept defines the inner edge of the habitable zone: the distance from a star
    where a planet''s oceans would boil away irreversibly. We show that this thermal limit, derived from pure-steam atmosphere
    models, vanishes when we account for the complex chemistry of atmospheres above magma oceans. Whether a planet retains
    habitable conditions depends not just on how much starlight it receives, but on the composition and melting state of its
    interior.'
  lay_summary_draft: 'The ''runaway greenhouse'' concept defines the inner edge of the habitable zone: the distance from a
    star where a planet''s oceans would boil away irreversibly. We show that this thermal limit, derived from pure-steam atmosphere
    models, vanishes when we account for the complex chemistry of atmospheres above magma oceans. Whether a planet retains
    habitable conditions depends not just on how much starlight it receives, but on the composition and melting state of its
    interior.'
  _raw: '**Boer ID**, **H Nicholls**, **T Lichtenberg**. [Absence of a Runaway Greenhouse Limit on Lava Planets.](https://scixplorer.org/abs/2025ApJ...987..172B)
    *The Astrophysical Journal* 987, 172 (2025). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/add69f/pdf)'
- slug: schlecker-2025-bioverse
  section: research
  subsection: published
  year: 2025
  authors_md: Schlecker M, D Apai, A Affholder, S Ranjan, R Ferrière, KK Hardegree-Ullman, **T Lichtenberg**, S Mazevet
  title: 'Bioverse: Potentially Observable Exoplanet Biosignature Patterns Under the UV Threshold Hypothesis for the Origin
    of Life'
  venue_md: '*The Astrophysical Journal* 987, 24 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv250404261S
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/adc8a9/pdf
    scix: https://scixplorer.org/abs/2025arXiv250404261S
    doi: https://doi.org/10.3847/1538-4357/adc8a9
  bibcode: 2025arXiv250404261S
  lab_led: false
  abstract: A wide variety of scenarios for the origin of life have been proposed, with many influencing the prevalence and
    distribution of biosignatures across exoplanet populations. This relationship suggests these scenarios can be tested by
    predicting biosignature distributions and comparing them with empirical data. Here, we demonstrate this approach by focusing
    on the cyanosulfidic origins-of-life scenario and investigating the hypothesis that a minimum near-ultraviolet (NUV) flux
    is necessary for abiogenesis. Using Bayesian modeling and the Bioverse survey simulator, we constrain the probability
    of obtaining strong evidence for or against this ``UV Threshold Hypothesis'' with future biosignature surveys. Our results
    indicate that a correlation between past NUV flux and current biosignature occurrence is testable for sample sizes of
    50 planets. The diagnostic power of such tests is critically sensitive to the intrinsic abiogenesis rate and host star
    properties, particularly maximum past NUV fluxes. Surveys targeting a wide range of fluxes, and planets orbiting M dwarfs
    enhance the chances of conclusive results, with sample sizes 100 providing 80\% likelihood of strong evidence if abiogenesis
    rates are high and the required NUV fluxes are moderate. For required fluxes exceeding a few hundred erg/s/cm², both the
    fraction of inhabited planets and the diagnostic power sharply decrease. Our findings demonstrate the potential of exoplanet
    surveys to test origins-of-life hypotheses. Beyond specific scenarios, this work underscores the broader value of realistic
    survey simulations for future observatories (e.g., HWO, LIFE, ELTs, Nautilus) in identifying testable science questions,
    optimizing mission strategies, and advancing theoretical and experimental studies of abiogenesis.
  lay_summary: The conditions under which life originates may leave detectable patterns in the distribution of biosignatures
    across exoplanet populations. This study models how UV-driven origin-of-life scenarios would imprint on observable biosignature
    statistics and shows how future surveys could test these hypotheses.
  lay_summary_draft: null
  _raw: 'Schlecker M, D Apai, A Affholder, S Ranjan, R Ferrière, KK Hardegree-Ullman, **T Lichtenberg**, S Mazevet. [Bioverse:
    Potentially Observable Exoplanet Biosignature Patterns Under the UV Threshold Hypothesis for the Origin of Life.](https://scixplorer.org/abs/2025arXiv250404261S)
    *The Astrophysical Journal* 987, 24 (2025). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/adc8a9/pdf)'
- slug: farhat-2025-tides
  section: research
  subsection: published
  year: 2025
  authors_md: Farhat M, P Auclair-Desrotour, G Boué, **T Lichtenberg**, J Laskar
  title: 'Tides on Lava Worlds: Application to Close-in Exoplanets and the Early Earth-Moon System'
  venue_md: '*The Astrophysical Journal* 979, 133 (2025)'
  primary_url: https://scixplorer.org/abs/2025ApJ...979..133F/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/ad9b93/pdf
    scix: https://scixplorer.org/abs/2025ApJ...979..133F/abstract
    doi: https://doi.org/10.3847/1538-4357/ad9b93
  bibcode: 2025ApJ...979..133F
  lab_led: false
  abstract: 'Understanding the physics of planetary magma oceans has been the subject of growing efforts, in light of the
    increasing abundance of solar system samples and extrasolar surveys. A rocky planet harboring such an ocean is likely
    to interact tidally with its host star, planetary companions, or satellites. To date, however, models of the tidal response
    and heat generation of magma oceans have been restricted to the framework of weakly viscous solids, ignoring the dynamical
    fluid behavior of the ocean beyond a critical melt fraction. Here we provide a handy analytical model that accommodates
    this phase transition, allowing for a physical estimation of the tidal response of lava worlds. We apply the model in
    two settings: the tidal history of the early Earth–Moon system in the aftermath of the giant impact, and the tidal interplay
    between short-period exoplanets and their host stars. For the former, we show that the fluid behavior of the Earth''s
    molten surface drives efficient early lunar recession to 25 Earth radii within 104–105 yr, in contrast with earlier predictions.
    For close-in exoplanets, we report on how their molten surfaces significantly change their spin–orbit dynamics, allowing
    them to evade spin–orbit resonances and accelerating their track toward tidal synchronization from a gigayear to megayear
    timescale. Moreover, we reevaluate the energy budgets of detected close-in exoplanets, highlighting how the surface thermodynamics
    of these planets are likely controlled by enhanced, fluid-driven tidal heating, rather than vigorous insolation, and how
    this regime change substantially alters predictions for their surface temperatures.'
  lay_summary: Rocky planets with molten surfaces experience tidal forces from their host star that dissipate energy very
    differently than in solid bodies. This study develops a new tidal framework for lava worlds and applies it to close-in
    exoplanets and the early Earth-Moon system, showing that magma oceans strongly enhance tidal heating and orbital evolution.
  lay_summary_draft: null
  _raw: 'Farhat M, P Auclair-Desrotour, G Boué, **T Lichtenberg**, J Laskar. [Tides on Lava Worlds: Application to Close-in
    Exoplanets and the Early Earth-Moon System.](https://scixplorer.org/abs/2025ApJ...979..133F/abstract) *The Astrophysical
    Journal* 979, 133 (2025). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/ad9b93/pdf)'
- slug: hammond-2025-reliable
  section: research
  subsection: published
  year: 2025
  authors_md: Hammond M, CM Guimond, **T Lichtenberg**, **H Nicholls**, et al
  title: Reliable Detections of Atmospheres on Rocky Exoplanets with Photometric JWST Phase Curves
  venue_md: '*The Astrophysical Journal Letters* 978, L40 (2025)'
  primary_url: https://scixplorer.org/abs/2025ApJ...978L..40H/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ada0bc/pdf
    scix: https://scixplorer.org/abs/2025ApJ...978L..40H/abstract
    doi: https://doi.org/10.3847/2041-8213/ada0bc
  bibcode: 2025ApJ...978L..40H
  lab_led: false
  abstract: The prevalence of atmospheres on rocky planets is one of the major questions in exoplanet astronomy, but there
    are currently no published unambiguous detections of atmospheres on any rocky exoplanets. The MIRI instrument on JWST
    can measure thermal emission from tidally locked rocky exoplanets orbiting small, cool stars. This emission is a function
    of their surface and atmospheric properties, potentially allowing detections of atmospheres. One way to find atmospheres
    is to search for lower dayside emission than would be expected for a blackbody planet. Another technique is to measure
    phase curves of thermal emission to search for nightside emission due to atmospheric heat redistribution. Here, we compare
    strategies for detecting atmospheres on rocky exoplanets. We simulate secondary eclipse and phase curve observations in
    the MIRI F1500W and F1280W filters for a range of surfaces (providing our open-access albedo data) and atmospheres on
    30 exoplanets selected for their F1500W signal-to-noise ratio. We show that secondary eclipse observations are more degenerate
    between surfaces and atmospheres than suggested in previous work, and that thick atmospheres can support emission consistent
    with a blackbody planet in these filters. These results make it difficult to unambiguously detect or rule out atmospheres
    using their photometric dayside emission alone. We suggest that an F1500W phase curve could instead be observed for a
    similar sample of planets. While phase curves are time-consuming and their instrumental systematics can be challenging,
    we suggest that they allow the only unambiguous detections of atmospheres by nightside thermal emission.
  lay_summary: Detecting atmospheres on rocky exoplanets is a major goal of current astronomy, but no unambiguous detection
    exists yet. This study demonstrates that photometric phase curve observations with JWST can reliably distinguish between
    rocky planets with and without atmospheres by measuring how heat is redistributed from dayside to nightside.
  lay_summary_draft: null
  _raw: Hammond M, CM Guimond, **T Lichtenberg**, **H Nicholls**, et al. [Reliable Detections of Atmospheres on Rocky Exoplanets
    with Photometric JWST Phase Curves.](https://scixplorer.org/abs/2025ApJ...978L..40H/abstract) *The Astrophysical Journal
    Letters* 978, L40 (2025). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ada0bc/pdf)
- slug: nicholls-2025-convective
  section: research
  subsection: published
  year: 2025
  authors_md: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**, **L Soucasse**, **S Smeets**'
  title: Convective shutdown in the atmospheres of lava worlds
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 536, 2957-2971 (2025)'
  primary_url: https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract
  links:
    pdf: https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/stae2772/61218697/stae2772.pdf
    scix: https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract
    doi: https://doi.org/10.1093/mnras/stae2772
  bibcode: 2025MNRAS.536.2957N
  lab_led: true
  abstract: 'Atmospheric energy transport is central to the cooling of primordial magma oceans. Theoretical studies of atmospheres
    on lava planets have assumed that convection is the only process involved in setting the atmospheric temperature structure.
    This significantly influences the ability for a magma ocean to cool. It has been suggested that convective stability in
    these atmospheres could preclude permanent magma oceans. We develop a new 1D radiative-convective model in order to investigate
    when the atmospheres overlying magma oceans are convectively stable. Using a coupled interior-atmosphere framework, we
    simulate the early evolution of two terrestrial-mass exoplanets: TRAPPIST-1 c and HD 63433 d. Our simulations suggest
    that the atmosphere of HD 63433 d exhibits deep isothermal layers which are convectively stable. However, it is able to
    maintain a permanent magma ocean and an atmosphere depleted in H₂O. It is possible to maintain permanent magma oceans
    underneath atmospheres without convection. Absorption features of CO₂ and SO₂ within synthetic emission spectra are associated
    with mantle redox state, meaning that future observations of HD 63433 d may provide constraints on the geochemical properties
    of a magma ocean analogous with the early Earth. Simulations of TRAPPIST-1 c indicate that it is expected to have solidified
    within 100 Myr, outgassing a thick atmosphere in the process. Cool isothermal stratospheres generated by low-molecular-weight
    atmospheres can mimic the emission of an atmosphere-less body. Future work should consider how atmospheric escape and
    chemistry modulates the lifetime of magma oceans, and the role of tidal heating in sustaining atmospheric convection.'
  lay_summary: Models of lava planets typically assume their thick atmospheres transport heat upward through convection, similar
    to boiling water. We find that some lava world atmospheres develop deep layers where convection shuts down entirely, yet
    the planet can still maintain a permanent magma ocean. This matters for interpreting upcoming telescope observations,
    because the atmospheric structure and chemistry change dramatically when convection is absent.
  lay_summary_draft: Models of lava planets typically assume their thick atmospheres transport heat upward through convection,
    similar to boiling water. We find that some lava world atmospheres develop deep layers where convection shuts down entirely,
    yet the planet can still maintain a permanent magma ocean. This matters for interpreting upcoming telescope observations,
    because the atmospheric structure and chemistry change dramatically when convection is absent.
  _raw: '**Nicholls H**, RT Pierrehumbert, **T Lichtenberg**, **L Soucasse**, **S Smeets**. [Convective shutdown in the atmospheres
    of lava worlds.](https://scixplorer.org/abs/2025MNRAS.536.2957N/abstract) *Monthly Notices of the Royal Astronomical Society*
