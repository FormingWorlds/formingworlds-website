- slug: cesario-2024-large
  section: research
  subsection: published
  year: 2024
  authors_md: '**Cesario L**, **T Lichtenberg** et al'
  title: Large Interferometer For Exoplanets (LIFE). XIV. Finding terrestrial protoplanets in the galactic neighborhood
  venue_md: '*Astronomy & Astrophysics* 692, A172 (2024)'
  primary_url: https://scixplorer.org/abs/2024arXiv241013457C
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2024/12/aa50764-24.pdf
    scix: https://scixplorer.org/abs/2024arXiv241013457C
    doi: https://doi.org/10.48550/arxiv.2410.13457
  bibcode: 2024A&A...692A.172C
  lab_led: true
  abstract: Context. The increased brightness temperature of young rocky protoplanets during their magma ocean epoch makes
    them potentially amenable to atmospheric characterization at distances from the Solar System far greater than thermally
    equilibrated terrestrial exoplanets, offering observational opportunities for unique insights into the origin of secondary
    atmospheres and the near surface conditions of prebiotic environments. Aims. The Large Interferometer For Exoplanets (LIFE)
    mission will employ a space-based midinfrared nulling interferometer to directly measure the thermal emission of terrestrial
    exoplanets. In this work, we seek to assess the capabilities of various instrumental design choices of the LIFE mission
    concept for the detection of cooling protoplanets with transient high-temperature magma ocean atmospheres at the tail
    end of planetary accretion. In particular, we investigate the minimum integration times necessary to detect transient
    magma ocean exoplanets in young stellar associations in the Solar neighborhood. Methods. Using the LIFE mission instrument
    simulator (LIFEsim), we assessed how specific instrumental parameters and design choices, such as wavelength coverage,
    aperture diameter, and photon throughput, facilitate or disadvantage the detection of protoplan-ets. We focused on the
    observational sensitivities of distance to the observed planetary system, protoplanet brightness temperature (using a
    blackbody assumption), and orbital distance of the potential protoplanets around both G- and M-dwarf stars. Results. Our
    simulations suggest that LIFE will be able to detect (S/N ≥ 7) hot protoplanets in young stellar associations up to distances
    of 100 pc from the Solar System for reasonable integration times (up to a few hours). Detection of an Earth-sized protoplanet
    orbiting a Solar-sized host star at 1 AU requires less than 30 minutes of integration time. M-dwarfs generally need shorter
    integration times. The contribution from wavelength regions smaller than 6 µm is important for decreasing the detection
    threshold and discriminating emission temperatures. Conclusions. The LIFE mission is capable of detecting cooling terrestrial
    protoplanets within minutes to hours in several local young stellar associations hosting potential targets. The anticipated
    compositional range of magma ocean atmospheres motivates further architectural design studies to characterize the crucial
    transition from primary to secondary atmospheres.
  lay_summary: Young rocky planets glow brightly in infrared light while their surfaces are still molten, making them visible
    at much greater distances than cooled, habitable-zone planets. We assessed whether the proposed LIFE space telescope could
    detect these young, molten worlds and found it could spot Earth-sized protoplanets in nearby star-forming regions within
    minutes to hours of observation. Detecting planets in this early molten stage would reveal how secondary atmospheres first
    form on rocky worlds.
  lay_summary_draft: Young rocky planets glow brightly in infrared light while their surfaces are still molten, making them
    visible at much greater distances than cooled, habitable-zone planets. We assessed whether the proposed LIFE space telescope
    could detect these young, molten worlds and found it could spot Earth-sized protoplanets in nearby star-forming regions
    within minutes to hours of observation. Detecting planets in this early molten stage would reveal how secondary atmospheres
    first form on rocky worlds.
  _raw: '**Cesario L**, **T Lichtenberg** et al. [Large Interferometer For Exoplanets (LIFE). XIV. Finding terrestrial protoplanets
    in the galactic neighborhood.](https://scixplorer.org/abs/2024arXiv241013457C) *Astronomy & Astrophysics* 692, A172 (2024).
    [pdf](https://www.aanda.org/articles/aa/pdf/2024/12/aa50764-24.pdf)'
- slug: eatson-2024-towards
  section: research
  subsection: published
  year: 2024
  authors_md: Eatson JW, RJ Parker, **T Lichtenberg**
  title: Towards a unified injection model of short-lived radioisotopes in N-body simulations of star-forming regions
  venue_md: '*The Astrophysical Journal* 977, 13 (2024)'
  primary_url: https://scixplorer.org/abs/2024arXiv241017163E
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/ad8642/pdf
    scix: https://scixplorer.org/abs/2024arXiv241017163E
    doi: https://doi.org/10.3847/1538-4357/ad8642
  bibcode: 2024arXiv241017163E
  lab_led: false
  abstract: Recent research provides compelling evidence that the decay of short-lived radioisotopes (SLRs), such as ²⁶Al,
    provided the bulk of energy for heating and desiccation of volatile-rich planetesimals in the early Solar System. However,
    it remains unclear whether the early Solar System was highly enriched relative to other planetary systems with similar
    formation characteristics. While the Solar System possesses an elevated level of SLR enrichment compared to the interstellar
    medium, determining SLR enrichment of individual protoplanetary disks observationally has not been performed and is markedly
    more difficult. We use N-body simulations to estimate enrichment of SLRs in star-forming regions through two likely important
    SLR sources, stellar winds from massive stars and supernovae. We vary the number of stars and the radii of the star-forming
    regions and implement two models of stellar wind SLR propagation for the radioisotopes ²⁶Al and ⁶⁰Fe. We find that for
    ²⁶Al enrichment the Solar System is at the upper end of the expected distribution, while for the more supernovae dependent
    isotope ⁶⁰Fe we find that the Solar System is comparatively very highly enriched. Furthermore, combined with our previous
    research, these results suggest that the statistical role of ²⁶Al-driven desiccation on exoplanet bulk composition may
    be underestimated in typical interpretations of the low-mass exoplanet census, and that ⁶⁰Fe is even less influential
    as a source of heating than previously assumed.
  lay_summary: Short-lived radioactive isotopes like aluminium-26 heated the building blocks of planets in our early Solar
    System, but it is unclear whether this enrichment was typical or unusual. This study develops a unified model for how
    these isotopes are injected into young planetary systems within star-forming regions.
  lay_summary_draft: null
  _raw: Eatson JW, RJ Parker, **T Lichtenberg**. [Towards a unified injection model of short-lived radioisotopes in N-body
    simulations of star-forming regions.](https://scixplorer.org/abs/2024arXiv241017163E) *The Astrophysical Journal* 977,
    13 (2024). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/ad8642/pdf)
- slug: meier-2024-geodynamics
  section: research
  subsection: published
  year: 2024
  authors_md: Meier TG, DJ Bower, **T Lichtenberg**, M Hammond, PJ Tackley, RT Pierrehumbert, et al
  title: Geodynamics of super-Earth GJ 486b
  venue_md: '*Journal of Geophysical Research: Planets* 129, e2024JE008491 (2024)'
  primary_url: https://arxiv.org/abs/2408.10851
  links:
    scix: https://scixplorer.org/abs/arXiv:2408.10851
    pdf: https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2024JE008491
    doi: https://doi.org/10.1029/2024JE008491
  bibcode: null
  lab_led: false
  abstract: Many super-Earths are on very short orbits around their host star and, therefore, more likely to be tidally locked.
    Because this locking can lead to a strong contrast between the dayside and nightside surface temperatures, these super-Earths
    could exhibit mantle convection patterns and tectonics that could differ significantly from those observed in the present-day
    solar system. The presence of an atmosphere, however, would allow transport of heat from the dayside towards the nightside
    and thereby reduce the surface temperature contrast between the two hemispheres. On rocky planets, atmospheric and geodynamic
    regimes are closely linked, which directly connects the question of atmospheric thickness to the potential interior dynamics
    of the planet. Here, we study the interior dynamics of super-Earth GJ 486b (R=1.34 R⊕, M=3.0 M⊕, T_eq≈700 K), which is
    one of the most suitable M-dwarf super-Earth candidates for retaining an atmosphere produced by degassing from the mantle
    and magma ocean. We investigate how the geodynamic regime of GJ 486b is influenced by different surface temperature contrasts
    by varying possible atmospheric circulation regimes. We also investigate how the strength of the lithosphere affects the
    convection pattern. We find that hemispheric tectonics, the surface expression of degree-1 convection with downwellings
    forming on one hemisphere and upwelling material rising on the opposite hemisphere, is a consequence of the strong lithosphere
    rather than surface temperature contrast. Anchored hemispheric tectonics, where downwellings und upwellings have a preferred
    (day/night) hemisphere, is favoured for strong temperature contrasts between the dayside and nightside and higher surface
    temperatures.
  lay_summary: Super-Earth GJ 486b orbits so close to its star that one side permanently faces the star, creating extreme
    temperature contrasts. This study models how the resulting mantle convection patterns differ from Earth's plate tectonics
    and could produce observable volcanic activity concentrated on specific parts of the surface.
  lay_summary_draft: null
  _raw: 'Meier TG, DJ Bower, **T Lichtenberg**, M Hammond, PJ Tackley, RT Pierrehumbert, et al. [Geodynamics of super-Earth
    GJ 486b.](https://arxiv.org/abs/2408.10851) *Journal of Geophysical Research: Planets* 129, e2024JE008491 (2024). [pdf](https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2024JE008491)'
- slug: eatson-2024-devolatilization
  section: research
  subsection: published
  year: 2024
  authors_md: Eatson JW, **T Lichtenberg**, RJ Parker, TV Gerya
  title: Devolatilization of extrasolar planetesimals by 60Fe and 26Al heating
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 528, 6619-6630 (2024)'
  primary_url: https://scixplorer.org/abs/2024arXiv240206476E/abstract
  links:
    pdf: https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/stae438/56681885/stae438.pdf
    scix: https://scixplorer.org/abs/2024arXiv240206476E/abstract
    doi: https://doi.org/10.1093/mnras/stae438
  bibcode: 2024arXiv240206476E
  lab_led: false
  abstract: Whilst the formation of Solar system planets is constrained by meteoritic evidence, the geophysical history of
    low-mass exoplanets is much less clear. The bulk composition and climate states of rocky exoplanets may vary significantly
    based on the composition and properties of the planetesimals they form from. An important factor influenced by planetesimal
    composition is water content, where the desiccation of accreting planetesimals impacts the final water content of the
    resultant planets. While the inner planets of the Solar system are comparatively water-poor, recent observational evidence
    from exoplanet bulk densities and planetary formation models suggest that rocky exoplanets engulfed by substantial layers
    of high-pressure ices or massive steam atmospheres could be widespread. Here we quantify variations in planetesimal desiccation
    due to potential fractionation of the two short-lived radioisotopes ²⁶Al and ⁶⁰Fe relevant for internal heating on planetary
    formation timescales. We focus on how order of magnitude variations in ⁶⁰Fe can affect the water content of planetesimals,
    and how this may alter the formation of extrasolar ocean worlds. We find that heating by ²⁶Al is the dominant cause of
    planetesimal heating in any Solar system analogue scenario, thus validating previous works focussing only on this radioisotope.
    However, ⁶⁰Fe can become the primary heating source in the case of high levels of supernova enrichment in massive star-forming
    regions. These diverging scenarios can affect the formation pathways, bulk volatile budget, and climate diversity of low-mass
    exoplanets.
  lay_summary: The water and volatile content of rocky planets depends on how much heating their building blocks experienced
    from radioactive decay during formation. This study models how the radioactive isotopes aluminium-26 and iron-60 drive
    the drying of planetesimals across different planetary systems, showing that volatile delivery to planets varies widely.
  lay_summary_draft: null
  _raw: Eatson JW, **T Lichtenberg**, RJ Parker, TV Gerya. [Devolatilization of extrasolar planetesimals by 60Fe and 26Al
    heating.](https://scixplorer.org/abs/2024arXiv240206476E/abstract) *Monthly Notices of the Royal Astronomical Society*
    528, 6619-6630 (2024). [pdf](https://academic.oup.com/mnras/advance-article-pdf/doi/10.1093/mnras/stae438/56681885/stae438.pdf)
- slug: shorttle-2024-distinguishing
  section: research
  subsection: published
  year: 2024
  authors_md: Shorttle O, S Jordan, **H Nicholls**, **T Lichtenberg**, DJ Bower
  title: Distinguishing oceans of water from magma on mini-Neptune K2-18b
  venue_md: '*The Astrophysical Journal Letters* 962, L8 (2024)'
  primary_url: https://scixplorer.org/abs/2024ApJ...962L...8S
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ad206e/pdf
    scix: https://scixplorer.org/abs/2024ApJ...962L...8S
    doi: https://doi.org/10.3847/2041-8213/ad206e
  bibcode: 2024ApJ...962L...8S
  lab_led: false
  abstract: 'Mildly irradiated mini-Neptunes have densities potentially consistent with them hosting substantial liquid-water
    oceans (“Hycean” planets). The presence of CO₂ and simultaneous absence of ammonia (NH₃ ) in their atmospheres has been
    proposed as a fingerprint of such worlds. JWST observations of K2-18b, the archetypal Hycean, have found the presence
    of CO₂ and the depletion of NH₃ to 4 μ m region, where CO₂ and CO features dominate: magma ocean models suggest a systematically
    lower CO₂ /CO ratio than estimated from free-chemistry retrieval, indicating that deeper observations of this spectral
    region may be able to distinguish between oceans of liquid water and magma on mini-Neptunes.'
  lay_summary: The mini-Neptune K2-18b has been proposed as a possible ocean world based on JWST atmospheric observations.
    This study shows that the same spectral signatures, including CO₂ and the absence of ammonia, can be explained by a magma
    ocean interior rather than a liquid water ocean, making it difficult to distinguish between these two very different scenarios.
  lay_summary_draft: null
  _raw: Shorttle O, S Jordan, **H Nicholls**, **T Lichtenberg**, DJ Bower. [Distinguishing oceans of water from magma on mini-Neptune
    K2-18b.](https://scixplorer.org/abs/2024ApJ...962L...8S) *The Astrophysical Journal Letters* 962, L8 (2024). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ad206e/pdf)
- slug: schlecker-2024-bioverse
  section: research
  subsection: published
  year: 2024
  authors_md: Schlecker M, D Apai, **T Lichtenberg**, G Bergsten, A Salvador, KK Hardegree-Ullman
  title: 'Bioverse: The Habitable Zone Inner Edge Discontinuity as an Imprint of Runaway Greenhouse Climates on Exoplanet
    Demographics'
  venue_md: '*The Planetary Science Journal* 5, 3 (2024)'
  primary_url: https://scixplorer.org/abs/2023arXiv230904518S/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/acf57f/pdf
    video: https://youtu.be/acgKcdTTv9c
    scix: https://scixplorer.org/abs/2023arXiv230904518S/abstract
    doi: https://doi.org/10.3847/psj/acf57f
  bibcode: 2023arXiv230904518S
  lab_led: false
  abstract: 'Long-term magma ocean phases on rocky exoplanets orbiting closer to their star than the runaway greenhouse threshold
    - the inner edge of the classical habitable zone - may offer insights into the physical and chemical processes that distinguish
    potentially habitable worlds from others. Thermal stratification of runaway planets is expected to significantly inflate
    their atmospheres, potentially providing observational access to the runaway greenhouse transition in the form of a "habitable
    zone inner edge discontinuity" in radius-density space. Here, we use Bioverse, a statistical framework combining contextual
    information from the overall planet population with a survey simulator, to assess the ability of ground- and space-based
    telescopes to test this hypothesis. We find that the demographic imprint of the runaway greenhouse transition is likely
    detectable with high-precision transit photometry for sample sizes 100 planets if at least 10 % of those orbiting closer
    than the habitable zone inner edge harbor runaway climates. Our survey simulations suggest that in the near future, ESA''s
    PLATO mission will be the most promising survey to probe the habitable zone inner edge discontinuity. We determine survey
    strategies that maximize the diagnostic power of the obtained data and identify as key mission design drivers: 1. A follow-up
    campaign of planetary mass measurements and 2. The fraction of low-mass stars in the target sample. Observational constraints
    on the runaway greenhouse transition will provide crucial insights into the distribution of atmospheric volatiles among
    rocky exoplanets, which may help to identify the nearest potentially habitable worlds.'
  lay_summary: Rocky planets closer to their star than the runaway greenhouse threshold lose their oceans and become desiccated.
    This study predicts that this transition should create a detectable gap in the distribution of exoplanet properties, offering
    a way for future surveys to test our understanding of how planets lose their water.
  lay_summary_draft: null
  _raw: 'Schlecker M, D Apai, **T Lichtenberg**, G Bergsten, A Salvador, KK Hardegree-Ullman. [Bioverse: The Habitable Zone
    Inner Edge Discontinuity as an Imprint of Runaway Greenhouse Climates on Exoplanet Demographics.](https://scixplorer.org/abs/2023arXiv230904518S/abstract)
    *The Planetary Science Journal* 5, 3 (2024). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/acf57f/pdf), [video](https://youtu.be/acgKcdTTv9c)'
- slug: patel-2023-photoevaporation
  section: research
  subsection: published
  year: 2023
  authors_md: Patel M, CKM Polius, M Ridsdill-Smith, **T Lichtenberg**, R Parker
  title: Photoevaporation versus enrichment in the cradle of the Sun
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 525, 2399–2410 (2023)'
  primary_url: https://scixplorer.org/abs/2023MNRAS.tmp.2344P
  links:
    pdf: https://academic.oup.com/mnras/article-pdf/525/2/2399/51273834/stad2415.pdf
    scix: https://scixplorer.org/abs/2023MNRAS.tmp.2344P
    doi: https://doi.org/10.1093/mnras/stad2415
  bibcode: 2023MNRAS.tmp.2344P
  lab_led: false
  abstract: The presence of short-lived radioisotopes (SLRs) ²⁶Al and ⁶⁰Fe in the Solar system places constraints on the initial
    conditions of our planetary system. Most theories posit that the origin of ²⁶Al and ⁶⁰Fe is in the interiors of massive
    stars, and they are either delivered directly to the protosolar disc from the winds and supernovae of the massive stars,
    or indirectly via a sequential star formation event. However, massive stars that produce SLRs also emit photoionising
    far and extreme ultraviolet radiation, which can destroy the gas component of protoplanetary discs, possibly precluding
    the formation of gas giant planets like Jupiter and Saturn. Here, we perfom N-body simulations of star-forming regions
    and determine whether discs that are enriched in SLRs can retain enough gas to form Jovian planets. We find that discs
    are enriched and survive the photoionising radiation only when the dust radius of the disc is fixed and not allowed to
    move inwards due to the photoevaporation, or outwards due to viscous spreading. Even in this optimal scenario, not enough
    discs survive until the supernovae of the massive stars and so have zero or very little enrichment in ⁶⁰Fe. We therefore
    suggest that the delivery of SLRs to the Solar system may not come from the winds and supernovae of massive stars.
  lay_summary: The radioactive isotopes found in Solar System meteorites must have been produced by nearby massive stars,
    but the same stellar winds and radiation can strip material from young planetary disks. This study quantifies how photoevaporation
    competes with isotope enrichment in star-forming regions, helping explain the Solar System's specific composition.
  lay_summary_draft: null
  _raw: Patel M, CKM Polius, M Ridsdill-Smith, **T Lichtenberg**, R Parker. [Photoevaporation versus enrichment in the cradle
    of the Sun.](https://scixplorer.org/abs/2023MNRAS.tmp.2344P) *Monthly Notices of the Royal Astronomical Society* 525,
    2399–2410 (2023). [pdf](https://academic.oup.com/mnras/article-pdf/525/2/2399/51273834/stad2415.pdf)
- slug: meier-2023-interior
  section: research
  subsection: published
  year: 2023
  authors_md: Meier TG, DJ Bower, **T Lichtenberg**, M Hammond, PJ Tackley
  title: Interior dynamics of super-Earth 55 Cancri e
  venue_md: '*Astronomy & Astrophysics* 678, A29 (2023)'
  primary_url: https://scixplorer.org/abs/2023arXiv230800592M
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2023/10/aa46950-23.pdf
    scix: https://scixplorer.org/abs/2023arXiv230800592M
    doi: https://doi.org/10.1051/0004-6361/202346950
  bibcode: 2023arXiv230800592M
  lab_led: false
  abstract: The ultra-short-period super-Earth 55 Cancri e has a measured radius of 1.8 Earth radii. Previous thermal phase
    curve observations suggest a strong temperature contrast between the dayside and nightside of around 1000 K with the hottest
    point shifted 41±12 degrees east from the substellar point, indicating some degree of heat circulation. The dayside (and
    potentially even the nightside) is hot enough to harbour a magma ocean. We use results from general circulation models
    (GCMs) of atmospheres to constrain the surface temperature contrasts. There is still a large uncertainty on the vigour
    and style of mantle convection in super-Earths, especially those that experience stellar irradiation large enough to harbour
    a magma ocean. In this work, we aim to constrain the mantle dynamics of the tidally locked lava world 55 Cancri e. Using
    the surface temperature contrasts as boundary condition, we model the mantle flow of 55 Cancri e using 2D mantle convection
    simulations and investigate how the convection regimes are affected by the different climate models. We find that large
    super-plumes form on the dayside if that hemisphere is covered by a magma ocean and the nightside remains solid or only
    partially molten. Cold material descends into the deep interior on the nightside, but no strong downwellings form. In
    some cases, the super-plume also moves several tens of degrees towards the terminator. A convective regime where the upwelling
    is preferentially on the dayside might lead to preferential outgassing on that hemisphere which could lead to the build-up
    of atmospheric species that could be chemically distinct from the nightside.
  lay_summary: Super-Earth 55 Cancri e shows a puzzling temperature pattern with a hot spot shifted away from the point directly
    facing the star. This study uses 2D mantle convection simulations to show that extreme day-night temperature contrasts
    drive large super-plumes on the dayside, with preferential outgassing that could produce hemisphere-scale differences
    in atmospheric chemistry.
  lay_summary_draft: null
  _raw: Meier TG, DJ Bower, **T Lichtenberg**, M Hammond, PJ Tackley. [Interior dynamics of super-Earth 55 Cancri e.](https://scixplorer.org/abs/2023arXiv230800592M)
    *Astronomy & Astrophysics* 678, A29 (2023). [pdf](https://www.aanda.org/articles/aa/pdf/2023/10/aa46950-23.pdf)
