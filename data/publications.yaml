- slug: attia-2026-paleos
  section: research
  subsection: preprints
  year: 2026
  authors_md: '**Attia M**, **T Lichtenberg**, **E Jungová**, **M Sastre**'
  title: 'PALEOS: Multiphase Equations of State and Mass-Radius Relations for Exoplanet Interiors'
  venue_md: null
  primary_url: https://arxiv.org/abs/2605.03741
  links:
    scix: https://scixplorer.org/abs/arXiv:2605.03741
    pdf: https://arxiv.org/pdf/2605.03741
  bibcode: null
  lab_led: true
  abstract: 'Modeling the interior of a rocky or water-rich exoplanet is a thermodynamic closure problem: every layer''s density,
    temperature gradient, and phase must follow from an equation of state (EoS) that remains self-consistent across the pressure-temperature
    range from surface to core. Existing EoS span disciplines, use different formalisms, and rarely supply the full thermodynamic
    quantities needed by evolutionary models of interior phase transitions. We present PALEOS (Planetary Assemblage Layers:
    Equations of State), an open-source toolkit consolidating EoS for iron, magnesium silicate (MgSiO₃), and water (H₂O) into
    a unified, phase-aware, thermally responsive framework spanning 17 phases. PALEOS derives density, energy, entropy, heat
    capacities, thermal expansion, and the adiabatic gradient analytically via Maxwell relations, and is released as lookup
    tables on regular P-T grids. We validate it against the Preliminary Reference Earth Model, recovering Earth''s radius
    to 0.3% and lower-mantle densities to 3%, and compute 17,900 mass-radius relations from 0.1 to 100 M⊕ for rocky (Fe +
    MgSiO₃) and water-rich (Earth-like core + H₂O envelope) compositions at 300-4000 K. Continuous solid-to-melt EoS let thermal
    expansion span the fully-solid to magma-ocean regime: the radius offset exceeds 1% above 1500 K and reaches 16% at 4000
    K for low-mass silicate planets, comparable to composition degeneracy and transit-radius uncertainties. We demonstrate
    this on two ultrashort-period super-Earths, WASP-47 e and TOI-1807 b: each admits two purely rocky solutions indistinguishable
    in mass and radius but in radically different states, one fully solid with no dynamo, the other hosting a deep magma ocean
    and a liquid iron core capable of sustaining a magnetic field. Phase-aware, thermally resolved EoS are essential for translating
    astronomical observations into exoplanetary geophysics.'
  lay_summary: 'To understand what rocky exoplanets are made of, we need accurate descriptions of how materials behave under
    extreme pressures and temperatures. PALEOS is an open-source toolkit that provides these descriptions for iron, rock,
    and water across 17 different material phases, from solid to fully molten. Applying it to observed exoplanets reveals
    that two planets with identical size and mass could be in completely different states: one frozen solid, the other hosting
    a deep magma ocean with an active magnetic field.'
  lay_summary_draft: 'To understand what rocky exoplanets are made of, we need accurate descriptions of how materials behave
    under extreme pressures and temperatures. PALEOS is an open-source toolkit that provides these descriptions for iron,
    rock, and water across 17 different material phases, from solid to fully molten. Applying it to observed exoplanets reveals
    that two planets with identical size and mass could be in completely different states: one frozen solid, the other hosting
    a deep magma ocean with an active magnetic field.'
  _raw: '**Attia M**, **T Lichtenberg**, **E Jungová**, **M Sastre**. [PALEOS: Multiphase Equations of State and Mass-Radius
    Relations for Exoplanet Interiors.](https://arxiv.org/abs/2605.03741) [pdf](https://arxiv.org/pdf/2605.03741)'
- slug: nicholls-2026-beyond
  section: research
  subsection: preprints
  year: 2026
  authors_md: Nicholls H, O Shorttle, **T Lichtenberg**, **F Pascal**
  title: 'Beyond the mass-radius plane: Integrated radiative-convective and interior structure simulations of the exoplanet
    continuum'
  venue_md: null
  primary_url: https://arxiv.org/abs/2604.15891
  links:
    scix: https://scixplorer.org/abs/arXiv:2604.15891
    pdf: https://arxiv.org/pdf/2604.15891
  bibcode: null
  lab_led: false
  abstract: Static structure models, which map mass-radius constraints to bulk planet composition, are frequently used to
    categorise exoplanets due to their computational efficiency and the high-level insight they offer into planetary properties.
    However, static structure models typically have simplified atmospheric treatments, which may introduce systematic biases
    when interpreting the structures, and therefore the climates, of sub-Neptunes and super-Earths.We present a framework
    for recovering exoplanet properties using static structure models that accounts for necessary physical-chemical complexity
    in their atmospheres. We produce a comprehensive library of 504,000 exoplanet simulations that unify deep planetary interior
    structure with radiative-convective-chemical climate calculations. From these models we demonstrate that a planet's envelope
    mass fraction, a critical parameter to infer, is frequently degenerate with its instellation flux and atmospheric metallicity,
    and sensitive to the treatment of gravitational acceleration at the mbar level. Such uncertainties have significant implications
    for inferring planetary processes, as our modelling shows that habitable-zone sub-Neptunes readily host supercritical
    surfaces or deep magma oceans, despite their temperate irradiation regime. To marginalise over these uncertainties, we
    introduce a Bayesian retrieval tool that uses our library of self-consistent models. By applying this Bayesian approach
    to case-studies of Pi Men c and TOI-421 b, we show that robust physical interpretations are achievable through whole-planet
    mass-radius retrievals. While new data from JWST, Ariel, and PLATO will expand our observational horizon, physically-consistent
    modelling provides the means to transition from categorical interpretations toward a comprehensive picture of the exoplanet
    continuum.
  lay_summary: Traditional models classify exoplanets by mass and radius alone, but this study couples full atmospheric and
    interior physics to simulate planets spanning gas-rich sub-Neptunes to bare rocky worlds. It finds that volatile envelope
    fraction is strongly degenerate with stellar irradiation and atmospheric metallicity, and that even temperate sub-Neptunes
    in the habitable zone may host deep magma oceans beneath their gas envelopes.
  lay_summary_draft: null
  _raw: 'Nicholls H, O Shorttle, **T Lichtenberg**, **F Pascal**. [Beyond the mass-radius plane: Integrated radiative-convective
    and interior structure simulations of the exoplanet continuum.](https://arxiv.org/abs/2604.15891) [pdf](https://arxiv.org/pdf/2604.15891)'
- slug: calder-2025-most
  section: research
  subsection: published
  year: 2026
  authors_md: Calder R, O Shorttle, H Nicholls, **T Lichtenberg**, CM Guimond
  title: 'Most Rocky Sub-Neptunes are Molten: Mapping the Solidification Shoreline for Gas Dwarf Exoplanets'
  venue_md: '*Monthly Notices of the Royal Astronomical Society*, in press (2025)'
  primary_url: https://arxiv.org/abs/2512.05816
  links:
    scix: https://scixplorer.org/abs/arXiv:2512.05816
    pdf: https://arxiv.org/pdf/2512.05816
    doi: https://doi.org/10.48550/arxiv.2512.05816
  bibcode: null
  lab_led: false
  abstract: 'Sub-Neptunes are the most common type of detected exoplanet, yet their observed masses and radii are degenerate
    with several interior structures. One possibility is that sub-Neptunes have silicate/iron interiors and H₂-dominated atmospheres
    (μ<3.8 g mol⁻¹), i.e., they are ''gas dwarfs''. If gas dwarfs have molten interiors, interactions between their magma
    oceans and atmospheres will produce distinct observational signatures. These signatures may break the degeneracy in interior
    structure, while providing insight into their interior processes, history, and population trends. We expect all such planets
    are born molten, but under what conditions do they remain molten today? We use the coupled interior-climate evolution
    model, PROTEUS, to estimate the ''solidification shoreline'': the instellation flux boundary (as a function of stellar
    Teff) that separates molten gas dwarfs from solidified ones. Our results show that 98% of detected sub-Neptunes occupy
    a region of parameter space consistent with their having permanent magma oceans, if they are gas dwarfs. While mantle
    fO2 and bulk volatile C/H ratio both influence magma ocean cooling, planets with oxidising mantles and carbon-rich atmospheres
    are likely to have high mean-molecular weight atmospheres (μ>3.8 g mol⁻¹) and are thus outside the scope of this study.
    Therefore, most detected sub-Neptunes, if they are gas dwarfs, have permanent magma oceans. This result motivates further
    research into the interactions between molten interiors and overlying atmospheres, and campaigns to identify unambiguous
    signatures of these interactions.'
  lay_summary: Sub-Neptunes are the most common type of exoplanet, yet their interiors remain mysterious. This study shows
    that most rocky sub-Neptunes with hydrogen-rich atmospheres have mantles hot enough to be fully molten, and maps the boundary
    where rocky interiors transition from liquid to solid across the exoplanet population.
  lay_summary_draft: null
  _raw: 'Calder R, O Shorttle, H Nicholls, **T Lichtenberg**, CM Guimond. [Most Rocky Sub-Neptunes are Molten: Mapping the
    Solidification Shoreline for Gas Dwarf Exoplanets.](https://arxiv.org/abs/2512.05816) [pdf](https://arxiv.org/pdf/2512.05816)'
- slug: lichtenberg-2026-coupled
  section: research
  subsection: published
  year: 2026
  authors_md: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen,
    TG Nguyen, Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al'
  title: 'Coupled atmospHere Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project
    of Magma Ocean Models'
  venue_md: '*The Planetary Science Journal* 7, 108 (2026)'
  primary_url: https://doi.org/10.3847/PSJ/ae593b
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf
    doi: https://doi.org/10.3847/PSJ/ae593b
    scix: https://scixplorer.org/abs/2026PSJ.....7..108L/abstract
  bibcode: null
  lab_led: true
  abstract: Spectroscopic characterization of rocky exoplanets with the James Webb Space Telescope has brought the origin
    and evolution of their atmospheres into the focus of exoplanet science. Time-evolved models of the feedback between interior
    and atmosphere are critical to predict and interpret these observations and link them to the Solar System terrestrial
    planets. However, models differ in methodologies and input data, which can lead to significant differences in interpretation.
    In this paper, we present the experimental protocol of the Coupled atmospHere Interior modeL Intercomparison (CHILI) project.
    CHILI is an (exo-)planet model intercomparison project within the Climates Using Interactive Suites of Intercomparisons
    Nested for Exoplanet Studies (CUISINES) framework, which aims to support a diverse set of multi-model intercomparison
    projects in the exoplanet community. The present protocol includes the initial set of participating magma ocean models,
    divided into evolutionary and static models, and two types of test categories, one focused on Solar System planets (Earth
    & Venus) and the other on exoplanets orbiting low-mass M-dwarfs. Both test categories aim to quantify the evolution of
    key markers of the links between planetary atmospheres and interiors over geological timescales. The proposed tests would
    allow us to quantify and compare the differences between coupled atmosphere-interior models used by the exoplanet and
    planetary science communities. Results from the proposed tests will be published in dedicated follow-up papers. To encourage
    the community to join this comparison effort and as an example, we present initial test results for the early Earth and
    TRAPPIST-1 b, conducted with models differing in the treatment of energy transport in the planetary interior and atmosphere,
    surface boundary layer, geochemistry, and the in- and outgassing of volatile compounds.
  lay_summary: Different research groups model what happens when a young rocky planet's molten surface interacts with its
    early atmosphere, but they don't agree with each other. CHILI is a community protocol that lets us run the same simulated
    planets through every model and compare the answers head-to-head. Once everyone's models are calibrated against each other,
    we can interpret JWST observations of young rocky exoplanets with more confidence.
  lay_summary_draft: null
  _raw: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen, TG Nguyen,
    Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al. [Coupled atmospHere
    Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project of Magma Ocean Models.](https://doi.org/10.3847/PSJ/ae593b)
    *The Planetary Science Journal* 7, 108 (2026). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf)'
- slug: van-dijk-2026-onset
  section: research
  subsection: published
  year: 2026
  authors_md: '**van Dijk MR**, **H Nicholls**, **T Lichtenberg**'
  title: Onset of habitable conditions on the Hadean Earth set by feedback between tides and greenhouse forcing
  venue_md: '*The Planetary Science Journal* 7, 94 (2026)'
  primary_url: https://scixplorer.org/abs/2026PSJ.....7...94V/abstract
  links:
    pdf: https://arxiv.org/pdf/2511.00952
    scix: https://scixplorer.org/abs/2026PSJ.....7...94V/abstract
    doi: https://doi.org/10.3847/psj/ae5928
  bibcode: 2026PSJ.....7...94V
  lab_led: true
  abstract: 'In the aftermath of the Moon-forming giant impact, the Hadean Earth''s mantle and surface crystallized from a
    global magma ocean blanketed by a dense volatile-rich atmosphere. While prior studies have explored the thermal evolution
    of such early-Earth scenarios under idealized, oxidizing conditions, the potential feedback between tidal heating driven
    by Earth─Moon orbital forcing and variable redox scenarios have not yet been explored in detail. We investigate whether
    tidal heating could have prolonged this early magma ocean phase and supported quasi-steady state epochs of global radiative
    equilibrium: periods of thermal balance between outgoing radiation and interior heat flux. Using the PROTEUS simulation
    framework, we simulate Earth''s early evolution under a range of plausible tidal power densities, oxygen fugacities, and
    volatile inventories. Our results suggest that feedback between tidal heating and atmospheric forcing can induce substantial
    variation in magma ocean lifetimes, from ∼30 Myr up to ∼500 Myr, sensitive to interior redox conditions. Global radiative
    equilibrium epochs commonly arise across this range, lasting from ∼2 to ∼320 Myr, and typically occur from 24 Myr after
    the Moon-forming impact. Under oxidizing conditions, late-stage H₂O degassing promotes melt retention and sustained heating
    due to its significant contribution to greenhouse forcing. Weak tides increase the atmospheric abundance of H₂S and NH₃
    and deplete CO. Therefore, the feedback between tides and atmospheric forcing induces a disequilibrium signature in the
    magma ocean atmosphere.'
  lay_summary: After the Moon-forming impact, Earth was covered in a global magma ocean beneath a thick atmosphere. We show
    that tidal heating from the young Moon, combined with greenhouse warming from outgassed volatiles, could have kept Earth's
    surface molten for anywhere from 30 to 500 million years depending on the chemistry of the mantle. The interplay between
    tides and atmospheric composition also produces distinctive chemical signatures that could help constrain the early conditions
    that led to habitability.
  lay_summary_draft: After the Moon-forming impact, Earth was covered in a global magma ocean beneath a thick atmosphere.
    We show that tidal heating from the young Moon, combined with greenhouse warming from outgassed volatiles, could have
    kept Earth's surface molten for anywhere from 30 to 500 million years depending on the chemistry of the mantle. The interplay
    between tides and atmospheric composition also produces distinctive chemical signatures that could help constrain the
    early conditions that led to habitability.
  _raw: '**van Dijk MR**, **H Nicholls**, **T Lichtenberg**. [Onset of habitable conditions on the Hadean Earth set by feedback
    between tides and greenhouse forcing.](https://scixplorer.org/abs/2026PSJ.....7...94V/abstract) *The Planetary Science
    Journal* 7, 94 (2026). [pdf](https://arxiv.org/pdf/2511.00952)'
- slug: rugheimer-2026-goldilocks
  section: research
  subsection: published
  year: 2026
  authors_md: Rugheimer S, E Alei, BS Konrad, B Taysum, JL Grenfell, **T Lichtenberg**, D Kitzmann, F van der Tak, SP Quanz,
    LIFE collaboration
  title: 'The Goldilocks problem for detecting water in terrestrial planets: Constraining water abundances in the mid-IR with
    LIFE'
  venue_md: '*The Astrophysical Journal* 1003, 85 (2026)'
  primary_url: https://scixplorer.org/abs/2026arXiv260407461R/abstract
  links:
    pdf: https://arxiv.org/pdf/2604.07461
    scix: https://scixplorer.org/abs/2026arXiv260407461R/abstract
    doi: https://doi.org/10.3847/1538-4357/ae5b75
  bibcode: 2026arXiv260407461R
  lab_led: false
  abstract: 'We investigate how well the Large Interferometer for Exoplanets (LIFE) mission concept can detect habitable conditions
    on exoplanets through the presence of atmospheric water vapor as a proxy for surface oceans. We model the atmosphere of
    a pre-biotic Earth-like planet across a range of water concentrations, from water-poor to water-rich, with surface partial
    pressures from 10⁻⁷ to 1 bar of H₂O. We simulate LIFE-like noise at spectral resolutions R = 50 and 100 using LIFEsim
    and perform Bayesian atmospheric retrievals to determine the technical requirements for LIFE to confirm habitability.
    We model three vertical water distributions: a vertically constant profile, a Manabe-Wetherald based Earth-like profile,
    and a diffusion and photochemistry profile to test how the assumed vertical structure influences the retrieved abundances.
    Clouds are not modeled. We find the ability for LIFE to detect water strongly depends on the vertical profile assumed.
    LIFE is unable to constrain the highest water cases and provides upper limits on low water planets. For the highest water
    abundances, absorption features saturate and reduce sensitivity to characterize precise H₂O levels. Water vapor is not
    detectable in any profile modeled for ≤10⁻⁶ bar in surface water, comparable to Mars. For an Earth-like profile, LIFE
    could constrain H₂O concentrations from 10⁻³ to 1 bar, spanning below and above present-day Earth concentrations of 10⁻²
    bar. Detectable atmospheric water may imply surface oceans, as water is highly reactive and rapidly removed by surface
    mineral reactions. Thus, LIFE can characterize water abundances indicative of habitable surface conditions.'
  lay_summary: Detecting water vapor in exoplanet atmospheres could indicate habitable surface conditions, but too much or
    too little water makes detection unreliable. This study quantifies the sensitivity of the planned LIFE space telescope
    to water vapor on Earth-like planets and identifies the range of atmospheric water abundances it can reliably measure.
  lay_summary_draft: null
  _raw: 'Rugheimer S, E Alei, BS Konrad, B Taysum, JL Grenfell, **T Lichtenberg**, D Kitzmann, F van der Tak, SP Quanz, LIFE
    collaboration. [The Goldilocks problem for detecting water in terrestrial planets: Constraining water abundances in the
    mid-IR with LIFE.](https://scixplorer.org/abs/2026arXiv260407461R/abstract) *The Astrophysical Journal*, in press (2026).
    [pdf](https://arxiv.org/pdf/2604.07461)'
- slug: nicholls-2026-volatile-rich
  section: research
  subsection: published
  year: 2026
  authors_md: '**Nicholls H**, **T Lichtenberg**, RD Chatterjee, CM Guimond, **E Postolec**, RT Pierrehumbert'
  title: Volatile-rich evolution of molten super-Earth L 98-59 d
  venue_md: '*Nature Astronomy* (2026)'
  primary_url: https://scixplorer.org/abs/2025arXiv250702656N/abstract
  links:
    pdf: https://www.nature.com/articles/s41550-026-02815-8.pdf
    scix: https://scixplorer.org/abs/2025arXiv250702656N/abstract
    doi: https://doi.org/10.1038/s41550-026-02815-8
  bibcode: 2026NatAs.tmp...61N
  lab_led: true
  abstract: Small, low-density exoplanets are sculpted by strong stellar irradiation, but their primordial compositions and
    subsequent evolution are still unknown. Two often-considered scenarios hold that they formed with rocky interiors and
    H₂-He atmospheres (`gas dwarfs') or alternatively with bulk compositions dominated by H₂O phases (`water worlds'). Here
    we constrain the possible range of evolutionary histories linking the birth conditions of low-density super-Earth L 98-59
    d to recent observations using a coupled atmosphere-interior evolutionary model. We find that the observations can be
    explained by in situ photochemical production of SO₂ in an H₂ background, indicative of a chemically reducing mantle and
    substantial (>1.8 mass%) early sulfur and hydrogen content, inconsistent with both the gas-dwarf and water-world scenarios.
    L 98-59 d's interior comprises a permanent magma ocean, allowing long-term retention of volatiles within its mantle over
    billions of years, consistent with California-Kepler Survey trends. Our analysis reveals an evolutionary pathway in which
    planets host volatile-rich atmospheres sustained by long-term magma-ocean degassing, shaped by secular cooling, atmospheric
    erosion and photochemistry. Internal and environmental processes contribute to the observed diversity of super-Earth and
    sub-Neptune exoplanets.
  lay_summary: The exoplanet L 98-59 d is surprisingly large for its mass, suggesting it holds substantial volatiles, but
    whether it is a miniature gas planet or a water world has been unclear. By simulating its evolution from birth to present
    day, we find neither scenario fits; instead, its atmosphere is sustained by a permanent magma ocean releasing sulfur and
    hydrogen over billions of years. This points to a new evolutionary pathway in which long-lived magma oceans drive the
    atmospheric diversity we observe among super-Earths.
  lay_summary_draft: The exoplanet L 98-59 d is surprisingly large for its mass, suggesting it holds substantial volatiles,
    but whether it is a miniature gas planet or a water world has been unclear. By simulating its evolution from birth to
    present day, we find neither scenario fits; instead, its atmosphere is sustained by a permanent magma ocean releasing
    sulfur and hydrogen over billions of years. This points to a new evolutionary pathway in which long-lived magma oceans
    drive the atmospheric diversity we observe among super-Earths.
  _raw: '**Nicholls H**, **T Lichtenberg**, RD Chatterjee, CM Guimond, **E Postolec**, RT Pierrehumbert. [Volatile-rich evolution
    of molten super-Earth L 98-59 d.](https://scixplorer.org/abs/2025arXiv250702656N/abstract) *Nature Astronomy* (2026).
    [pdf](https://www.nature.com/articles/s41550-026-02815-8.pdf)'
- slug: kimura-2026-water
  section: research
  subsection: published
  year: 2026
  authors_md: '**Kimura T**, **T Lichtenberg**'
  title: Water enrichment of forming sub-Neptune envelopes limited by oxygen exhaustion
  venue_md: '*The Astrophysical Journal* 1000, 220 (2026)'
  primary_url: https://scixplorer.org/abs/2026ApJ..1000..220K/abstract
  links:
    pdf: https://arxiv.org/pdf/2603.02423
    scix: https://scixplorer.org/abs/2026ApJ..1000..220K/abstract
    doi: https://doi.org/10.3847/1538-4357/ae4d3e
  bibcode: 2026ApJ..1000..220K
  lab_led: true
  abstract: The interaction between a magma ocean and a primordial atmosphere is increasingly recognized as a key process
    in shaping planetary envelope compositions. This coupling should strongly influence gas accretion, yet its role during
    the disk-embedded stage remains poorly constrained. We develop a time-dependent model that couples solid accretion, nebular
    gas accretion, and water enrichment and partitioning through magma─atmosphere interactions, along with post-disk thermal
    evolution and escape. We find that, for super-Earth-mass planets, water production is generally limited by the magma oxygen
    budget and typically ceases before disk dispersal. Subsequent nebular gas accretion dilutes the envelope toward hydrogen-dominated
    compositions, largely independent of the initial magma redox state. This establishes an upper bound on the envelope water
    fraction—the oxygen exhaustion limit—primarily set by the reactive oxygen inventory and the planet mass. After disk dispersal,
    degassing increases the water fraction only in Earth-mass planets undergoing strong escape, while super-Earths exhibit
    little change because surface pressures are hardly affected by escape. Magma─atmosphere coupling alone therefore cannot
    maintain water-rich envelopes in sub-Neptunes and produces a strong mass─composition relation imposed by the oxygen exhaustion
    limit. Highly enriched sub-Neptunes would therefore imply additional mechanisms such as late volatile delivery or post-disk
    giant impacts. The relation between planetary radius and envelope composition offers a means to infer magma properties,
    providing a pathway to connect present-day observables with early formation histories.
  lay_summary: When a young planet's magma ocean interacts with its atmosphere, it can produce water vapor by reacting hydrogen
    with oxygen from the rock. We find that this process runs out of available oxygen surprisingly quickly, setting an upper
    limit on how water-rich a sub-Neptune's atmosphere can become through magma chemistry alone. Sub-Neptunes with very water-rich
    atmospheres would therefore need additional water delivered later, for instance by icy impacts.
  lay_summary_draft: When a young planet's magma ocean interacts with its atmosphere, it can produce water vapor by reacting
    hydrogen with oxygen from the rock. We find that this process runs out of available oxygen surprisingly quickly, setting
    an upper limit on how water-rich a sub-Neptune's atmosphere can become through magma chemistry alone. Sub-Neptunes with
    very water-rich atmospheres would therefore need additional water delivered later, for instance by icy impacts.
  _raw: '**Kimura T**, **T Lichtenberg**. [Water enrichment of forming sub-Neptune envelopes limited by oxygen exhaustion.](https://scixplorer.org/abs/2026ApJ..1000..220K/abstract)
    *The Astrophysical Journal* 1000, 220 (2026). [pdf](https://arxiv.org/pdf/2603.02423)'
- slug: meier-2026-mantle
  section: research
  subsection: published
  year: 2026
  authors_md: Meier TG, CM Guimond, RT Pierrehumbert, J Birkby, RD Chatterjee, CE Fisher, GJ Golabek, M Hammond, TD Komacek,
    **T Lichtenberg**, A McGinty, E Meier Valdés, **H Nicholls**, LT Parker, **RJ Spaargaren**, PJ Tackley
  title: Mantle Convection and Nightside Volcanism on Lava World K2-141 b
  venue_md: '*Monthly Notices of the Royal Astronomical Society* (2026)'
  primary_url: https://scixplorer.org/abs/2026arXiv260302408M/abstract
  links:
    pdf: https://arxiv.org/pdf/2603.02408
    scix: https://scixplorer.org/abs/2026arXiv260302408M/abstract
    doi: https://doi.org/10.1093/mnras/stag390
  bibcode: 2026arXiv260302408M
  lab_led: false
  abstract: Ultra-short period lava worlds offer a unique window into the coupled evolution of planetary interior and atmospheres
    under extreme irradiation. In this study, we investigate the mantle dynamics, nightside volcanism, and volatile outgassing
    on lava world K2-141 b (1.54 R⊕, 5.31 M⊕) using two-dimensional convection models with tracer-based volatile tracking.
    Our simulations explore a range of interior configurations, including models with and without plastic yielding, basal
    versus mixed heating, core cooling, and melt intrusion. In models without plastic yielding (i.e. with a strong lithosphere),
    we find that mantle upwellings form at the substellar and antistellar points, while downwellings form near the day-night
    terminators at the boundary between the magma ocean and cold, solid nightside. These downwellings facilitate the recycling
    of crustal material, representing a form of asymmetric, single-lid tectonics. The resulting magma ocean thickness varies
    from 200 to 300 km depending on the model parameters, corresponding to about 2-3% of the planet's radius. Continuous nightside
    volcanism produces a basaltic crust and gradually depletes the mantle of volatiles. We find that over a billion years,
    volcanic eruptions can outgas tens of bars of CO₂ and H₂O. We show that even relatively large volcanic eruptions on the
    nightside produce thermal emission signals of no more than 1 ppm, remaining below the current detectability threshold
    in thermal phase curves. However, for most models, outgassing rates are increased near the day-night terminators and future
    studies should assess whether such localised outgassing could lead to atmospheric signatures in transmission spectroscopy.
  lay_summary: Ultra-hot lava worlds like K2-141 b have permanent dayside magma oceans and cooler nightsides. This study models
    how internal mantle convection driven by extreme surface temperature contrasts can sustain nightside volcanism and outgassing,
    connecting the planet's interior dynamics to potentially observable atmospheric signatures.
  lay_summary_draft: null
  _raw: Meier TG, CM Guimond, RT Pierrehumbert, J Birkby, RD Chatterjee, CE Fisher, GJ Golabek, M Hammond, TD Komacek, **T
    Lichtenberg**, A McGinty, E Meier Valdés, **H Nicholls**, LT Parker, RJ Spaargaren, PJ Tackley. [Mantle Convection and
    Nightside Volcanism on Lava World K2-141 b.](https://scixplorer.org/abs/2026arXiv260302408M/abstract) *Monthly Notices
    of the Royal Astronomical Society* (2026). [pdf](https://arxiv.org/pdf/2603.02408)
- slug: nixon-2025-magma
  section: research
  subsection: published
  year: 2025
  authors_md: Nixon MC, S Sander Somers, AB Savel, J Ih, EMR Kempton, ED Young, HE Schlichting, **T Lichtenberg**, L Welbanks,
    W Misener, AAA Piette, NF Wogan
  title: Magma ocean interactions can explain JWST observations of the sub-Neptune TOI-270 d
  venue_md: '*The Astrophysical Journal* 995, 95 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv251007367N/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/ae17c8/pdf
    scix: https://scixplorer.org/abs/2025arXiv251007367N/abstract
    doi: https://doi.org/10.3847/1538-4357/ae17c8
  bibcode: 2025arXiv251007367N
  lab_led: false
  abstract: Sub-Neptunes with substantial atmospheres may possess magma oceans in contact with the overlying gas, with chemical
    interactions between the atmosphere and magma playing an important role in shaping atmospheric composition. Early JWST
    observations have found high abundances of carbon- and oxygen-bearing molecules in a number of sub-Neptune atmospheres,
    which may result from processes including accretion of icy material at formation or magma-atmosphere interactions. Previous
    work examining the effects of magma-atmosphere interactions on sub-Neptunes has mostly been limited to studying conditions
    at the atmosphere-mantle boundary, without considering implications for the upper atmosphere which is probed by spectroscopic
    observations. In this work, we present a modeling architecture to determine observable signatures of magma-atmosphere
    interactions. We combine an equilibrium chemistry code which models reactions between the core, mantle and atmosphere
    with a radiative-convective model that determines the composition and structure of the observable upper atmosphere. We
    examine how different conditions at the atmosphere-mantle boundary and different core and mantle compositions impact the
    upper atmospheric composition. We compare our models to JWST NIRISS+NIRSpec observations of the sub-Neptune TOI-270 d,
    finding that our models can provide a good fit to the observed transmission spectrum with little fine-tuning. This suggests
    that magma-atmosphere interactions may be sufficient to explain high abundances of molecules such as H₂O, CH₄ and CO₂
    in sub-Neptune atmospheres, without additional accretion of icy material from the protoplanetary disk. Although other
    processes could lead to similar compositions, our work highlights the need to consider magma-atmosphere interactions when
    interpreting the observed atmospheric composition of a sub-Neptune.
  lay_summary: JWST observations of the sub-Neptune TOI-270 d have revealed unexpectedly high abundances of carbon- and oxygen-bearing
    molecules. This study shows that chemical reactions between a hydrogen-rich atmosphere and an underlying magma ocean can
    naturally explain these observations, without requiring exotic compositions.
  lay_summary_draft: null
