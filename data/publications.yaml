- slug: lichtenberg-2026-coupled
  section: research
  subsection: published
  year: 2026
  authors_md: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen, TG Nguyen, Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al'
  title: 'Coupled atmospHere Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project of Magma Ocean Models'
  venue_md: '*The Planetary Science Journal* 7, 108 (2026)'
  primary_url: https://doi.org/10.3847/PSJ/ae593b
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf
    doi: https://doi.org/10.3847/PSJ/ae593b
  bibcode: null
  lab_led: true
  abstract: Spectroscopic characterization of rocky exoplanets with the James Webb Space Telescope has brought the origin and evolution of their atmospheres into the focus of exoplanet science. Time-evolved models of the feedback between interior and atmosphere are critical to predict and interpret these observations and link them to the Solar System terrestrial planets. However, models differ in methodologies and input data, which can lead to significant differences in interpretation. In this paper, we present the experimental protocol of the Coupled atmospHere Interior modeL Intercomparison (CHILI) project.
  lay_summary: Different research groups model what happens when a young rocky planet's molten surface interacts with its early atmosphere, but they don't agree with each other. CHILI is a community protocol that lets us run the same simulated planets through every model and compare the answers head-to-head. Once everyone's models are calibrated against each other, we can interpret JWST observations of young rocky exoplanets with more confidence.
  lay_summary_draft: null
  _raw: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen, TG Nguyen, Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al. [Coupled atmospHere Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project of Magma Ocean Models.](https://doi.org/10.3847/PSJ/ae593b) *The Planetary Science Journal* 7, 108 (2026). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf)'
