  bibcode: 2023ApJ...954...29P
  lab_led: false
  abstract: 'Super-Earths span a wide range of bulk densities, indicating a diversity in interior conditions beyond that seen
    in the solar system. In particular, an emerging population of low-density super-Earths may be explained by volatile-rich
    interiors. Among these, low-density lava worlds have dayside temperatures that are high enough to evaporate their surfaces,
    providing a unique opportunity to probe their interior compositions and test for the presence of volatiles. In this work,
    we investigate the atmospheric observability of low-density lava worlds. We use a radiative-convective model to explore
    the atmospheric structures and emission spectra of these planets, focusing on three case studies with high observability
    metrics and substellar temperatures spanning ∼1900–2800 K: HD 86226 c, HD 3167 b, and 55 Cnc e. Given the possibility
    of mixed volatile and silicate interior compositions for these planets, we consider a range of mixed volatile and rock-vapor
    atmospheric compositions. This includes a range of volatile fractions and three volatile compositions: water-rich (100%
    H₂ O), water with CO₂ (80% H₂ O+20% CO₂ ), and a desiccated O-rich scenario (67% O 2 +33% CO₂ ). We find that spectral
    features due to H₂ O, CO₂ , SiO, and SiO 2 are present in the infrared emission spectra as either emission or absorption
    features, depending on dayside temperature, volatile fraction, and volatile composition. We further simulate JWST secondary-eclipse
    observations for each of the three case studies, finding that H₂ O and/or CO₂ could be detected with as few as ∼five eclipses.
    Detecting volatiles in these atmospheres would provide crucial independent evidence that volatile-rich interiors exist
    among the super-Earth population.'
  lay_summary: Some super-Earths have densities low enough to suggest volatile-rich interiors, and those close to their stars
    may have permanent dayside lava oceans. This study assesses whether future telescope observations can distinguish between
    rocky planets with thin mineral vapor atmospheres and water-rich worlds, finding that mid-infrared spectroscopy offers
    the best diagnostic.
  lay_summary_draft: null
  _raw: Piette AAA, P Gao, K Brugman, A Shahar, **T Lichtenberg**, F Miozzi, P Driscoll. [Rocky planet or water world? Observability
    of low-density lava world atmospheres.](https://scixplorer.org/abs/2023ApJ...954...29P) *The Astrophysical Journal* 954,
    29 (2023). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/acdef2/pdf)
- slug: parker-2023-short-lived
  section: research
  subsection: published
  year: 2023
  authors_md: Parker RJ, **T Lichtenberg**, M Patel, CKM Polius, M Ridsdill-Smith
  title: Short-lived radioisotope enrichment in star-forming regions from stellar winds and supernovae
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 521, 4838–4851 (2023)'
  primary_url: https://scixplorer.org/abs/2023MNRAS.521.4838P
  links:
    pdf: https://academic.oup.com/mnras/article-pdf/521/4/4838/49716087/stad871.pdf
    scix: https://scixplorer.org/abs/2023MNRAS.521.4838P
    doi: https://doi.org/10.1093/mnras/stad871
  bibcode: 2023MNRAS.521.4838P
  lab_led: false
  abstract: 'The abundance of the short-lived radioisotopes ²⁶Al and ⁶⁰Fe in the early Solar system is usually explained by
    the Sun either forming from pre-enriched material, or the Sun’s protosolar disc being polluted by a nearby supernova explosion
    from a massive star. Both hypotheses suffer from significant drawbacks: the former does not account for the dynamical
    evolution of star-forming regions, while in the latter the time for massive stars to explode as supernovae can be similar
    to, or even longer than, the lifetime of protoplanetary discs. In this paper, we extend the disc enrichment scenario to
    include the contribution of ²⁶Al from the winds of massive stars before they explode as supernovae. We use N-body simulations
    and a post-processing analysis to calculate the amount of enrichment in each disc, and we vary the stellar density of
    the star-forming regions. We find that stellar winds contribute to disc enrichment to such an extent that the Solar system’s
    ²⁶Al/⁶⁰Fe ratio is reproduced in up to 50 per cent of discs in dense (ρ = 1000 M⊙ pc−3) star-forming regions. When winds
    are a significant contributor to the SLR enrichment, we find that Solar system levels of enrichment can occur much earlier
    (before 2.5 Myr) than when enrichment occurs from supernovae, which start to explode at later ages (>4 Myr). We find that
    Solar system levels of enrichment all but disappear in low-density star-forming regions (ρ ≤ 10 M⊙ pc−3), implying that
    the Solar system must have formed in a dense, populous star-forming region if ²⁶Al and ⁶⁰Fe were delivered directly to
    the protosolar disc from massive-star winds and supernovae.'
  lay_summary: The early Solar System contained radioactive aluminium-26 and iron-60 that heated young planetesimals, but
    the source of these isotopes is debated. This study uses simulations of star-forming regions to show that stellar winds
    from massive stars can enrich protoplanetary disks with these isotopes, complementing or replacing the traditional supernova
    injection scenario.
  lay_summary_draft: null
  _raw: Parker RJ, **T Lichtenberg**, M Patel, CKM Polius, M Ridsdill-Smith. [Short-lived radioisotope enrichment in star-forming
    regions from stellar winds and supernovae.](https://scixplorer.org/abs/2023MNRAS.521.4838P) *Monthly Notices of the Royal
    Astronomical Society* 521, 4838–4851 (2023). [pdf](https://academic.oup.com/mnras/article-pdf/521/4/4838/49716087/stad871.pdf)
- slug: janson-2023-imaging
  section: research
  subsection: published
  year: 2023
  authors_md: Janson M, J Patel, SC Ringqvist, C Lu, I Rebollido, **T Lichtenberg**, A Brandeker, D Angerhausen, L Noack
  title: Imaging of exocomets with infrared interferometry
  venue_md: '*Astronomy & Astrophysics* 671, A114 (2023)'
  primary_url: https://scixplorer.org/abs/2023A%26A...671A.114J/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2023/03/aa45402-22.pdf
    scix: https://scixplorer.org/abs/2023A%26A...671A.114J/abstract
    doi: https://doi.org/10.1051/0004-6361/202245402
  bibcode: 2023A&A...671A.114J
  lab_led: false
  abstract: Active comets have been detected in several exoplanetary systems, although so far only indirectly, when the dust
    or gas in the extended coma has transited in front of the stellar disk. The large optical surface and relatively high
    temperature of an active cometary coma also makes it suitable to study with direct imaging, but the angular separation
    is generally too small to be reachable with present-day facilities. However, future imaging facilities with the ability
    to detect terrestrial planets in the habitable zones of nearby systems will also be sensitive to exocomets in such systems.
    Here we examine several aspects of exocomet imaging, particularly in the context of the Large Interferometer for Exoplanets
    (LIFE), which is a proposed space mission for infrared imaging and spectroscopy through nulling interferometry. We study
    what capabilities LIFE would have for acquiring imaging and spectroscopy of exocomets, based on simulations of the LIFE
    performance as well as statistical properties of exocomets that have recently been deduced from transit surveys. We find
    that for systems with extreme cometary activities such as β Pictoris, sufficiently bright comets may be so abundant that
    they overcrowd the LIFE inner field of view. More nearby and moderately active systems such as є Eridani or Fomalhaut
    may turn out to be optimal targets. If the exocomets have strong silicate emission features, such as in comet Hale-Bopp,
    it may become possible to study the mineralogy of individual exocometary bodies. We also discuss the possibility of exocomets
    as false positives for planets, with recent deep imaging of α Centauri as one hypothetical example. Such contaminants
    could be common, primarily among young debris disk stars, but should be rare among the main sequence population. We discuss
    strategies to mitigate the risk of any such false positives.
  lay_summary: Active comets have been detected around other stars, but only indirectly through transit events. This study
    shows that the planned LIFE space interferometer could directly image the thermal emission from exocometary comae, opening
    a new window into the volatile composition of other planetary systems.
  lay_summary_draft: null
  _raw: Janson M, J Patel, SC Ringqvist, C Lu, I Rebollido, **T Lichtenberg**, A Brandeker, D Angerhausen, L Noack. [Imaging
    of exocomets with infrared interferometry.](https://scixplorer.org/abs/2023A%26A...671A.114J/abstract) *Astronomy & Astrophysics*
    671, A114 (2023). [pdf](https://www.aanda.org/articles/aa/pdf/2023/03/aa45402-22.pdf)
- slug: stammler-2023-leaky
  section: research
  subsection: published
  year: 2023
  authors_md: Stammler SM, **T Lichtenberg**, J Drążkowska, T Birnstiel
  title: 'Leaky dust traps: How fragmentation impacts dust filtering by planets'
  venue_md: '*Astronomy & Astrophysics Letters* 670, L5 (2023)'
  primary_url: https://scixplorer.org/abs/2023A%26A...670L...5S/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2023/02/aa45512-22.pdf
    scix: https://scixplorer.org/abs/2023A%26A...670L...5S/abstract
    doi: https://doi.org/10.1051/0004-6361/202245512
  bibcode: 2023A&A...670L...5S
  lab_led: false
  abstract: The nucleosynthetic isotope dichotomy between carbonaceous (CC) and non-carbonaceous (NC) meteorites has been
    interpreted as evidence for spatial separation and the coexistence of two distinct planet-forming reservoirs for several
    million years in the solar protoplanetary disk. The rapid formation of Jupiter’s core within one million years after the
    formation of calcium-aluminium-rich inclusions (CAIs) has been suggested as a potential mechanism for spatial and temporal
    separation. In this scenario, Jupiter’s core would open a gap in the disk and trap inward-drifting dust grains in the
    pressure bump at the outer edge of the gap, separating the inner and outer disk materials from each other. We performed
    simulations of dust particles in a protoplanetary disk with a gap opened by an early-formed Jupiter core, including dust
    growth and fragmentation as well as dust transport, using the dust evolution software DustPy . Our numerical experiments
    indicate that particles trapped in the outer edge of the gap rapidly fragment and are transported through the gap, contaminating
    the inner disk with outer disk material on a timescale that is inconsistent with the meteoritic record. This suggests
    that other processes must have initiated or at least contributed to the isotopic separation between the inner and outer
    Solar System.
  lay_summary: The distinct isotopic signatures found in different classes of Solar System meteorites suggest that the early
    Solar System disk was split into two separate reservoirs, possibly by a forming giant planet. This study shows that dust
    fragmentation can allow material to leak through planetary gaps, complicating the picture of how Jupiter may have partitioned
    the disk.
  lay_summary_draft: null
  _raw: 'Stammler SM, **T Lichtenberg**, J Drążkowska, T Birnstiel. [Leaky dust traps: How fragmentation impacts dust filtering
    by planets.](https://scixplorer.org/abs/2023A%26A...670L...5S/abstract) *Astronomy & Astrophysics Letters* 670, L5 (2023).
    [pdf](https://www.aanda.org/articles/aa/pdf/2023/02/aa45512-22.pdf)'
- slug: bonsor-2023-rapid
  section: research
  subsection: published
  year: 2023
  authors_md: Bonsor A, **T Lichtenberg**, J Drążkowska, AM Buchan
  title: Rapid formation of exoplanetesimals revealed by white dwarfs
  venue_md: '*Nature Astronomy* 7, 39–48 (2023)'
  primary_url: https://scixplorer.org/abs/2023NatAs...7...39B
  links:
    pdf: https://arxiv.org/pdf/2211.07244.pdf
    article: https://rdcu.be/cZCv4
    scix: https://scixplorer.org/abs/2023NatAs...7...39B
    doi: https://doi.org/10.1038/s41550-022-01815-8
  bibcode: 2023NatAs...7...39B
  lab_led: false
  abstract: The timing of formation for the first planetesimals determines the mode of planetary accretion and their geophysical
    and compositional evolution. Astronomical observations of circumstellar discs and Solar System geochronology provide evidence
    for planetesimal formation during molecular cloud collapse, much earlier than previously estimated. Here, we present distinct
    observational evidence from white dwarf planetary systems for planetesimal formation occurring during the first few hundred
    thousand years after cloud collapse in exoplanetary systems. A significant fraction of white dwarfs have accreted planetary
    material rich in iron core or mantle material. In order for the exo-asteroids accreted by white dwarfs to form iron cores,
    substantial heating is required. By simulating planetesimal evolution and collisional evolution we show that the most
    likely heat source is short-lived radioactive nuclides such as Al-2 (half life of approximately 0.7 Myr). Core-rich materials
    in the atmospheres of white dwarfs, therefore, provide independent evidence for rapid planetesimal formation, concurrent
    with star formation.
  lay_summary: The timing of when small rocky bodies first form in a planetary system shapes how planets are built. By analyzing
    the compositions of asteroids accreted onto white dwarf stars, this study finds evidence that planetesimals form rapidly
    during the collapse of the molecular cloud, much earlier than previously thought.
  lay_summary_draft: null
  _raw: Bonsor A, **T Lichtenberg**, J Drążkowska, AM Buchan. [Rapid formation of exoplanetesimals revealed by white dwarfs.](https://scixplorer.org/abs/2023NatAs...7...39B)
    *Nature Astronomy* 7, 39–48 (2023). [pdf](https://arxiv.org/pdf/2211.07244.pdf), [article](https://rdcu.be/cZCv4)
- slug: graham-2022-ocean
  section: research
  subsection: published
  year: 2022
  authors_md: Graham RJ, **T Lichtenberg**, RT Pierrehumbert
  title: CO2 ocean bistability on terrestrial exoplanets
  venue_md: '*Journal of Geophysical Research: Planets* 127, 2022JE007456 (2022)'
  primary_url: https://scixplorer.org/abs/2022JGRE..12707456G/abstract
  links:
    video: https://oc-vp-distribution03.ethz.ch/mh_default_org/oaipmh-mmp/9acc8f70-f1a8-4019-abdb-66c124e76060/e550465e-2c89-48cb-b14d-086eb65466e2/20220902_1515_HGF30_Latsis_Symposium_Lichtenberg.mp4
    pdf: https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2022JE007456
    scix: https://scixplorer.org/abs/2022JGRE..12707456G/abstract
    doi: https://doi.org/10.1029/2022JE007456
  bibcode: 2022JGRE..12707456G
  lab_led: false
  abstract: Cycling of carbon dioxide between the atmosphere and interior of rocky planets can stabilize global climate and
    enable planetary surface temperatures above freezing over geologic time. However, variations in global carbon budget and
    unstable feedback cycles between planetary sub‐systems may destabilize the climate of rocky exoplanets toward regimes
    unknown in the Solar System. Here, we perform clear‐sky atmospheric radiative transfer and surface weathering simulations
    to probe the stability of climate equilibria for rocky, ocean‐bearing exoplanets at instellations relevant for planetary
    systems in the outer regions of the circumstellar habitable zone. Our simulations suggest that planets orbiting G‐ and
    F‐type stars (but not M‐type stars) may display bistability between an Earth‐like climate state with efficient carbon
    sequestration and an alternative stable climate equilibrium where CO₂ condenses at the surface and forms a blanket of
    either clathrate hydrate or liquid CO₂ . At increasing instellation and with ineffective weathering, the latter state
    oscillates between cool, surface CO₂ ‐condensing and hot, non‐condensing climates. CO₂ bistable climates may emerge early
    in planetary history and remain stable for billions of years. The carbon dioxide‐condensing climates follow an opposite
    trend in p CO₂ versus instellation compared to the weathering‐stabilized planet population, suggesting the possibility
    of observational discrimination between these distinct climate categories.
  lay_summary: 'Earth-like planets can exist in two stable climate states: one with liquid water oceans and moderate CO₂,
    and another where CO₂ dissolves into the ocean, potentially triggering glaciation. This study maps these bistable regimes
    across different planetary conditions, showing that the transition depends on atmospheric CO₂ levels and stellar irradiation.'
  lay_summary_draft: null
  _raw: 'Graham RJ, **T Lichtenberg**, RT Pierrehumbert. [CO2 ocean bistability on terrestrial exoplanets.](https://scixplorer.org/abs/2022JGRE..12707456G/abstract)
    *Journal of Geophysical Research: Planets* 127, 2022JE007456 (2022). [video](https://oc-vp-distribution03.ethz.ch/mh_default_org/oaipmh-mmp/9acc8f70-f1a8-4019-abdb-66c124e76060/e550465e-2c89-48cb-b14d-086eb65466e2/20220902_1515_HGF30_Latsis_Symposium_Lichtenberg.mp4),
    [pdf](https://agupubs.onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2022JE007456)'
- slug: lichtenberg-2022-reduced
  section: research
  subsection: published
  year: 2022
  authors_md: '**Lichtenberg T**, MS Clement'
  title: Reduced late bombardment on rocky exoplanets around M-dwarfs
  venue_md: '*The Astrophysical Journal Letters* 938, L3 (2022)'
  primary_url: https://scixplorer.org/abs/2022ApJ...938L...3L/abstract
  links:
    video: https://youtu.be/M2CopK35Jrs
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ac9521/pdf
    scix: https://scixplorer.org/abs/2022ApJ...938L...3L/abstract
    doi: https://doi.org/10.3847/2041-8213/ac9521
  bibcode: 2022ApJ...938L...3L
  lab_led: true
  abstract: Ocean-vaporizing impacts of chemically reduced planetesimals onto the early Earth have been suggested to catalyze
    atmospheric production of reduced nitrogen compounds and trigger prebiotic synthesis despite an oxidized lithosphere.
    While geochemical evidence supports a dry, highly reduced late veneer on Earth, the composition of late-impacting debris
    around lower-mass stars is subject to variable volatile loss as a result of their hosts' extended pre-main-sequence phase.
    We perform simulations of late-stage planet formation across the M-dwarf mass spectrum to derive upper limits on reducing
    bombardment epochs in Hadean-analog environments. We contrast the solar system scenario with varying initial volatile
    distributions due to extended primordial runaway greenhouse phases on protoplanets and the desiccation of smaller planetesimals
    by internal radiogenic heating. We find a decreasing rate of late-accreting reducing impacts with decreasing stellar mass.
    Young planets around stars ≤0.4 M ☉ experience no impacts of sufficient mass to generate prebiotically relevant concentrations
    of reduced atmospheric compounds once their stars have reached the main sequence. For M-dwarf planets to not exceed Earth-like
    concentrations of volatiles, both planetesimals, and larger protoplanets must undergo extensive devolatilization processes
    and can typically emerge from long-lived magma ocean phases with sufficient atmophile content to outgas secondary atmospheres.
    Our results suggest that transiently reducing surface conditions on young rocky exoplanets are favored around FGK stellar
    types relative to M dwarfs.
  lay_summary: Impacts of chemically reduced meteorites onto the early Earth may have triggered the production of molecules
    relevant for the origin of life. We simulated late-stage planet formation around stars of different masses and found that
    planets orbiting small M-dwarf stars receive far fewer of these reducing impacts. This suggests that the chemical conditions
    thought to favor prebiotic chemistry are more likely around Sun-like stars than around the most common stars in the galaxy.
  lay_summary_draft: Impacts of chemically reduced meteorites onto the early Earth may have triggered the production of molecules
    relevant for the origin of life. We simulated late-stage planet formation around stars of different masses and found that
