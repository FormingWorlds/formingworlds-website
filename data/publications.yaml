    are far more important in determining whether it differentiates. These results constrain which meteorite parent bodies
    underwent internal melting and how they contributed to terrestrial planet formation.
  _raw: '**Lichtenberg T**, GJ Golabek, TV Gerya, MR Meyer. [The effects of short-lived radionuclides and porosity on the
    early thermo-mechanical evolution of planetesimals.](https://scixplorer.org/abs/2016Icar..274..350L) *Icarus* 274, 350–365
    (2016). [pdf](https://arxiv.org/pdf/1603.05979.pdf), [video](http://bit.ly/planetesimal_evolution), [blog](http://nccr-planets.ch/blog/2016/04/15/asteroid-interiors/)'
- slug: lichtenberg-2015-modeling
  section: research
  subsection: published
  year: 2015
  authors_md: '**Lichtenberg T** & DRG Schleicher'
  title: Modeling gravitational instabilities in self-gravitating protoplanetary disks with adaptive mesh refinement techniques
  venue_md: '*Astronomy & Astrophysics* 579, A32 (2015)'
  primary_url: https://scixplorer.org/abs/2015A%26A...579A..32L/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2014/11/aa24478-14.pdf
    video: http://bit.ly/gi_disk
    scix: https://scixplorer.org/abs/2015A%26A...579A..32L/abstract
    doi: https://doi.org/10.1051/0004-6361/201424528
  bibcode: 2015A&A...579A..32L
  lab_led: true
  abstract: The astonishing diversity in the observed planetary population requires theoretical efforts and advances in planet
    formation theories. The use of numerical approaches provides a method to tackle the weaknesses of current models and is
    an important tool to close gaps in poorly constrained areas such as the rapid formation of giant planets in highly evolved
    systems. So far, most numerical approaches make use of Lagrangian-based smoothed-particle hydrodynamics techniques or
    grid-based 2D axisymmetric simulations. We present a new global disk setup to model the first stages of giant planet formation
    via gravitational instabilities (GI) in 3D with the block-structured adaptive mesh refinement (AMR) hydrodynamics code
    enzo. With this setup, we explore the potential impact of AMR techniques on the fragmentation and clumping due to large-scale
    instabilities using different AMR configurations. Additionally, we seek to derive general resolution criteria for global
    simulations of self-gravitating disks of variable extent. We run a grid of simulations with varying AMR settings, including
    runs with a static grid for comparison. Additionally, we study the effects of varying the disk radius. The physical settings
    involve disks with Rdisk = 10,100 and 300 AU, with a mass of Mdisk ≈ 0.05 M☉ and a central object of subsolar mass (M⋆
    = 0.646 M☉). To validate our thermodynamical approach we include a set of simulations with a dynamically stable profile
    (Qinit = 3) and similar grid parameters. The development of fragmentation and the buildup of distinct clumps in the disk
    is strongly dependent on the chosen AMR grid settings. By combining our findings from the resolution and parameter studies
    we find a general lower limit criterion to be able to resolve GI induced fragmentation features and distinct clumps, which
    induce turbulence in the disk and seed giant planet formation. Irrespective of the physical extension of the disk, topologically
    disconnected clump features are only resolved if the fragmentation-active zone of the disk is resolved with at least 100
    cells. The latter corresponds to a minimum requirement for all global disk setups. Our simulations illustrate the capabilities
    of AMR-based modeling techniques for planet formation simulations and underline the importance of balanced refinement
    settings to reproduce fragmenting structures. The clumps in our models are migrating inward and are eventually destroyed
    because of tidal disruptions, reflecting the absence of radiative feedback from the central star, which may stabilize
    the clumps on larger scales. We expect that the inclusion of additional physics, like a radiation transport mechanism
    and the formation of sink particles, will provide a detailed framework to study the formation of planets via gravitational
    instabilities in a global disk view.
  lay_summary: Giant planets might form rapidly when protoplanetary disks become gravitationally unstable and fragment into
    clumps, but capturing this process in simulations is numerically challenging. We developed a new 3D setup using adaptive
    mesh refinement to resolve the fragmentation of self-gravitating disks, identifying a minimum resolution requirement for
    reliably resolving gravitational collapse. The resulting clumps migrate inward and are tidally destroyed, indicating that
    additional physics such as radiative feedback is needed to stabilize them into surviving planets.
  lay_summary_draft: Giant planets might form rapidly when protoplanetary disks become gravitationally unstable and fragment
    into clumps, but capturing this process in simulations is numerically challenging. We developed a new 3D setup using adaptive
    mesh refinement to resolve the fragmentation of self-gravitating disks, identifying a minimum resolution requirement for
    reliably resolving gravitational collapse. The resulting clumps migrate inward and are tidally destroyed, indicating that
    additional physics such as radiative feedback is needed to stabilize them into surviving planets.
  _raw: '**Lichtenberg T** & DRG Schleicher. [Modeling gravitational instabilities in self-gravitating protoplanetary disks
    with adaptive mesh refinement techniques.](https://scixplorer.org/abs/2015A%26A...579A..32L/abstract) *Astronomy & Astrophysics*
    579, A32 (2015). [pdf](https://www.aanda.org/articles/aa/pdf/2014/11/aa24478-14.pdf), [video](http://bit.ly/gi_disk)'
- slug: lichtenberg-2025-constraining
  section: reviews
  subsection: null
  year: 2025
  authors_md: '**Lichtenberg T**, O Shorttle, J Teske, EMR Kempton'
  title: Constraining exoplanet interiors using observations of their atmospheres
  venue_md: '*Science* 390, eads3360 (2025)'
  primary_url: https://scixplorer.org/abs/2025arXiv251008844L
  links:
    pdf: https://www.science.org/doi/pdf/10.1126/science.ads3360
    scix: https://scixplorer.org/abs/2025arXiv251008844L
    doi: https://doi.org/10.1126/science.ads3360
  bibcode: 2025Sci...390S3660L
  lab_led: true
  abstract: Astronomical surveys have identified numerous exoplanets with bulk compositions that are unlike the planets of
    the Solar System, including rocky super-Earths and gas-enveloped sub-Neptunes. Observing the atmospheres of these objects
    provides information on the geological processes that influence their climates and surfaces. In this Review, we summarize
    the current understanding of these planets, including insights into the interaction between the atmosphere and interior
    based on observations made with the JWST. We describe the expected climatic and interior planetary regimes for planets
    with different density and stellar flux and how those regimes might be observationally distinguished. We also identify
    the observational, experimental, and theoretical innovations that will be required to characterize Earth-like exoplanets.
  lay_summary: Rocky exoplanets come in a wider range of sizes and compositions than anything in our Solar System, from bare
    rocky surfaces to gas-enveloped sub-Neptunes. This review synthesizes what atmospheric observations, particularly from
    JWST, are revealing about the geological processes shaping these worlds. It identifies the observational, experimental,
    and theoretical advances needed to eventually characterize truly Earth-like exoplanets.
  lay_summary_draft: Rocky exoplanets come in a wider range of sizes and compositions than anything in our Solar System, from
    bare rocky surfaces to gas-enveloped sub-Neptunes. This review synthesizes what atmospheric observations, particularly
    from JWST, are revealing about the geological processes shaping these worlds. It identifies the observational, experimental,
    and theoretical advances needed to eventually characterize truly Earth-like exoplanets.
  _raw: '**Lichtenberg T**, O Shorttle, J Teske, EMR Kempton. [Constraining exoplanet interiors using observations of their
    atmospheres.](https://scixplorer.org/abs/2025arXiv251008844L) *Science* 390, eads3360 (2025). [pdf](https://www.science.org/doi/pdf/10.1126/science.ads3360)'
- slug: lichtenberg-2025-super-earths
  section: reviews
  subsection: null
  year: 2025
  authors_md: '**Lichtenberg T**, Y Miguel'
  title: Super-Earths and Earth-like Exoplanets
  venue_md: '*Treatise on Geochemistry*, 3rd edition (2025)'
  primary_url: https://scixplorer.org/abs/2024arXiv240504057L
  links:
    pdf: https://arxiv.org/pdf/2405.04057
    scix: https://scixplorer.org/abs/2024arXiv240504057L
    doi: https://doi.org/10.1016/b978-0-323-99762-1.00122-4
  bibcode: 2025TrGeo...7...51L
  lab_led: true
  abstract: In the last few years astronomical surveys have expanded the reach of planetary science into the realm of small
    and dense extrasolar worlds. These share a number of characteristics with the terrestrial and icy planetary objects of
    the Solar System, but keep stretching previous understanding of the known limits of planetary thermodynamics, material
    properties, and climate regimes. Improved compositional and thermal constraints on exoplanets below 2 Earth radii suggest
    efficient accretion of atmosphere-forming volatile elements in a fraction of planetary systems, pointing to rapid formation,
    planet-scale melting, and chemical equilibration between the core, mantle, and atmosphere of rocky and volatile-rich exoplanets.
    Meaningful interpretation of novel observational data from these worlds necessitates cross-disciplinary expansion of known
    material properties under extreme thermodynamic, non-solar conditions, and accounting for dynamic feedbacks between interior
    and atmospheric processes. Exploration of the atmosphere and surface composition of individual, short-period super-Earths
    in the next few years will enable key inferences on magma ocean dynamics, the redox state of rocky planetary mantles,
    and mixing between volatile and refractory phases in planetary regimes that are absent from the present-day Solar System,
    and reminiscent of the conditions of the prebiotic Earth. The atmospheric characterization of climate diversity and the
    statistical search for biosignatures on terrestrial exoplanets on temperate orbits will require space-based direct imaging
    surveys, capable of resolving emission features of major and trace gases in both shortwave and mid-infrared wavelengths.
  lay_summary: Astronomical surveys are now detecting rocky exoplanets small enough to be compared with Earth, but their compositions
    and climates challenge existing planetary science frameworks. This review covers what we know about super-Earths and Earth-like
    exoplanets, from their formation through magma ocean stages to their present-day atmospheres. Characterizing temperate,
    potentially habitable worlds will ultimately require space-based direct imaging missions capable of resolving their atmospheric
    composition.
  lay_summary_draft: Astronomical surveys are now detecting rocky exoplanets small enough to be compared with Earth, but their
    compositions and climates challenge existing planetary science frameworks. This review covers what we know about super-Earths
    and Earth-like exoplanets, from their formation through magma ocean stages to their present-day atmospheres. Characterizing
    temperate, potentially habitable worlds will ultimately require space-based direct imaging missions capable of resolving
    their atmospheric composition.
  _raw: '**Lichtenberg T**, Y Miguel. [Super-Earths and Earth-like Exoplanets.](https://scixplorer.org/abs/2024arXiv240504057L)
    *Treatise on Geochemistry*, 3rd edition (2025). [pdf](https://arxiv.org/pdf/2405.04057)'
- slug: suer-2023-distribution
  section: reviews
  subsection: null
  year: 2023
  authors_md: Suer T-A, C Jackson, DS Grewal, C Dalou, **T Lichtenberg**
  title: The distribution of volatile elements during rocky planet formation
  venue_md: '*Frontiers in Earth Science* 11:1159412 (2023)'
  primary_url: https://scixplorer.org/abs/2023FrEaS..1159412S/abstract
  links:
    pdf: https://www.frontiersin.org/articles/10.3389/feart.2023.1159412/pdf?isPublishedV2=False
    scix: https://scixplorer.org/abs/2023FrEaS..1159412S/abstract
    doi: https://doi.org/10.3389/feart.2023.1159412
  bibcode: 2023FrEaS..1159412S
  lab_led: false
  abstract: Core segregation and atmosphere formation are two of the major processes that redistribute the volatile elements—hydrogen
    (H), carbon (C), nitrogen (N), and sulfur (S)—in and around rocky planets during their formation. The volatile elements
    by definition accumulate in gaseous reservoirs and form atmospheres. However, under conditions of early planet formation,
    these elements can also behave as siderophiles (i.e., iron-loving) and become concentrated in core-forming metals. Current
    models of core formation suggest that metal-silicate reactions occurred over a wide pressure, temperature, and compositional
    space to ultimately impose the chemistries of the cores and silicate portions of rocky planets. Additionally, the solubilities
    of volatile elements in magmas determine their transfer between the planetary interiors and atmospheres, which has recently
    come into sharper focus in the context of highly irradiated, potentially molten exoplanets. Recently, there has been a
    significant push to experimentally investigate the metal-silicate and magma-gas exchange coefficients for volatile elements
    over a wide range of conditions relevant to rocky planet formation. Qualitatively, results from the metal-silicate partitioning
    studies suggest that cores of rocky planets could be major reservoirs of the volatile elements though significant amounts
    will remain in mantles. Results from solubility studies imply that under oxidizing conditions, most H and S are sequestered
    in the magma ocean, while most N is outgassed to the atmosphere, and C is nearly equally distributed between the atmosphere
    and the interior. Under reducing conditions, nearly all N dissolves in the magma ocean, the atmosphere becomes the dominant
    C reservoir, while H becomes more equally distributed between the interior and the atmosphere, and S remains dominantly
    in the interior. These chemical trends bear numerous implications for the chemical differentiation of rocky planets and
    the formation and longevity of secondary atmospheres in the early Solar System and exoplanetary systems. Further experimental
    and modeling efforts are required to understand the potential of chemical and physical disequilibria during core formation
    and magma ocean crystallization and to constrain the distributions of volatile elements in the interiors and atmospheres
    of rocky planets through their formation and long-term geologic evolution.
  lay_summary: During rocky planet formation, volatile elements like hydrogen, carbon, nitrogen, and sulfur are redistributed
    between the core, mantle, and atmosphere. This review synthesizes experimental and theoretical constraints on how these
    elements partition during core segregation and atmospheric outgassing, shaping the final volatile budgets of terrestrial
    planets.
  lay_summary_draft: null
  _raw: Suer T-A, C Jackson, DS Grewal, C Dalou, **T Lichtenberg**. [The distribution of volatile elements during rocky planet
    formation.](https://scixplorer.org/abs/2023FrEaS..1159412S/abstract) *Frontiers in Earth Science* 11:1159412 (2023). [pdf](https://www.frontiersin.org/articles/10.3389/feart.2023.1159412/pdf?isPublishedV2=False)
- slug: lichtenberg-2023-geophysical
  section: reviews
  subsection: null
  year: 2023
  authors_md: '**Lichtenberg T**, LK Schaefer, M Nakajima, R Fischer'
  title: Geophysical Evolution During Rocky Planet Formation
  venue_md: '*Protostars and Planets VII*, ASP Conference Series, Vol. 534, 907 (2023)'
  primary_url: https://scixplorer.org/abs/2022arXiv220310023L/abstract
  links:
    pdf: https://scixplorer.org/link_gateway/2022arXiv220310023L/EPRINT_PDF
    scix: https://scixplorer.org/abs/2022arXiv220310023L/abstract
    doi: https://doi.org/10.48550/arxiv.2203.10023
  bibcode: 2023ASPC..534..907L
  lab_led: true
  abstract: Progressive astronomical characterization of planet-forming disks and rocky exoplanets highlight the need for
    increasing interdisciplinary efforts to understand the birth and life cycle of terrestrial worlds in a unified picture.
    Here, we review major geophysical and geochemical processes that shape the evolution of rocky planets and their precursor
    planetesimals during planetary formation and early evolution, and how these map onto the astrophysical timeline and varying
    accretion environments of planetary growth. The evolution of the coupled core-mantle-atmosphere system of growing protoplanets
    diverges in thermal, compositional, and structural states to first order, and ultimately shapes key planetary characteristics
    that can discern planets harboring clement surface conditions from those that do not. Astronomical campaigns seeking to
    investigate rocky exoplanets will require significant advances in laboratory characterization of planetary materials and
    time- and spatially-resolved theoretical models of planetary evolution, to extend planetary science beyond the Solar System
    and constrain the origins and frequency of habitable worlds like our own.
  lay_summary: Understanding rocky planets requires connecting astrophysical disk processes to geophysical interior evolution,
    but these fields have traditionally been studied separately. This review traces how core, mantle, and atmosphere co-evolve
    during planetary formation, and how early divergences in thermal and chemical state determine whether a planet ends up
    habitable. Extending planetary science to exoplanets will demand advances in laboratory measurements and time-resolved
    theoretical models.
  lay_summary_draft: Understanding rocky planets requires connecting astrophysical disk processes to geophysical interior
    evolution, but these fields have traditionally been studied separately. This review traces how core, mantle, and atmosphere
    co-evolve during planetary formation, and how early divergences in thermal and chemical state determine whether a planet
    ends up habitable. Extending planetary science to exoplanets will demand advances in laboratory measurements and time-resolved
    theoretical models.
  _raw: '**Lichtenberg T**, LK Schaefer, M Nakajima, R Fischer. [Geophysical Evolution During Rocky Planet Formation.](https://scixplorer.org/abs/2022arXiv220310023L/abstract)
    *Protostars and Planets VII*, ASP Conference Series, Vol. 534, 907 (2023). [pdf](https://scixplorer.org/link_gateway/2022arXiv220310023L/EPRINT_PDF)'
- slug: hu-2025-identifying
  section: perspectives
  subsection: null
  year: 2025
  authors_md: Hu R et al. (incl. **T Lichtenberg**)
  title: Identifying rocky planets and water worlds among sub-Neptune-sized exoplanets with the Habitable Worlds Observatory
  venue_md: arXiv preprint (2025)
  primary_url: https://scixplorer.org/abs/2025arXiv250916798H/abstract
  links:
    pdf: https://arxiv.org/pdf/2509.16798
    scix: https://scixplorer.org/abs/2025arXiv250916798H/abstract
  bibcode: 2025arXiv250916798H
  lab_led: false
  abstract: 'Astronomers are debating whether the plentiful "sub-Neptune" exoplanets, worlds a bit larger than Earth but smaller
    than Neptune, are predominantly rocky planets, water-rich "ocean worlds," or gas-enshrouded mini-Neptunes. This question
    is crucial because such sub-Neptune-sized planets are among the most common in our galaxy, yet we have no analog in our
    own solar system, making them a key to understanding planet formation and diversity. It also directly impacts the search
    for habitable worlds: larger-than-Earth planets with solid surfaces or oceans could support life, whereas gas-rich mini-Neptunes
    likely cannot. However, distinguishing these types using only a planet''s mass and radius is very challenging, because
    different compositions can produce similar densities, leaving a world''s nature ambiguous with current data. The proposed
    Habitable Worlds Observatory (HWO), a future NASA flagship telescope, offers a solution. HWO could directly image and
    spectroscopically analyze starlight reflected from 50 100 sub-Neptunes around nearby stars, aiming to reveal their atmospheric
    compositions and potential surfaces. Using visible and near-infrared spectroscopy along with sensitive polarimetry, HWO
    would detect atmospheric gases (such as water vapor, methane, and carbon dioxide) and search for telltale surface signatures,
    including rock absorption features and the characteristic reflectivity patterns of oceans. By analyzing these signals,
    we could determine whether sub-Neptunes are large rocky planets or water worlds rather than gas-dominated mini-Neptunes.
    Crucially, expanding the search beyond Earth-sized planets to include these abundant sub-Neptunes may uncover entirely
    new classes of potentially habitable worlds, directly advancing HWO''s mission to identify and characterize planets that
    could support life.'
  lay_summary: Sub-Neptune-sized exoplanets could be rocky, water-rich, or gas-enshrouded, but current telescopes cannot easily
    distinguish between these possibilities. This study evaluates how the planned Habitable Worlds Observatory could use reflected-light
    spectroscopy to tell rocky planets from water worlds among this common class of exoplanets.
  lay_summary_draft: null
  _raw: Hu R et al. (incl. **T Lichtenberg**). [Identifying rocky planets and water worlds among sub-Neptune-sized exoplanets
    with the Habitable Worlds Observatory.](https://scixplorer.org/abs/2025arXiv250916798H/abstract) arXiv preprint (2025).
    [pdf](https://arxiv.org/pdf/2509.16798)
