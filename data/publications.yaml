    doi: https://doi.org/10.1117/12.3019090
  bibcode: 2024SPIE13095E..1DG
  lab_led: false
  abstract: The Large Interferometer For Exoplanets (LIFE) is a proposed space mission to directly detect and characterize
    the thermal emission of temperate terrestrial exoplanets in the mid-infrared (6 to 17 microns) using a formation-flying
    nulling interferometer. This paper presents the current optical and instrument design of LIFE, including the beam combination
    scheme, spectral resolution requirements, detector technology, and the integration of single-mode fibers for spatial filtering.
    We demonstrate the technical feasibility of achieving the sensitivity and angular resolution needed to study rocky exoplanets
    in the habitable zones of nearby stars, and discuss the key technology development milestones required to advance LIFE
    toward a future ESA mission.
  lay_summary: The LIFE mission concept proposes a formation-flying mid-infrared nulling interferometer in space to directly
    detect and characterize exoplanet atmospheres. This paper presents the optical and instrument design, demonstrating the
    technical feasibility of studying rocky exoplanets in the thermal infrared.
