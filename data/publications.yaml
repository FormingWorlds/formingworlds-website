- slug: lichtenberg-2026-coupled
  section: research
  subsection: published
  year: 2026
  authors_md: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen,
    TG Nguyen, Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al'
  title: 'Coupled atmospHere Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project
    of Magma Ocean Models'
  venue_md: '*The Planetary Science Journal* 7, 108 (2026)'
  primary_url: https://doi.org/10.3847/PSJ/ae593b
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf
    doi: https://doi.org/10.3847/PSJ/ae593b
  bibcode: null
  lab_led: true
  abstract: Spectroscopic characterization of rocky exoplanets with the James Webb Space Telescope has brought the origin
    and evolution of their atmospheres into the focus of exoplanet science. Time-evolved models of the feedback between interior
    and atmosphere are critical to predict and interpret these observations and link them to the Solar System terrestrial
    planets. However, models differ in methodologies and input data, which can lead to significant differences in interpretation.
    In this paper, we present the experimental protocol of the Coupled atmospHere Interior modeL Intercomparison (CHILI) project.
  lay_summary: Different research groups model what happens when a young rocky planet's molten surface interacts with its
    early atmosphere, but they don't agree with each other. CHILI is a community protocol that lets us run the same simulated
    planets through every model and compare the answers head-to-head. Once everyone's models are calibrated against each other,
    we can interpret JWST observations of young rocky exoplanets with more confidence.
  lay_summary_draft: null
  _raw: '**Lichtenberg T**, L Schaefer, J Krissansen-Totton, Y Miguel, DE Sergeev, P Baumeister, J Cmiel, LJ Janssen, TG Nguyen,
    Y Miyazaki, **H Nicholls**, A Papesh, H Pelissard, B Peng, J Perez, **E Postolec**, **M Sastre** et al. [Coupled atmospHere
    Interior modeL Intercomparison (CHILI) Protocol Version 1.0: A CUISINES Intercomparison Project of Magma Ocean Models.](https://doi.org/10.3847/PSJ/ae593b)
    *The Planetary Science Journal* 7, 108 (2026). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/ae593b/pdf)'
- slug: van-dijk-2026-onset
  section: research
  subsection: published
  year: 2026
  authors_md: '**van Dijk MR**, **H Nicholls**, **T Lichtenberg**'
  title: Onset of habitable conditions on the Hadean Earth set by feedback between tides and greenhouse forcing
  venue_md: '*The Planetary Science Journal* 7, 94 (2026)'
  primary_url: https://scixplorer.org/abs/2026PSJ.....7...94V/abstract
  links:
    pdf: https://arxiv.org/pdf/2511.00952
    scix: https://scixplorer.org/abs/2026PSJ.....7...94V/abstract
  bibcode: 2026PSJ.....7...94V
  lab_led: true
  abstract: 'In the aftermath of the Moon-forming giant impact, the Hadean Earth''s mantle and surface crystallized from a
    global magma ocean blanketed by a dense volatile-rich atmosphere. While prior studies have explored the thermal evolution
    of such early-Earth scenarios under idealized, oxidizing conditions, the potential feedback between tidal heating driven
    by Earth─Moon orbital forcing and variable redox scenarios have not yet been explored in detail. We investigate whether
    tidal heating could have prolonged this early magma ocean phase and supported quasi-steady state epochs of global radiative
    equilibrium: periods of thermal balance between outgoing radiation and interior heat flux. Using the PROTEUS simulation
    framework, we simulate Earth''s early evolution under a range of plausible tidal power densities, oxygen fugacities, and
    volatile inventories. Our results suggest that feedback between tidal heating and atmospheric forcing can induce substantial
    variation in magma ocean lifetimes, from ∼30 Myr up to ∼500 Myr, sensitive to interior redox conditions. Global radiative
    equilibrium epochs commonly arise across this range, lasting from ∼2 to ∼320 Myr, and typically occur from 24 Myr after
    the Moon-forming impact. Under oxidizing conditions, late-stage H<SUB>2</SUB>O degassing promotes melt retention and sustained
    heating due to its significant contribution to greenhouse forcing. Weak tides increase the atmospheric abundance of H<SUB>2</SUB>S
    and NH<SUB>3</SUB> and deplete CO. Therefore, the feedback between tides and atmospheric forcing induces a disequilibrium
    signature in the magma ocean atmosphere.'
  lay_summary: After the Moon-forming impact, Earth was covered in a global magma ocean beneath a thick atmosphere. We show
    that tidal heating from the young Moon, combined with greenhouse warming from outgassed volatiles, could have kept Earth's
    surface molten for anywhere from 30 to 500 million years depending on the chemistry of the mantle. The interplay between
    tides and atmospheric composition also produces distinctive chemical signatures that could help constrain the early conditions
    that led to habitability.
  lay_summary_draft: After the Moon-forming impact, Earth was covered in a global magma ocean beneath a thick atmosphere.
    We show that tidal heating from the young Moon, combined with greenhouse warming from outgassed volatiles, could have
    kept Earth's surface molten for anywhere from 30 to 500 million years depending on the chemistry of the mantle. The interplay
    between tides and atmospheric composition also produces distinctive chemical signatures that could help constrain the
    early conditions that led to habitability.
  _raw: '**van Dijk MR**, **H Nicholls**, **T Lichtenberg**. [Onset of habitable conditions on the Hadean Earth set by feedback
    between tides and greenhouse forcing.](https://scixplorer.org/abs/2026PSJ.....7...94V/abstract) *The Planetary Science
    Journal* 7, 94 (2026). [pdf](https://arxiv.org/pdf/2511.00952)'
