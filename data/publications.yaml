    , a software tool developed for simulating observations of exoplanetary systems with an MIR space-based nulling interferometer.
    It includes astrophysical noise sources (i.e., stellar leakage and thermal emission from local zodiacal and exozodiacal
    dust) and offers the flexibility to include instrumental noise terms in the future. Here, we provide some first quantitative
    limits on instrumental effects that would allow the measurements to remain in the fundamental noise limited regime. We
    demonstrate updated signal extraction approaches to validating signal-to-noise ratio (S/N) estimates from the simulator.
    Monte Carlo simulations are used to generate a mock survey of nearby terrestrial exoplanets and determine to which accuracy
    fundamental planet properties can be retrieved. Results. LIFE sim provides an accessible way to predict the expected S/N
    of future observations as a function of various key instrument and target parameters. The S/Ns of the extracted spectra
    are photon noise dominated, as expected from our current simulations. Signals from multi-planet systems can be reliably
    extracted. From single-epoch observations in our mock survey of small ( R < 1.5 R Earth ) planets orbiting within the
    habitable zones of their stars, we find that typical uncertainties in the estimated effective temperature of the exoplanets
    are ≲10%, for the exoplanet radius ≲20%, and for the separation from the host star ≲2%. Signal-to-noise-ratio values obtained
    in the signal extraction process deviate by less than 10% from purely photon-counting statistics-based S/Ns. Conclusions.
    LIFE sim has been sufficiently well validated so that it can be shared with a broader community interested in quantifying
    various exoplanet science cases that a future space-based MIR nulling interferometer could address. Reliable signal extraction
    algorithms exist, and our results underline the power of the MIR wavelength range for deriving fundamental exoplanet properties
    from single-epoch observations.
  lay_summary: The LIFE space mission concept aims to use mid-infrared interferometry to detect and characterize hundreds
    of exoplanets. This paper presents the mission architecture and key design trades for the space-based nulling interferometer,
    establishing the technical requirements for detecting biosignatures in exoplanet atmospheres.
  lay_summary_draft: null
  _raw: 'Quanz SP et al. (incl. **T Lichtenberg**). [Large Interferometer For Exoplanets (LIFE): I.](https://scixplorer.org/abs/2022A%26A...664A..21Q/abstract)
    *Astronomy & Astrophysics* 664, A21 (2022). [pdf](https://www.aanda.org/articles/aa/pdf/2022/08/aa41958-21.pdf), [video](https://youtu.be/7JO4iDrnNMI),
    [news](https://www.innovationnewsnetwork.com/searching-beyond-the-solar-system-for-life-on-exoplanets/11631/)'
- slug: jin-2021-evidence
  section: research
  subsection: published
  year: 2021
  authors_md: Jin Z, M Bose, **T Lichtenberg**, GD Mulders
  title: New evidence for wet accretion of inner solar system planetesimals from meteorites Chelyabinsk and Benenitra
  venue_md: '*The Planetary Science Journal* 2, 244 (2021)'
  primary_url: https://scixplorer.org/abs/2021PSJ.....2..244J/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/ac3d86/pdf
    scix: https://scixplorer.org/abs/2021PSJ.....2..244J/abstract
    doi: https://doi.org/10.3847/PSJ/ac3d86
  bibcode: 2021PSJ.....2..244J
  lab_led: false
  abstract: We investigated the hydrogen isotopic compositions and water contents of pyroxenes in two recent ordinary chondrite
    falls, namely, Chelyabinsk (2013 fall) and Benenitra (2018 fall), and compared them to three ordinary chondrite Antarctic
    finds, namely, Graves Nunataks GRA 06179, Larkman Nunatak LAR 12241, and Dominion Range DOM 10035. The pyroxene minerals
    in Benenitra and Chelyabinsk are hydrated (∼0.018–0.087 wt.% H 2 O) and show D-poor isotopic signatures ( δ D SMOW from
    −444‰ to −49‰). On the contrary, the ordinary chondrite finds exhibit evidence of terrestrial contamination with elevated
    water contents (∼0.039–0.174 wt.%) and δ D SMOW values (from −199‰ to −14‰). We evaluated several small parent-body processes
    that are likely to alter the measured compositions in Benenitra and Chelyabinsk and inferred that water loss in S-type
    planetesimals is minimal during thermal metamorphism. Benenitra and Chelyabinsk hydrogen compositions reflect a mixed
    component of D-poor nebular hydrogen and water from the D-rich mesostases. A total of 45%–95% of water in the minerals
    characterized by low δ D SMOW values was contributed by nebular hydrogen. S-type asteroids dominantly composed of nominally
    anhydrous minerals can hold 254–518 ppm of water. Addition of a nebular water component to nominally dry inner solar system
    bodies during accretion suggests a reduced need of volatile delivery to the terrestrial planets during late accretion.
  lay_summary: The water content of inner Solar System bodies constrains how our planets formed. By analyzing hydrogen isotopes
    in the recent Chelyabinsk and Benenitra meteorite falls, this study finds evidence that inner Solar System planetesimals
    accreted water-bearing minerals during formation, supporting a wetter accretion history than previously assumed.
  lay_summary_draft: null
  _raw: Jin Z, M Bose, **T Lichtenberg**, GD Mulders. [New evidence for wet accretion of inner solar system planetesimals
    from meteorites Chelyabinsk and Benenitra.](https://scixplorer.org/abs/2021PSJ.....2..244J/abstract) *The Planetary Science
    Journal* 2, 244 (2021). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/ac3d86/pdf)
- slug: tsai-2021-inferring
  section: research
  subsection: published
  year: 2021
  authors_md: Tsai S-M, H Innes, **T Lichtenberg**, J Taylor, M Malik, K Chubb, RT Pierrehumbert
  title: Inferring Shallow Surfaces on sub-Neptune Exoplanets with JWST
  venue_md: '*The Astrophysical Journal Letters* 922, L27 (2021)'
  primary_url: https://scixplorer.org/abs/2021arXiv211106429T/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ac399a/pdf
    scix: https://scixplorer.org/abs/2021arXiv211106429T/abstract
    doi: https://doi.org/10.3847/2041-8213/ac2f40
  bibcode: 2021arXiv211106429T
  lab_led: false
  abstract: Planets smaller than Neptune and larger than Earth make up the majority of the discovered exoplanets. Those with
    H₂-rich atmospheres are prime targets for atmospheric characterization. The transition between the two main classes, super-Earths
    and sub-Neptunes, is not clearly understood as the rocky surface is likely not accessible to observations. Tracking several
    trace gases (specifically the loss of ammonia (NH₃) and hydrogen cyanide (HCN)) has been proposed as a proxy for the presence
    of a shallow surface. In this work, we revisit the proposed mechanism of nitrogen conversion in detail and find its timescale
    on the order of a million years. NH₃ exhibits dual paths converting to N₂ or HCN, depending on the UV radiation of the
    star and the stage of the system. In addition, methanol (CH₃OH) is identified as a robust and complementary proxy for
    a shallow surface. We follow the fiducial example of K2-18b with a 2D photochemical model (VULCAN) on an equatorial plane.
    We find a fairly uniform composition distribution below 0.1 mbar controlled by the dayside, as a result of slow chemical
    evolution. NH₃ and CH₃OH are concluded to be the most unambiguous proxies to infer surfaces on sub-Neptunes in the era
    of the James Webb Space Telescope (JWST).
  lay_summary: Sub-Neptune exoplanets may be rocky worlds with thick atmospheres or mini gas planets, but distinguishing between
    them is difficult from mass and radius alone. This study shows that JWST spectroscopy can detect chemical signatures of
    atmosphere-surface interactions that would reveal a shallow rocky surface beneath the gas envelope.
  lay_summary_draft: null
  _raw: Tsai S-M, H Innes, **T Lichtenberg**, J Taylor, M Malik, K Chubb, RT Pierrehumbert. [Inferring Shallow Surfaces on
    sub-Neptune Exoplanets with JWST.](https://scixplorer.org/abs/2021arXiv211106429T/abstract) *The Astrophysical Journal
    Letters* 922, L27 (2021). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ac399a/pdf)
- slug: dorn-2021-hidden
  section: research
  subsection: published
  year: 2021
  authors_md: Dorn C, **T Lichtenberg**
  title: Hidden water in magma ocean exoplanets
  venue_md: '*The Astrophysical Journal Letters* 922, L4 (2021)'
  primary_url: https://scixplorer.org/abs/2021ApJ...922L...4D/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ac33af/pdf
    scix: https://scixplorer.org/abs/2021ApJ...922L...4D/abstract
    doi: https://doi.org/10.3847/2041-8213/ac33af
  bibcode: 2021ApJ...922L...4D
  lab_led: false
  abstract: We demonstrate that the deep volatile storage capacity of magma oceans has significant implications for the bulk
    composition, interior, and climate state inferred from exoplanet mass and radius data. Experimental petrology provides
    the fundamental properties of the ability of water and melt to mix. So far, these data have been largely neglected for
    exoplanet mass–radius modeling. Here we present an advanced interior model for water-rich rocky exoplanets. The new model
    allows us to test the effects of rock melting and the redistribution of water between magma ocean and atmosphere on calculated
    planet radii. Models with and without rock melting and water partitioning lead to deviations in planet radius of up to
    16% for a fixed bulk composition and planet mass. This is within the current accuracy limits for individual systems and
    statistically testable on a population level. Unrecognized mantle melting and volatile redistribution in retrievals may
    thus underestimate the inferred planetary bulk water content by up to 1 order of magnitude.
  lay_summary: When interpreting exoplanet observations, most models assume water exists only in the atmosphere or as surface
    oceans. This study shows that magma oceans can dissolve and hide large amounts of water in the planet's interior, fundamentally
    changing the bulk composition and climate state inferred from mass and radius measurements alone.
  lay_summary_draft: null
  _raw: Dorn C, **T Lichtenberg**. [Hidden water in magma ocean exoplanets.](https://scixplorer.org/abs/2021ApJ...922L...4D/abstract)
    *The Astrophysical Journal Letters* 922, L4 (2021). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ac33af/pdf)
- slug: graham-2021-multispecies
  section: research
  subsection: published
  year: 2021
  authors_md: Graham RJ, **T Lichtenberg**, R Boukrouche, RT Pierrehumbert
  title: A multispecies pseudoadiabat for simulating condensable-rich exoplanet atmospheres
  venue_md: '*The Planetary Science Journal* 2, 207 (2021)'
  primary_url: https://scixplorer.org/abs/2021PSJ.....2..207G/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/PSJ/ac214c/pdf
    scix: https://scixplorer.org/abs/2021PSJ.....2..207G/abstract
    doi: https://doi.org/10.3847/PSJ/ac214c
  bibcode: 2021PSJ.....2..207G
  lab_led: false
  abstract: 'Central stages in the evolution of rocky, potentially habitable planets may play out under atmospheric conditions
    with a large inventory of nondilute condensable components. Variations in condensate retention and accompanying changes
    in local lapse rate may substantially affect planetary climate and surface conditions, but there is currently no general
    theory to effectively describe such atmospheres. In this article, expanding on the work by Li et al., we generalize the
    single-component moist pseudoadiabat derivation in Pierrehumbert to allow for multiple condensing components of arbitrary
    diluteness and retained condensate fraction. The introduction of a freely tunable retained condensate fraction allows
    for a flexible, self-consistent treatment of atmospheres with nondilute condensable components. To test the pseudoadiabat’s
    capabilities for simulating a diverse range of climates, we apply the formula to planetary atmospheres with compositions,
    surface pressures, and temperatures representing important stages with condensable-rich atmospheres in the evolution of
    terrestrial planets: a magma ocean planet in a runaway greenhouse state; a post-impact, late-veneer-analog planet with
    a complex atmospheric composition; and an Archean Earth-like planet near the outer edge of the classical circumstellar
    habitable zone. We find that variations in the retention of multiple nondilute condensable species can significantly affect
    the lapse rate and in turn outgoing radiation and the spectral signatures of planetary atmospheres. The presented formulation
    allows for a more comprehensive treatment of the climate evolution of rocky exoplanets and early Earth analogs.'
  lay_summary: Early in their evolution, rocky planets may have atmospheres dominated by condensable gases like water vapor
    rather than the dilute backgrounds typical of present-day Earth. This study develops a new thermodynamic framework for
    simulating such steam-rich atmospheres, which is essential for modeling the climate of young terrestrial worlds and magma
    ocean planets.
  lay_summary_draft: null
  _raw: Graham RJ, **T Lichtenberg**, R Boukrouche, RT Pierrehumbert. [A multispecies pseudoadiabat for simulating condensable-rich
    exoplanet atmospheres.](https://scixplorer.org/abs/2021PSJ.....2..207G/abstract) *The Planetary Science Journal* 2, 207
    (2021). [pdf](https://iopscience.iop.org/article/10.3847/PSJ/ac214c/pdf)
- slug: boukrouche-2021-beyond
  section: research
  subsection: published
  year: 2021
  authors_md: Boukrouche R, **T Lichtenberg**, RT Pierrehumbert
  title: 'Beyond runaway: initiation of the post-runaway greenhouse state on rocky exoplanets'
  venue_md: '*The Astrophysical Journal* 919, 130 (2021)'
  primary_url: https://scixplorer.org/abs/2021ApJ...919..130B/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/1538-4357/ac1345/pdf
    scix: https://scixplorer.org/abs/2021ApJ...919..130B/abstract
    doi: https://doi.org/10.3847/1538-4357/ac1345
  bibcode: 2021ApJ...919..130B
  lab_led: false
  abstract: 'The runaway greenhouse represents the ultimate climate catastrophe for rocky, Earth-like worlds: when the incoming
    stellar flux cannot be balanced by radiation to space, the oceans evaporate and exacerbate heating, turning the planet
    into a hot wasteland with a steam atmosphere overlying a possibly molten magma surface. The equilibrium state beyond the
    runaway greenhouse instellation limit depends on the radiative properties of the atmosphere and its temperature structure.
    Here, we use 1D radiative-convective models of steam atmospheres to explore the transition from the tropospheric radiation
    limit to the post-runaway climate state. To facilitate eventual simulations with 3D global circulation models, a computationally
    efficient band-gray model is developed, which is capable of reproducing the key features of the more comprehensive calculations.
    We analyze two factors that determine the equilibrated surface temperature of post-runaway planets. The infrared cooling
    of the planet is strongly enhanced by the penetration of the dry adiabat into the optically thin upper regions of the
    atmosphere. In addition, thermal emission of both shortwave and near-IR fluxes from the hot lower atmospheric layers,
    which can radiate through window regions of the spectrum, is quantified. Astronomical surveys of rocky exoplanets in the
    runaway greenhouse state may discriminate these features using multiwavelength observations.'
  lay_summary: The runaway greenhouse effect, where oceans boil away into a thick steam atmosphere, represents the worst-case
    climate scenario for Earth-like planets. This study investigates what happens after the runaway threshold is crossed,
    modeling the transition into the post-runaway state where a planet has a steam atmosphere overlying a global magma ocean.
  lay_summary_draft: null
  _raw: 'Boukrouche R, **T Lichtenberg**, RT Pierrehumbert. [Beyond runaway: initiation of the post-runaway greenhouse state
    on rocky exoplanets.](https://scixplorer.org/abs/2021ApJ...919..130B/abstract) *The Astrophysical Journal* 919, 130 (2021).
    [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/ac1345/pdf)'
- slug: lichtenberg-2021-redox
  section: research
  subsection: published
  year: 2021
  authors_md: '**Lichtenberg T**'
  title: Redox hysteresis of super-Earth exoplanets from magma ocean circulation
  venue_md: '*The Astrophysical Journal Letters* 914, L4 (2021)'
  primary_url: https://scixplorer.org/abs/2021ApJ...914L...4L/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ac0146/pdf
    blog: https://bit.ly/Lichtenberg21blog
    scix: https://scixplorer.org/abs/2021ApJ...914L...4L/abstract
    doi: https://doi.org/10.3847/2041-8213/ac0146
  bibcode: 2021ApJ...914L...4L
  lab_led: true
  abstract: Internal redox reactions may irreversibly alter the mantle composition and volatile inventory of terrestrial and
    super-Earth exoplanets and affect the prospects for atmospheric observations. The global efficacy of these mechanisms,
    however, hinges on the transfer of reduced iron from the molten silicate mantle to the metal core. Scaling analysis indicates
    that turbulent diffusion in the internal magma oceans of sub-Neptunes can kinetically entrain liquid iron droplets and
    quench core formation. This suggests that the chemical equilibration between core, mantle, and atmosphere may be energetically
    limited by convective overturn in the magma flow. Hence, molten super-Earths possibly retain a compositional memory of
    their accretion path. Redox control by magma ocean circulation is positively correlated with planetary heat flow, internal
    gravity, and planet size. The presence and speciation of remanent atmospheres, surface mineralogy, and core mass fraction
    of primary envelope-stripped exoplanets may thus constrain magma ocean dynamics.
  lay_summary: When a super-Earth's interior is fully molten, iron droplets should sink to form a metal core, setting the
    oxidation state of the mantle. We show that turbulent convection in deep magma oceans can keep iron droplets suspended,
    preventing complete core formation and preserving a chemical memory of how the planet formed. This means two super-Earths
    of identical mass could have very different mantle and atmospheric compositions depending on their accretion history.
  lay_summary_draft: When a super-Earth's interior is fully molten, iron droplets should sink to form a metal core, setting
    the oxidation state of the mantle. We show that turbulent convection in deep magma oceans can keep iron droplets suspended,
    preventing complete core formation and preserving a chemical memory of how the planet formed. This means two super-Earths
    of identical mass could have very different mantle and atmospheric compositions depending on their accretion history.
  _raw: '**Lichtenberg T**. [Redox hysteresis of super-Earth exoplanets from magma ocean circulation.](https://scixplorer.org/abs/2021ApJ...914L...4L/abstract)
    *The Astrophysical Journal Letters* 914, L4 (2021). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ac0146/pdf),
    [blog](https://bit.ly/Lichtenberg21blog)'
- slug: lichtenberg-2021-system-level
  section: research
  subsection: published
  year: 2021
  authors_md: '**Lichtenberg T**, S Krijt'
  title: System-level fractionation of carbon from disk and planetesimal processing
  venue_md: '*The Astrophysical Journal Letters* 913, L20 (2021)'
  primary_url: https://scixplorer.org/abs/2021ApJ...913L..20L/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/abfdce/pdf
    blog: https://bit.ly/LichtenbergKrijt21blog
    scix: https://scixplorer.org/abs/2021ApJ...913L..20L/abstract
    doi: https://doi.org/10.3847/2041-8213/abfdce
  bibcode: 2021ApJ...913L..20L
  lab_led: true
  abstract: Finding and characterizing extrasolar Earth analogs will rely on interpretation of the planetary system's environmental
    context. The total budget and fractionation between C-H-O species sensitively affect the climatic and geodynamic state
    of terrestrial worlds, but their main delivery channels are poorly constrained. We connect numerical models of volatile
    chemistry and pebble coagulation in the circumstellar disk with the internal compositional evolution of planetesimals
    during the primary accretion phase. Our simulations demonstrate that disk chemistry and degassing from planetesimals operate
    on comparable timescales and can fractionate the relative abundances of major water and carbon carriers by orders of magnitude.
    As a result, individual planetary systems with significant planetesimal processing display increased correlation in the
    volatile budget of planetary building blocks relative to no internal heating. Planetesimal processing in a subset of systems
    increases the variance of volatile contents across planetary systems. Our simulations thus suggest that exoplanetary atmospheric
    compositions may provide constraints on when a specific planet formed.
  lay_summary: The relative abundances of water and carbon delivered to young planets depend on both the chemistry of the
    surrounding gas disk and the internal heating of the rocky building blocks. We show that radioactive heating inside planetesimals
    can drive off volatiles on the same timescale as disk chemistry rearranges them, creating correlated carbon-to-water ratios
    across a planetary system. Future measurements of exoplanet atmospheres may thus reveal when and how quickly a planet's
    building blocks formed.
  lay_summary_draft: The relative abundances of water and carbon delivered to young planets depend on both the chemistry of
    the surrounding gas disk and the internal heating of the rocky building blocks. We show that radioactive heating inside
    planetesimals can drive off volatiles on the same timescale as disk chemistry rearranges them, creating correlated carbon-to-water
    ratios across a planetary system. Future measurements of exoplanet atmospheres may thus reveal when and how quickly a
    planet's building blocks formed.
  _raw: '**Lichtenberg T**, S Krijt. [System-level fractionation of carbon from disk and planetesimal processing.](https://scixplorer.org/abs/2021ApJ...913L..20L/abstract)
    *The Astrophysical Journal Letters* 913, L20 (2021). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/abfdce/pdf),
    [blog](https://bit.ly/LichtenbergKrijt21blog)'
- slug: meier-2021-hemispheric
  section: research
  subsection: published
  year: 2021
  authors_md: Meier TG, DJ Bower, **T Lichtenberg**, PJ Tackley, B-O Demory
  title: Hemispheric Tectonics on super-Earth LHS 3844b
  venue_md: '*The Astrophysical Journal Letters* 908, L48 (2021)'
  primary_url: https://scixplorer.org/abs/2021ApJ...908L..48M/abstract
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/abe400/pdf
    blog: http://nccr-planets.ch/blog/2021/03/04/volcanoes-might-light-up-the-night-sky-of-this-planet/
    scix: https://scixplorer.org/abs/2021ApJ...908L..48M/abstract
    doi: https://doi.org/10.3847/2041-8213/abe400
  bibcode: 2021ApJ...908L..48M
  lab_led: false
  abstract: 'The tectonic regime of rocky planets fundamentally influences their long-term evolution and cycling of volatiles
    between interior and atmosphere. Earth is the only known planet with active plate tectonics, but observations of exoplanets
    may deliver insights into the diversity of tectonic regimes beyond the solar system. Observations of the thermal phase
    curve of super-Earth LHS 3844b reveal a solid surface and lack of a substantial atmosphere, with a temperature contrast
    between the substellar and antistellar point of around 1000 K. Here, we use these constraints on the planet’s surface
    to constrain the interior dynamics and tectonic regimes of LHS 3844b using numerical models of interior flow. We investigate
    the style of interior convection by assessing how upwellings and downwellings are organized and how tectonic regimes manifest.
    We discover three viable convective regimes with a mobile surface: (1) spatially uniform distribution of upwellings and
    downwellings, (2) prominent downwelling on the dayside and upwellings on the nightside, and (3) prominent downwelling
    on the nightside and upwellings on the dayside. Hemispheric tectonics is observed for regimes (2) and (3) as a direct
    consequence of the day-to-night temperature contrast. Such a tectonic mode is absent in the present-day solar system and
    has never been inferred from astrophysical observations of exoplanets. Our models offer distinct predictions for volcanism
    and outgassing linked to the tectonic regime, which may explain secondary features in phase curves and allow future observations
    to constrain the diversity of super-Earth interiors.'
  lay_summary: Tidally locked super-Earths experience extreme temperature contrasts between their permanent dayside and nightside.
    This study shows that these contrasts can drive a unique tectonic regime with active convection on one hemisphere and
    a stagnant lid on the other, concentrating volcanic outgassing on one side of the planet.
  lay_summary_draft: null
  _raw: Meier TG, DJ Bower, **T Lichtenberg**, PJ Tackley, B-O Demory. [Hemispheric Tectonics on super-Earth LHS 3844b.](https://scixplorer.org/abs/2021ApJ...908L..48M/abstract)
    *The Astrophysical Journal Letters* 908, L48 (2021). [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/abe400/pdf),
    [blog](http://nccr-planets.ch/blog/2021/03/04/volcanoes-might-light-up-the-night-sky-of-this-planet/)
- slug: lichtenberg-2021-vertically
  section: research
  subsection: published
  year: 2021
  authors_md: '**Lichtenberg T**, DJ Bower, M Hammond, R Boukrouche, P Sanan, S-M Tsai, RT Pierrehumbert'
  title: 'Vertically resolved magma ocean-protoatmosphere evolution: H2, H2O, CO2, CH4, CO, O2, and N2 as primary absorbers'
  venue_md: '*Journal of Geophysical Research: Planets* 126, e2020JE006711 (2021)'
  primary_url: https://scixplorer.org/abs/2021JGRE..12606711L
  links:
    pdf: https://onlinelibrary.wiley.com/doi/pdfdirect/10.1029/2020JE006711
    blog: http://bit.ly/MO21_blog
    scix: https://scixplorer.org/abs/2021JGRE..12606711L
    doi: https://doi.org/10.3847/2041-8213/ac0f37
  bibcode: 2021JGRE..12606711L
  lab_led: true
  abstract: 'The earliest atmospheres of rocky planets originate from extensive volatile release during magma ocean epochs
    that occur during assembly of the planet. These establish the initial distribution of the major volatile elements between
    different chemical reservoirs that subsequently evolve via geological cycles. Current theoretical techniques are limited
    in exploring the anticipated range of compositional and thermal scenarios of early planetary evolution, even though these
    are of prime importance to aid astronomical inferences on the environmental context and geological history of extrasolar
    planets. Here, we present a coupled numerical framework that links an evolutionary, vertically resolved model of the planetary
    silicate mantle with a radiative convective model of the atmosphere. Using this method, we investigate the early evolution
    of idealized Earth sized rocky planets with end member, clear sky atmospheres dominated by either H₂, H₂O, CO₂, CH₄, CO,
    O₂, or N₂. We find central metrics of early planetary evolution, such as energy gradient, sequence of mantle solidification,
    surface pressure, or vertical stratification of the atmosphere, to be intimately controlled by the dominant volatile and
    outgassing history of the planet. Thermal sequences fall into three general classes with increasing cooling timescale:
    CO, N₂, and O₂ with minimal effect, H₂O, CO₂, and CH₄ with intermediate influence, and H₂ with several orders of magnitude
    increase in solidification time and atmosphere vertical stratification. Our numerical experiments exemplify the capabilities
    of the presented modeling framework and link the interior and atmospheric evolution of rocky exoplanets with multiwavelength
    astronomical observations.'
  lay_summary: The first atmosphere of a rocky planet forms when its molten surface releases trapped gases. We built a coupled
    model that tracks how different atmospheric gases interact with a solidifying magma ocean and control the planet's cooling
    rate. Hydrogen-dominated atmospheres slow cooling by orders of magnitude compared to nitrogen or carbon monoxide, meaning
    the dominant outgassed species fundamentally determines a young planet's thermal evolution.
  lay_summary_draft: The first atmosphere of a rocky planet forms when its molten surface releases trapped gases. We built
    a coupled model that tracks how different atmospheric gases interact with a solidifying magma ocean and control the planet's
    cooling rate. Hydrogen-dominated atmospheres slow cooling by orders of magnitude compared to nitrogen or carbon monoxide,
    meaning the dominant outgassed species fundamentally determines a young planet's thermal evolution.
