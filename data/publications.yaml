- slug: lichtenberg-2021-bifurcation
  section: research
  subsection: published
  year: 2021
  authors_md: '**Lichtenberg T**, J Drążkowska, M Schönbächler, GJ Golabek, TO Hands'
  title: Bifurcation of planetary building blocks during Solar System formation
  venue_md: '*Science* 371, 365–370 (2021)'
  primary_url: https://scixplorer.org/abs/2021Sci...371..365L/abstract
  links:
    pdf: http://science.sciencemag.org/cgi/rapidpdf/371/6527/365?ijkey=O/eSa0.QgQcD6&keytype=ref&siteid=sci
    blog: http://bit.ly/BifurcationBlog
    scix: https://scixplorer.org/abs/2021Sci...371..365L/abstract
    doi: https://doi.org/10.1126/science.abb3091
  bibcode: 2021Sci...371..365L
  lab_led: true
  abstract: Geochemical and astronomical evidence demonstrates that planet formation occurred in two spatially and temporally
    separated reservoirs. The origin of this dichotomy is unknown. We use numerical models to investigate how the evolution
    of the solar protoplanetary disk influenced the timing of protoplanet formation and their internal evolution. Migration
    of the water snow line can generate two distinct bursts of planetesimal formation that sample different source regions.
    These reservoirs evolve in divergent geophysical modes and develop distinct volatile contents, consistent with constraints
    from accretion chronology, thermochemistry, and the mass divergence of inner and outer Solar System. Our simulations suggest
    that the compositional fractionation and isotopic dichotomy of the Solar System was initiated by the interplay between
    disk dynamics, heterogeneous accretion, and internal evolution of forming protoplanets.
  lay_summary: Meteorite evidence shows that the Solar System's building blocks formed in two distinct chemical reservoirs,
    but the origin of this split was unclear. We demonstrate that the inward migration of the snow line in the young Solar
    System triggered two separate bursts of planetesimal formation, sampling different regions of the disk. These two populations
    then evolved along divergent geophysical paths, naturally explaining the compositional divide between the inner and outer
    Solar System.
  lay_summary_draft: Meteorite evidence shows that the Solar System's building blocks formed in two distinct chemical reservoirs,
    but the origin of this split was unclear. We demonstrate that the inward migration of the snow line in the young Solar
    System triggered two separate bursts of planetesimal formation, sampling different regions of the disk. These two populations
    then evolved along divergent geophysical paths, naturally explaining the compositional divide between the inner and outer
    Solar System.
  _raw: '**Lichtenberg T**, J Drążkowska, M Schönbächler, GJ Golabek, TO Hands. [Bifurcation of planetary building blocks
    during Solar System formation.](https://scixplorer.org/abs/2021Sci...371..365L/abstract) *Science* 371, 365–370 (2021).
    [pdf](http://science.sciencemag.org/cgi/rapidpdf/371/6527/365?ijkey=O/eSa0.QgQcD6&keytype=ref&siteid=sci), [blog](http://bit.ly/BifurcationBlog)'
- slug: lichtenberg-2019-water
  section: research
  subsection: published
  year: 2019
  authors_md: '**Lichtenberg T**, GJ Golabek, R Burn, MR Meyer, Y Alibert, TV Gerya, CA Mordasini'
  title: A water budget dichotomy of rocky protoplanets from 26Al-heating
  venue_md: '*Nature Astronomy* 3, 307–313 (2019)'
  primary_url: https://scixplorer.org/abs/2019NatAs...3..307L/abstract
  links:
    pdf: https://arxiv.org/pdf/1902.04026.pdf
    blog: http://bit.ly/Al26-dehydration_medium
    scix: https://scixplorer.org/abs/2019NatAs...3..307L/abstract
    doi: https://doi.org/10.1038/s41550-018-0688-5
  bibcode: 2019NatAs...3..307L
  lab_led: true
  abstract: 'In contrast to the water-poor planets of the inner Solar System, stochasticity during planetary formation¹,²
    and order-of-magnitude deviations in exoplanet volatile contents³ suggest that rocky worlds engulfed in thick volatile
    ice layers⁴,⁵ are the dominant family of terrestrial analogues⁶,⁷ among the extrasolar planet population. However, the
    distribution of compositionally Earth-like planets remains insufficiently constrained³, and it is not clear whether the
    Solar System is a statistical outlier or can be explained by more general planetary formation processes. Here we use numerical
    models of planet formation, evolution and interior structure to show that a planet''s bulk water fraction and radius are
    anti-correlated with initial ²⁶Al levels in the planetesimal-based accretion framework. The heat generated by this short-lived
    radionuclide rapidly dehydrates planetesimals⁸ before their accretion onto larger protoplanets and yields a system-wide
    correlation⁹,¹⁰ of planetary bulk water abundances, which, for instance, can explain the lack of a clear orbital trend
    in the water budgets of the TRAPPIST-1 planets¹¹. Qualitatively, our models suggest two main scenarios for the formation
    of planetary systems: high-²⁶Al systems, like our Solar System, form small, water-depleted planets, whereas those devoid
    of ²⁶Al predominantly form ocean worlds. For planets of similar mass, the mean planetary transit radii of the ocean planet
    population can be up to about 10% larger than for planets from the ²⁶Al-rich formation scenario.'
  lay_summary: Radioactive aluminum-26, inherited from a nearby supernova, heated the Solar System's earliest rocky bodies
    and drove off their water before they could grow into planets. We show that planetary systems rich in aluminum-26, like
    ours, preferentially form dry, rocky worlds, while systems without it form water-rich ocean planets. This mechanism can
    explain why the TRAPPIST-1 planets have similar water contents despite orbiting at very different distances from their
    star.
  lay_summary_draft: Radioactive aluminum-26, inherited from a nearby supernova, heated the Solar System's earliest rocky
    bodies and drove off their water before they could grow into planets. We show that planetary systems rich in aluminum-26,
    like ours, preferentially form dry, rocky worlds, while systems without it form water-rich ocean planets. This mechanism
    can explain why the TRAPPIST-1 planets have similar water contents despite orbiting at very different distances from their
    star.
  _raw: '**Lichtenberg T**, GJ Golabek, R Burn, MR Meyer, Y Alibert, TV Gerya, CA Mordasini. [A water budget dichotomy of
    rocky protoplanets from 26Al-heating.](https://scixplorer.org/abs/2019NatAs...3..307L/abstract) *Nature Astronomy* 3,
    307–313 (2019). [pdf](https://arxiv.org/pdf/1902.04026.pdf), [blog](http://bit.ly/Al26-dehydration_medium)'
- slug: lichtenberg-2019-magma
  section: research
  subsection: published
  year: 2019
  authors_md: '**Lichtenberg T**, T Keller, RF Katz, GJ Golabek, TV Gerya'
  title: 'Magma ascent in planetesimals: control by grain size'
  venue_md: '*Earth and Planetary Science Letters* 507, 154–165 (2019)'
  primary_url: https://scixplorer.org/abs/2019E%26PSL.507..154L
  links:
    pdf: https://arxiv.org/pdf/1802.02157.pdf
    video: http://goo.gl/V1UK1i
    blog: http://bit.ly/2GZZ0e9
    scix: https://scixplorer.org/abs/2019E%26PSL.507..154L
    doi: https://doi.org/10.1016/j.epsl.2018.11.034
  bibcode: 2019E&PSL.507..154L
  lab_led: true
  abstract: Rocky planetesimals in the early solar system melted internally and evolved chemically due to radiogenic heating
    from ²⁶Al. Here we quantify the parametric controls on magma genesis and transport using a coupled petrological and fluid
    mechanical model of reactive two-phase flow. We find the mean grain size of silicate minerals to be a key control on magma
    ascent. For grain sizes ≳1 mm, melt segregation produces distinct radial structure and chemical stratification. This stratification
    is most pronounced for bodies formed at around 1 Myr after formation of Ca, Al-rich inclusions. These findings suggest
    a link between the time and orbital location of planetesimal formation and their subsequent structural and chemical evolution.
    According to our models, the evolution of partially molten planetesimal interiors falls into two categories. In the magma
    ocean scenario, the whole interior of a planetesimal experiences nearly complete melting, which would result in turbulent
    convection and core-mantle differentiation by the rainfall mechanism. In the magma sill scenario, segregating melts gradually
    deplete the deep interior of the radiogenic heat source. In this case, magma may form melt-rich layers beneath a cool
    and stable lid, while core formation would proceed by percolation. Our findings suggest that grain sizes prevalent during
    the internal heating stage governed magma ascent in planetesimals. Regardless of whether evolution progresses toward a
    magma ocean or magma sill structure, our models predict that temperature inversions due to rapid ²⁶Al redistribution are
    limited to bodies formed earlier than ≈1 Myr after CAIs. We find that if grain size was ≲1 mm during peak internal melting,
    only elevated solid-melt density contrasts (such as found for the reducing conditions in enstatite chondrite compositions)
    would allow substantial melt segregation to occur.
  lay_summary: 'The earliest rocky bodies in the Solar System melted from the inside out due to radioactive heating, but it
    has been unclear how magma moved through their interiors. We find that the grain size of silicate minerals is the critical
    factor: coarse-grained material lets magma segregate and create chemically layered structures, while fine-grained material
    traps melt in place. This connects the mineral texture of meteorites to the internal evolution and differentiation of
    their parent bodies.'
  lay_summary_draft: 'The earliest rocky bodies in the Solar System melted from the inside out due to radioactive heating,
    but it has been unclear how magma moved through their interiors. We find that the grain size of silicate minerals is the
    critical factor: coarse-grained material lets magma segregate and create chemically layered structures, while fine-grained
    material traps melt in place. This connects the mineral texture of meteorites to the internal evolution and differentiation
    of their parent bodies.'
  _raw: '**Lichtenberg T**, T Keller, RF Katz, GJ Golabek, TV Gerya. [Magma ascent in planetesimals: control by grain size.](https://scixplorer.org/abs/2019E%26PSL.507..154L)
    *Earth and Planetary Science Letters* 507, 154–165 (2019). [pdf](https://arxiv.org/pdf/1802.02157.pdf), [video](http://goo.gl/V1UK1i),
    [blog](http://bit.ly/2GZZ0e9)'
- slug: bonati-2019-direct
  section: research
  subsection: published
  year: 2019
  authors_md: Bonati I, **T Lichtenberg**, DJ Bower, ML Timpe, SP Quanz
  title: Direct imaging of molten protoplanets in nearby young stellar associations
  venue_md: '*Astronomy & Astrophysics* 621, A125 (2019)'
  primary_url: https://scixplorer.org/abs/2019A%26A...621A.125B/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2018/10/aa33942-18.pdf
    blog: http://bit.ly/Bonati18
    scix: https://scixplorer.org/abs/2019A%26A...621A.125B/abstract
    doi: https://doi.org/10.1051/0004-6361/201833158
  bibcode: 2019A&A...621A.125B
  lab_led: false
  abstract: During their formation and early evolution, rocky planets undergo multiple global melting events due to accretionary
    collisions with other protoplanets. The detection and characterization of their post-collision afterglows (magma oceans)
    can yield important clues about the origin and evolution of the solar and extrasolar planet population. Here, we quantitatively
    assess the observational prospects to detect the radiative signature of forming planets covered by such collision-induced
    magma oceans in nearby young stellar associations with future direct imaging facilities. We have compared performance
    estimates for near- and mid-infrared instruments to be installed at ESO’s Extremely Large Telescope (ELT), and a potential
    space-based mission called Large Interferometer for Exoplanets (LIFE). We modelled the frequency and timing of energetic
    collisions using N-body models of planet formation for different stellar types, and determine the cooling of the resulting
    magma oceans with an insulating atmosphere. We find that the probability of detecting at least one magma ocean planet
    depends on the observing duration and the distribution of atmospheric properties among rocky protoplanets. However, the
    prospects for detection significantly increase for young and close stellar targets, which show the highest frequencies
    of giant impacts. For intensive reconnaissance with a K band (2.2 μm) ELT filter or a 5.6 μm LIFE filter, the β Pictoris,
    Columba, TW Hydrae, and Tucana-Horologium associations represent promising candidates for detecting a molten protoplanet.
    Our results motivate the exploration of magma ocean planets using the ELT and underline the importance of space-based
    direct imaging facilities to investigate and characterize planet formation and evolution in the solar vicinity. Direct
    imaging of magma oceans will advance our understanding of the early interior, surface and atmospheric properties of terrestrial
    worlds.
  lay_summary: When rocky protoplanets collide during formation, they produce temporary magma oceans that glow in the infrared.
    This study calculates the brightness and duration of these post-collision afterglows and shows that next-generation telescopes
    could directly image them in nearby young stellar associations, providing a new way to study planet formation.
  lay_summary_draft: null
  _raw: Bonati I, **T Lichtenberg**, DJ Bower, ML Timpe, SP Quanz. [Direct imaging of molten protoplanets in nearby young
    stellar associations.](https://scixplorer.org/abs/2019A%26A...621A.125B/abstract) *Astronomy & Astrophysics* 621, A125
    (2019). [pdf](https://www.aanda.org/articles/aa/pdf/2018/10/aa33942-18.pdf), [blog](http://bit.ly/Bonati18)
- slug: hunt-2018-late
  section: research
  subsection: published
  year: 2018
  authors_md: Hunt AC, DL Cook, **T Lichtenberg**, PM Reger, M Ek, GJ Golabek, M Schönbächler
  title: 'Late metal–silicate separation on the IAB parent asteroid: Constraints from combined W and Pt isotopes and thermal
    modelling'
  venue_md: '*Earth and Planetary Science Letters* 482, 490-500 (2018)'
  primary_url: https://scixplorer.org/abs/2018E%26PSL.482..490H/abstract
  links:
    pdf: https://arxiv.org/pdf/1802.10421.pdf
    scix: https://scixplorer.org/abs/2018E%26PSL.482..490H/abstract
    doi: https://doi.org/10.1016/j.epsl.2017.11.034
  bibcode: 2018E&PSL.482..490H
  lab_led: false
  abstract: The short-lived ¹⁸²Hf-¹⁸²W decay system is a powerful chronometer for constraining the timing of metal-silicate
    separation and core formation in planetesimals and planets. Neutron capture effects on W isotopes, however, significantly
    hamper the application of this tool. In order to correct for neutron capture effects, Pt isotopes have emerged as a reliable
    in-situ neutron dosimeter. This study applies this method to IAB iron meteorites, in order to constrain the timing of
    metal segregation on the IAB parent body. The ε¹⁸²W values obtained for the IAB iron meteorites range from -3.61 ± 0.10
    to -2.73 ± 0.09. Correlating εiPt with ¹⁸²W data yields a pre-neutron capture ¹⁸²W of -2.90 ± 0.06. This corresponds to
    a metal-silicate separation age of 6.0 ± 0.8 Ma after CAI for the IAB parent body, and is interpreted to represent a body-wide
    melting event. Later, between 10 and 14 Ma after CAI, an impact led to a catastrophic break-up and subsequent reassembly
    of the parent body. Thermal models of the interior evolution that are consistent with these estimates suggest that the
    IAB parent body underwent metal-silicate separation as a result of internal heating by short-lived radionuclides and accreted
    at around 1.4 ± 0.1 Ma after CAIs with a radius of greater than 60 km.
  lay_summary: The IAB iron meteorites record an unusual history of partial melting and metal-silicate separation in their
    parent asteroid. Using tungsten and platinum isotope measurements combined with thermal modeling, this study constrains
    the timing and conditions of core formation in this body, shedding light on early Solar System planetesimal evolution.
  lay_summary_draft: null
  _raw: 'Hunt AC, DL Cook, **T Lichtenberg**, PM Reger, M Ek, GJ Golabek, M Schönbächler. [Late metal–silicate separation
    on the IAB parent asteroid: Constraints from combined W and Pt isotopes and thermal modelling.](https://scixplorer.org/abs/2018E%26PSL.482..490H/abstract)
    *Earth and Planetary Science Letters* 482, 490-500 (2018). [pdf](https://arxiv.org/pdf/1802.10421.pdf)'
- slug: lichtenberg-2018-impact
  section: research
  subsection: published
  year: 2018
  authors_md: '**Lichtenberg T**, GJ Golabek, CP Dullemond, M Schönbächler, TV Gerya, MR Meyer'
  title: Impact splash chondrule formation during planetesimal recycling
  venue_md: '*Icarus* 302, 27–43 (2018)'
  primary_url: https://scixplorer.org/abs/2018Icar..302...27L
  links:
    pdf: https://arxiv.org/pdf/1711.02103.pdf
    blog: http://goo.gl/5bDqGC
    scix: https://scixplorer.org/abs/2018Icar..302...27L
    doi: https://doi.org/10.1016/j.icarus.2017.11.004
  bibcode: 2018Icar..302...27L
  lab_led: true
  abstract: Chondrules, mm-sized igneous-textured spherules, are the dominant bulk silicate constituent of chondritic meteorites
    and originate from highly energetic, local processes during the first million years after the birth of the Sun. So far,
    an astrophysically consistent chondrule formation scenario explaining major chemical, isotopic and textural features,
    in particular Fe,Ni metal abundances, bulk Fe/Mg ratios and intra-chondrite chemical and isotopic diversity, remains elusive.
    Here, we examine the prospect of forming chondrules from impact splashes among planetesimals heated by radioactive decay
    of short-lived radionuclides using thermomechanical models of their interior evolution. We show that intensely melted
    planetesimals with interior magma oceans became rapidly chemically equilibrated and physically differentiated. Therefore,
    collisional interactions among such bodies would have resulted in chondrule-like but basaltic spherules, which are not
    observed in the meteoritic record. This inconsistency with the expected dynamical interactions hints at an incomplete
    understanding of the planetary growth regime during the lifetime of the solar protoplanetary disk. To resolve this conundrum,
    we examine how the observed chemical and isotopic features of chondrules constrain the dynamical environment of accreting
    chondrite parent bodies by interpreting the meteoritic record as an impact-generated proxy of early solar system planetesimals
    that underwent repeated collision and reaccretion cycles. Using a coupled evolution-collision model we demonstrate that
    the vast majority of collisional debris feeding the asteroid main belt must be derived from planetesimals which were partially
    molten at maximum. Therefore, the precursors of chondrite parent bodies either formed primarily small, from sub-canonical
    aluminum-26 reservoirs, or collisional destruction mechanisms were efficient enough to shatter planetesimals before they
    reached the magma ocean phase. Finally, we outline the window in parameter space for which chondrule formation from planetesimal
    collisions can be reconciled with the meteoritic record and how our results can be used to further constrain early solar
    system dynamics.
  lay_summary: Chondrules, millimeter-sized glassy beads found in most meteorites, formed in energetic events during the first
    million years of the Solar System, but their origin remains debated. We tested whether collisions between partially molten
    planetesimals could produce chondrules with the right chemistry and found that the precursor bodies must not have been
    fully melted. This constrains either the timing and size of early planetesimals or the efficiency of collisional destruction
    in the young Solar System.
  lay_summary_draft: Chondrules, millimeter-sized glassy beads found in most meteorites, formed in energetic events during
    the first million years of the Solar System, but their origin remains debated. We tested whether collisions between partially
    molten planetesimals could produce chondrules with the right chemistry and found that the precursor bodies must not have
    been fully melted. This constrains either the timing and size of early planetesimals or the efficiency of collisional
    destruction in the young Solar System.
  _raw: '**Lichtenberg T**, GJ Golabek, CP Dullemond, M Schönbächler, TV Gerya, MR Meyer. [Impact splash chondrule formation
    during planetesimal recycling.](https://scixplorer.org/abs/2018Icar..302...27L) *Icarus* 302, 27–43 (2018). [pdf](https://arxiv.org/pdf/1711.02103.pdf),
    [blog](http://goo.gl/5bDqGC)'
- slug: parker-2017-planet
  section: research
  subsection: published
  year: 2017
  authors_md: Parker RJ, **T Lichtenberg**, SP Quanz
  title: Was Planet 9 captured in the Sun's natal star-forming region?
  venue_md: '*Monthly Notices of the Royal Astronomical Society: Letters* 472, L75–L79 (2017)'
  primary_url: https://scixplorer.org/abs/2017MNRAS.472L..75P
  links:
    pdf: https://academic.oup.com/mnrasl/article-pdf/472/1/L75/56953806/slx141.pdf
    scix: https://scixplorer.org/abs/2017MNRAS.472L..75P
    doi: https://doi.org/10.1093/mnrasl/slx141
  bibcode: 2017MNRAS.472L..75P
  lab_led: false
  abstract: The presence of an unseen ‘Planet 9’ on the outskirts of the Solar system has been invoked to explain the unexpected
    clustering of the orbits of several Edgeworth–Kuiper Belt Objects. We use N-body simulations to investigate the probability
    that Planet 9 was a free-floating planet (FFLOP) that was captured by the Sun in its birth star formation environment.
    We find that only 1–6 per cent of FFLOPs are ensnared by stars, even with the most optimal initial conditions for capture
    in star-forming regions (one FFLOP per star, and highly correlated stellar velocities to facilitate capture). Depending
    on the initial conditions of the star-forming regions, only 5–10 of 10 000 planets are captured on to orbits that lie
    within the constraints for Planet 9. When we apply an additional environmental constraint for Solar system formation –
    namely the injection of short-lived radioisotopes into the Sun’s protoplanetary disc from supernovae – we find the probability
    for the capture of Planet 9 to be almost zero.
  lay_summary: The hypothetical Planet 9 in the outer Solar System could be a captured free-floating planet rather than one
    that formed in situ. This study uses simulations of the Sun's birth environment to show that capturing a several-Earth-mass
    planet from another star is dynamically plausible in a dense star-forming region.
  lay_summary_draft: null
  _raw: 'Parker RJ, **T Lichtenberg**, SP Quanz. [Was Planet 9 captured in the Sun''s natal star-forming region?](https://scixplorer.org/abs/2017MNRAS.472L..75P)
    *Monthly Notices of the Royal Astronomical Society: Letters* 472, L75–L79 (2017). [pdf](https://academic.oup.com/mnrasl/article-pdf/472/1/L75/56953806/slx141.pdf)'
- slug: lichtenberg-2016-isotopic
  section: research
  subsection: published
  year: 2016
  authors_md: '**Lichtenberg T**, RJ Parker, MR Meyer'
  title: Isotopic enrichment of forming planetary systems from supernova pollution
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 462, 3979–3992 (2016)'
  primary_url: https://scixplorer.org/abs/2016MNRAS.462.3979L
  links:
    pdf: https://academic.oup.com/mnras/article-pdf/462/4/3979/18756772/stw1929.pdf
    video: http://bit.ly/supernova_pollution
    blog: http://nccr-planets.ch/blog/2016/08/10/supernova-ejecta-pollute-young-planetary-systems/
    scix: https://scixplorer.org/abs/2016MNRAS.462.3979L
    doi: https://doi.org/10.1093/mnras/stw1929
  bibcode: 2016MNRAS.462.3979L
  lab_led: true
  abstract: Heating by short-lived radioisotopes (SLRs) such as ²⁶Al and ⁶⁰Fe fundamentally shaped the thermal history and
    interior structure of Solar system planetesimals during the early stages of planetary formation. The subsequent thermo-mechanical
    evolution, such as internal differentiation or rapid volatile degassing, yields important implications for the final structure,
    composition and evolution of terrestrial planets. SLR-driven heating in the Solar system is sensitive to the absolute
    abundance and homogeneity of SLRs within the protoplanetary disc present during the condensation of the first solids.
    In order to explain the diverse compositions found for extrasolar planets, it is important to understand the distribution
    of SLRs in active planet formation regions (star clusters) during their first few Myr of evolution. By constraining the
    range of possible effects, we show how the imprint of SLRs can be extrapolated to exoplanetary systems and derive statistical
    predictions for the distribution of ²⁶Al and ⁶⁰Fe based on N-body simulations of typical to large clusters (10³-10⁴ stars)
    with a range of initial conditions. We quantify the pollution of protoplanetary discs by supernova ejecta and show that
    the likelihood of enrichment levels similar to or higher than the Solar system can vary considerably, depending on the
    cluster morphology. Furthermore, many enriched systems show an excess in radiogenic heating compared to Solar system levels,
    which implies that the formation and evolution of planetesimals could vary significantly depending on the birth environment
    of their host stars.
  lay_summary: Short-lived radioactive isotopes like aluminum-26 heated the building blocks of our Solar System and drove
    their internal evolution, but it is unclear how common such enrichment is elsewhere. We simulated the dispersal of supernova
    ejecta through young star clusters and found that the likelihood of Solar-System-level enrichment varies widely depending
    on the cluster's size and structure. Many planetary systems may receive even higher doses, implying that planetesimal
    evolution could differ substantially across the galaxy.
  lay_summary_draft: Short-lived radioactive isotopes like aluminum-26 heated the building blocks of our Solar System and
    drove their internal evolution, but it is unclear how common such enrichment is elsewhere. We simulated the dispersal
    of supernova ejecta through young star clusters and found that the likelihood of Solar-System-level enrichment varies
    widely depending on the cluster's size and structure. Many planetary systems may receive even higher doses, implying that
    planetesimal evolution could differ substantially across the galaxy.
  _raw: '**Lichtenberg T**, RJ Parker, MR Meyer. [Isotopic enrichment of forming planetary systems from supernova pollution.](https://scixplorer.org/abs/2016MNRAS.462.3979L)
    *Monthly Notices of the Royal Astronomical Society* 462, 3979–3992 (2016). [pdf](https://academic.oup.com/mnras/article-pdf/462/4/3979/18756772/stw1929.pdf),
    [video](http://bit.ly/supernova_pollution), [blog](http://nccr-planets.ch/blog/2016/08/10/supernova-ejecta-pollute-young-planetary-systems/)'
- slug: lichtenberg-2016-effects
  section: research
  subsection: published
  year: 2016
  authors_md: '**Lichtenberg T**, GJ Golabek, TV Gerya, MR Meyer'
  title: The effects of short-lived radionuclides and porosity on the early thermo-mechanical evolution of planetesimals
  venue_md: '*Icarus* 274, 350–365 (2016)'
  primary_url: https://scixplorer.org/abs/2016Icar..274..350L
  links:
    pdf: https://arxiv.org/pdf/1603.05979.pdf
    video: http://bit.ly/planetesimal_evolution
    blog: http://nccr-planets.ch/blog/2016/04/15/asteroid-interiors/
    scix: https://scixplorer.org/abs/2016Icar..274..350L
    doi: https://doi.org/10.1016/j.icarus.2016.03.004
  bibcode: 2016Icar..274..350L
  lab_led: true
  abstract: The thermal history and internal structure of chondritic planetesimals, assembled before the giant impact phase
    of chaotic growth, potentially yield important implications for the final composition and evolution of terrestrial planets.
    These parameters critically depend on the internal balance of heating versus cooling, which is mostly determined by the
    presence of short-lived radionuclides (SLRs), such as ²⁶Al and ⁶⁰Fe, as well as the heat conductivity of the material.
    The heating by SLRs depends on their initial abundances, the formation time of the planetesimal and its size. It has been
    argued that the cooling history is determined by the porosity of the granular material, which undergoes dramatic changes
    via compaction processes and tends to decrease with time. In this study we assess the influence of these parameters on
    the thermo-mechanical evolution of young planetesimals with both 2D and 3D simulations. Using the code family I2ELVIS/I3ELVIS
    we have run numerous 2D and 3D numerical finite-difference fluid dynamic models with varying planetesimal radius, formation
    time and initial porosity. Our results indicate that powdery materials lowered the threshold for melting and convection
    in planetesimals, depending on the amount of SLRs present. A subset of planetesimals retained a powdery surface layer
    which lowered the thermal conductivity and hindered cooling. The effect of initial porosity was small, however, compared
    to those of planetesimal size and formation time, which dominated the thermo-mechanical evolution and were the primary
    factors for the onset of melting and differentiation. We comment on the implications of this work concerning the structure
    and evolution of these planetesimals, as well as their behavior as possible building blocks of terrestrial planets.
  lay_summary: The porous, powdery texture of freshly formed planetesimals acts as thermal insulation, potentially trapping
    radioactive heat and promoting internal melting. We modeled how porosity and radioactive heating interact in 2D and 3D
    simulations and found that while porosity lowers the melting threshold, the size and formation time of a planetesimal
    are far more important in determining whether it differentiates. These results constrain which meteorite parent bodies
    underwent internal melting and how they contributed to terrestrial planet formation.
  lay_summary_draft: The porous, powdery texture of freshly formed planetesimals acts as thermal insulation, potentially trapping
    radioactive heat and promoting internal melting. We modeled how porosity and radioactive heating interact in 2D and 3D
