  title: A roadmap for the atmospheric characterization of terrestrial exoplanets with JWST
  venue_md: '*Nature Astronomy* 8, 810–818 (2024)'
  primary_url: https://scixplorer.org/abs/2024NatAs...8..810T/abstract
  links:
    pdf: https://arxiv.org/pdf/2310.15895.pdf
    scix: https://scixplorer.org/abs/2024NatAs...8..810T/abstract
    doi: https://doi.org/10.1038/s41550-024-02298-5
  bibcode: 2024NatAs...8..810T
  lab_led: false
  abstract: Ultra-cool dwarf stars are abundant, long-lived, and uniquely suited to enable the atmospheric study of transiting
    terrestrial companions with JWST. The most prominent target is the M8.5V star TRAPPIST-1 and its seven rocky planets.
    While JWST Cycle 1 observations have started to yield preliminary insights, the overall interpretation of the data remains
    inconclusive. This paper presents a community roadmap for the atmospheric characterization of the TRAPPIST-1 planets with
    JWST, identifying optimal observing strategies for each planet and outlining the sequence of observations needed to first
    detect atmospheres and then characterize their compositions. A coordinated multi-cycle JWST program can determine whether
    the TRAPPIST-1 planets retain substantial atmospheres and constrain their molecular inventories, providing the first empirical
    census of terrestrial exoplanet atmospheres.
  lay_summary: The TRAPPIST-1 system, with seven rocky planets orbiting an ultra-cool dwarf star, is a prime target for atmospheric
    characterization with JWST. This community paper lays out a systematic observing strategy for studying these planets'
    atmospheres, from initial detection to detailed composition measurements.
  lay_summary_draft: null
