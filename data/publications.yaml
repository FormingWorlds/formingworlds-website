    *The Astrophysical Journal Letters* 938, L3 (2022). [video](https://youtu.be/M2CopK35Jrs), [pdf](https://iopscience.iop.org/article/10.3847/2041-8213/ac9521/pdf)'
- slug: curry-2022-prevalence
  section: research
  subsection: published
  year: 2022
  authors_md: Curry A, A Bonsor, **T Lichtenberg**, O Shorttle
  title: Prevalence of short-lived radioactive isotopes across exoplanetary systems inferred from polluted white dwarfs
  venue_md: '*Monthly Notices of the Royal Astronomical Society* 515, 395–406 (2022)'
  primary_url: https://scixplorer.org/abs/2022MNRAS.515..395C/abstract
  links:
    pdf: https://academic.oup.com/mnras/article-pdf/515/1/395/44926894/stac1709.pdf
    scix: https://scixplorer.org/abs/2022MNRAS.515..395C/abstract
    doi: https://doi.org/10.1093/mnras/stac1709
  bibcode: 2022MNRAS.515..395C
  lab_led: false
  abstract: In the Solar system, short-lived radioisotopes, such as ²⁶Al, played a crucial role during the formation of planetary
    bodies by providing a significant additional source of heat. Notably, this led to early and large-scale melting and iron
    core formation in planetesimals and their loss of volatile elements, such as hydrogen and carbon. In the context of exoplanetary
    systems therefore the prevalence of short-lived radioisotopes is key to interpreting the observed bulk volatile budget
    and atmospheric diversity among low-mass exoplanets. White dwarfs that have accreted planetary material provide a unique
    means to infer the frequency of iron core formation in extrasolar planetesimals, and hence the ubiquity of planetary systems
    forming with high short-lived radioisotope abundances. Here, we devise a quantitative method to infer the fraction of
    planetary systems enriched with short-lived radionuclides upon planetesimal formation from white dwarf data. We argue
    that the current evidence from white dwarfs point towards a significant fraction of exoplanetesimals having formed an
    iron core. Although the data may be explained by the accretion of exomoon or Pluto-sized bodies that were able to differentiate
    due to gravitational potential energy release, our results suggest that the most likely explanation for the prevalence
    of differentiated material among polluted white dwarfs is that the Solar system is not unusual in being enriched in ²⁶Al.
    The models presented here suggest a ubiquitous pathway for the enrichment of exoplanetary systems by short-lived radioisotopes,
    disfavouring short-lived radioisotope enrichment scenarios relying on statistically rare chance encounters with single
    nearby supernovae, Wolf–Rayet, or AGB stars.
  lay_summary: Radioactive aluminium-26 heated early Solar System planetesimals, driving melting and iron core formation.
    By measuring the compositions of rocky debris accreted onto white dwarf stars, this study constrains how common aluminium-26
    enrichment is across exoplanetary systems, finding that the Solar System's level of enrichment may not be unusual.
  lay_summary_draft: null
  _raw: Curry A, A Bonsor, **T Lichtenberg**, O Shorttle. [Prevalence of short-lived radioactive isotopes across exoplanetary
    systems inferred from polluted white dwarfs.](https://scixplorer.org/abs/2022MNRAS.515..395C/abstract) *Monthly Notices
    of the Royal Astronomical Society* 515, 395–406 (2022). [pdf](https://academic.oup.com/mnras/article-pdf/515/1/395/44926894/stac1709.pdf)
- slug: dannert-2022-large
  section: research
  subsection: published
  year: 2022
  authors_md: Dannert F et al. (incl. **T Lichtenberg**)
  title: 'Large Interferometer For Exoplanets (LIFE): II'
  venue_md: '*Astronomy & Astrophysics* 664, A22 (2022)'
  primary_url: https://scixplorer.org/abs/2022A%26A...664A..22D/abstract
  links:
    pdf: https://www.aanda.org/articles/aa/pdf/2022/12/aa43846-22.pdf
    scix: https://scixplorer.org/abs/2022A%26A...664A..22D/abstract
    doi: https://doi.org/10.48550/arxiv.2203.00471
  bibcode: 2022A&A...664A..22D
  lab_led: false
  abstract: The Large Interferometer For Exoplanets (LIFE) initiative is developing the science and a technology roadmap for
    an ambitious space mission featuring a space-based mid-infrared (MIR) nulling interferometer in order to detect the thermal
    emission of hundreds of exoplanets and characterize their atmospheres. In order to quantify the science potential of such
    a mission, in particular in the context of technical trade-offs, an instrument simulator is required. In addition, signal
    extraction algorithms are needed to verify that exoplanet properties (e.g., angular separation, spectral flux) contained
    in simulated exoplanet datasets can be accurately retrieved. We present LIFEsim, a software tool developed for simulating
    observations of exoplanetary systems with an MIR space-based nulling interferometer. It includes astrophysical noise sources
    (i.e., stellar leakage and thermal emission from local zodiacal and exo-zodiacal dust) and offers the flexibility to include
    instrumental noise terms in the future. LIFEsim provides an accessible way for predicting the expected SNR of future observations
    as a function of various key instrument and target parameters. The SNRs of the extracted spectra are photon-noise dominated,
    as expected from our current simulations. From single epoch observations in our mock survey of small (R < 1.5 R_Earth)
    planets orbiting within the habitable zones of their stars, we find that typical uncertainties in the estimated effective
    temperature of the exoplanets are ≲10%, for the exoplanet radius ≲20%, and for the separation from the host star ≲2%.
    SNR values obtained in the signal extraction process deviate less than 10% from purely photon-counting statistics based
    SNRs. (abridged)
  lay_summary: The LIFE space mission concept aims to detect thermal emission from terrestrial exoplanets using mid-infrared
    interferometry. This paper presents LIFEsim, an end-to-end instrument simulator, and validates its signal extraction algorithms,
    showing that exoplanet temperature, radius, and orbital separation can be recovered to accuracies of roughly 10%, 20%,
    and 2%, respectively.
  lay_summary_draft: null
  _raw: 'Dannert F et al. (incl. **T Lichtenberg**). [Large Interferometer For Exoplanets (LIFE): II.](https://scixplorer.org/abs/2022A%26A...664A..22D/abstract)
    *Astronomy & Astrophysics* 664, A22 (2022). [pdf](https://www.aanda.org/articles/aa/pdf/2022/12/aa43846-22.pdf)'
