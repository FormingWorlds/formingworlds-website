    *The Astrophysical Journal* 995, 95 (2025). [pdf](https://iopscience.iop.org/article/10.3847/1538-4357/ae17c8/pdf)
- slug: teske-2025-thick
  section: research
  subsection: published
  year: 2025
  authors_md: Teske JK, NL Wallack, AAA Piette, L Dang, **T Lichtenberg**, M Plotnykov, RT Pierrehumbert, **E Postolec**,
    et al
  title: A Thick Volatile Atmosphere on the Ultra-Hot Super-Earth TOI-561 b
  venue_md: '*The Astrophysical Journal Letters* 995, L39 (2025)'
  primary_url: https://scixplorer.org/abs/arXiv:2509.17231
  links:
    pdf: https://iopscience.iop.org/article/10.3847/2041-8213/ae0a4c/pdf
    scix: https://scixplorer.org/abs/arXiv:2509.17231
    doi: https://doi.org/10.3847/2041-8213/ae0a4c
  bibcode: arXiv:2509.17231
  lab_led: false
  abstract: Ultrashort-period (USP) exoplanets, with R_p ≤ 2 R⊕ and periods ≤1 day, are expected to be stripped of volatile
    atmospheres by intense host star irradiation, which is corroborated by their nominal bulk densities and previous eclipse
    observations consistent with bare rock surfaces. However, a few USP planets appear anomalously under-dense relative to
    an Earth-like composition, suggesting an exotic interior structure (e.g., core-less) or a volatile-rich secondary atmosphere
    increasing their apparent radius. Here we present the first dayside emission spectrum of the low-density (4.3±0.4 g cm⁻³)
    USP planet TOI-561 b, which orbits an iron-poor, alpha-rich, 10 Gyr old thick disk star. Our 3-5 μm JWST/NIRSpec observations
    demonstrate the dayside of TOI-561 b is inconsistent with a bare-rock surface at high statistical significance, suggesting
    instead a thick volatile envelope that is cooling the dayside to well below the 3000 K expected in the bare-rock or thin-atmosphere
    case. These results reject the popular hypothesis of complete atmospheric desiccation for highly irradiated exoplanets
    and support predictions that planetary-scale magma oceans can retain substantial reservoirs of volatiles, opening the
    geophysical study of ultrahot super-Earths through the lenses of their atmospheres.
  lay_summary: Ultra-short-period rocky planets orbiting extremely close to their stars are expected to be stripped of any
    atmosphere. New JWST observations of super-Earth TOI-561 b challenge this picture by revealing evidence for a thick volatile
    atmosphere, suggesting some close-in rocky worlds can retain or regenerate atmospheric gases.
  lay_summary_draft: null
