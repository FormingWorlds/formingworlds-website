  year: 2022
  authors_md: Helled R et al. (incl. **T Lichtenberg**)
  title: Ariel Planetary Interiors White Paper
  venue_md: '*Experimental Astronomy* 53, 323-356 (2022)'
  primary_url: https://scixplorer.org/abs/2022ExA....53..323H/abstract
  links:
    pdf: https://link.springer.com/content/pdf/10.1007/s10686-021-09739-3.pdf
    scix: https://scixplorer.org/abs/2022ExA....53..323H/abstract
    doi: https://doi.org/10.17863/cam.85203
  bibcode: 2022ExA....53..323H
  lab_led: false
  abstract: The recently adopted Ariel ESA mission will measure the atmospheric composition of a large number of exoplanets.
    This information will then be used to better constrain planetary bulk compositions. While the connection between the composition
    of a planetary atmosphere and the bulk interior is still being investigated, the combination of the atmospheric composition
    with the measured mass and radius of exoplanets will push the field of exoplanet characterisation to the next level, and
    provide new insights of the nature of planets in our galaxy. In this white paper, we outline the ongoing activities of
    the interior working group of the Ariel mission, and list the desirable theoretical developments as well as the challenges
    in linking planetary atmospheres, bulk composition and interior structure.
  lay_summary: ESA's Ariel mission will survey the atmospheres of hundreds of exoplanets, providing composition data that
    constrains their interiors. This white paper outlines how Ariel's atmospheric measurements can be used to infer planetary
    interior structures, compositions, and formation histories, connecting atmospheric chemistry to bulk properties.
  lay_summary_draft: null
