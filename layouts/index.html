{{ define "main" }}

<!-- Full-viewport slideshow -->
<section id="slideshow" class="relative w-full h-screen overflow-hidden">

  <!-- Slides -->
  {{ range $i, $slide := .Site.Data.slides }}
  <div class="slide absolute inset-0 transition-opacity duration-1000 ease-in-out {{ if eq $i 0 }}opacity-100 z-10{{ else }}opacity-0 z-0{{ end }}"
       style="background-image: url('{{ $slide.image }}'); background-size: cover; background-position: center;">
    <!-- Dark gradient overlay -->
    <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/30 to-transparent"></div>
    <!-- Question text -->
    <div class="absolute inset-0 flex items-end justify-center pb-32 px-8">
      <p class="text-4xl md:text-6xl lg:text-7xl text-white text-center max-w-5xl leading-tight">
        {{ $slide.question }}
      </p>
    </div>
  </div>
  {{ end }}

  <!-- Left arrow -->
  <button onclick="prevSlide()" aria-label="Previous slide"
          class="absolute left-6 md:left-10 top-1/2 -translate-y-1/2 z-20 text-white/60 hover:text-white text-4xl md:text-5xl transition-colors cursor-pointer select-none">
    ‹
  </button>

  <!-- Right arrow -->
  <button onclick="nextSlide()" aria-label="Next slide"
          class="absolute right-6 md:right-10 top-1/2 -translate-y-1/2 z-20 text-white/60 hover:text-white text-4xl md:text-5xl transition-colors cursor-pointer select-none">
    ›
  </button>

</section>

<script>
(function() {
  const slides = document.querySelectorAll('.slide');
  const slideshow = document.getElementById('slideshow');
  let current = 0;
  let interval = null;

  function goToSlide(n) {
    slides[current].classList.remove('opacity-100', 'z-10');
    slides[current].classList.add('opacity-0', 'z-0');

    current = (n + slides.length) % slides.length;

    slides[current].classList.remove('opacity-0', 'z-0');
    slides[current].classList.add('opacity-100', 'z-10');
  }

  function nextSlide() {
    goToSlide(current + 1);
  }

  function prevSlide() {
    goToSlide(current - 1);
  }

  function startAutoAdvance() {
    interval = setInterval(nextSlide, 6000);
  }

  function stopAutoAdvance() {
    clearInterval(interval);
  }

  startAutoAdvance();

  slideshow.addEventListener('mouseenter', stopAutoAdvance);
  slideshow.addEventListener('mouseleave', startAutoAdvance);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') prevSlide();
    if (e.key === 'ArrowRight') nextSlide();
  });

  // Expose to global scope for inline onclick handlers
  window.goToSlide = goToSlide;
  window.nextSlide = nextSlide;
  window.prevSlide = prevSlide;
})();
</script>

{{ end }}
