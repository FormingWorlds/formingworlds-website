{{ define "main" }}
{{ if .Params.banner_image }}
<!-- Hero banner -->
<div class="relative h-[50vh] min-h-[300px]">
  <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('{{ .Params.banner_image | relURL }}')"></div>
  <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/40 to-transparent"></div>
  <div class="absolute bottom-0 left-0 right-0 container-site pb-10">
    <h1 class="text-4xl md:text-5xl font-bold text-white">{{ .Title }}</h1>
  </div>
</div>
<section class="py-12">
  <div class="container-site max-w-3xl">
{{ else }}
<section class="pt-24 pb-16">
  <div class="container-site max-w-3xl">
    <h1 class="section-heading mb-8">{{ .Title }}</h1>
{{ end }}

    {{ with .Content }}
    <div class="prose-content mb-12">
      {{ . }}
    </div>
    {{ end }}

    {{ $pages := .Pages }}
    {{ if $pages }}
    <div class="space-y-6">
      {{ range $pages }}
      <a href="{{ .RelPermalink }}" class="block card-padded">
        <h2 class="text-xl font-bold text-white">{{ .Title }}</h2>
        {{ with .Params.description }}
        <p class="text-slate-400 mt-2 text-sm">{{ . }}</p>
        {{ end }}
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
