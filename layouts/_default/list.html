{{ define "main" }}
{{ if .Params.banner_image }}
<!-- Hero banner -->
<div class="relative" style="height: 480px; min-height: 360px;">
  <img src="{{ .Params.banner_image | relURL }}" alt="{{ .Title }}" class="absolute inset-0 w-full h-full object-cover object-center">
  <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(8,10,18,.4) 0%, rgba(8,10,18,.05) 50%, rgba(8,10,18,.95));"></div>
  <div class="absolute bottom-0 left-0 right-0 container-site pb-12">
    <h1 class="section-heading">{{ .Title }}</h1>
  </div>
</div>
<section class="py-16">
  <div class="container-site max-w-3xl">
{{ else }}
<section style="padding-top: 6rem; padding-bottom: 4rem;">
  <div class="container-site max-w-3xl">
    <h1 class="section-heading mb-10">{{ .Title }}</h1>
{{ end }}

    {{ with .Content }}
    <div class="prose-content mb-12">
      {{ . }}
    </div>
    {{ end }}

    {{ $pages := .Pages }}
    {{ if $pages }}
    <div class="space-y-4">
      {{ range $pages }}
      <a href="{{ .RelPermalink }}" class="block py-5 border-t border-ink-800 hover:border-ink-700 transition-colors">
        <h2 class="text-xl text-ink-100 font-medium">{{ .Title }}</h2>
        {{ with .Params.description }}
        <p class="text-ink-400 mt-2 text-sm">{{ . }}</p>
        {{ end }}
      </a>
      {{ end }}
    </div>
    {{ end }}
  </div>
</section>
{{ end }}
