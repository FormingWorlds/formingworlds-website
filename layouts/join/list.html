{{ define "main" }}
<section style="padding-top: 10rem; padding-bottom: 4rem;">
  <div class="container-site">
    <div class="text-center mb-14">
      <h1 class="section-heading text-4xl md:text-5xl">Join the Lab</h1>
    </div>

    {{ with .Content }}
    <div class="prose-content max-w-3xl mx-auto mb-12">
      {{ . }}
    </div>
    {{ end }}

    <!-- Image cards — image above, title below (matching Wix) -->
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 mb-16 max-w-4xl mx-auto">
      <!-- PhD Positions -->
      <a href="{{ "join/phd-positions/" | relURL }}" class="group block">
        <div class="h-56 rounded-xl overflow-hidden mb-3">
          <picture>
            <source srcset="{{ "img/groningen/groningen_skyline.avif" | relURL }}" type="image/avif">
            <img src="{{ "img/groningen/groningen_skyline.webp" | relURL }}" alt="Groningen skyline" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
          </picture>
        </div>
        <h3 class="text-white text-lg font-bold">PhD Positions</h3>
      </a>
      <!-- Postdoc Positions -->
      <a href="{{ "join/postdoc-positions/" | relURL }}" class="group block">
        <div class="h-56 rounded-xl overflow-hidden mb-3">
          <picture>
            <source srcset="{{ "img/groningen/groningen_forum.avif" | relURL }}" type="image/avif">
            <img src="{{ "img/groningen/groningen_forum.webp" | relURL }}" alt="Forum Groningen" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
          </picture>
        </div>
        <h3 class="text-white text-lg font-bold">Postdoc Positions</h3>
      </a>
      <!-- BSc & MSc Projects -->
      <a href="{{ "join/student-projects/" | relURL }}" class="group block">
        <div class="h-56 rounded-xl overflow-hidden mb-3">
          <picture>
            <source srcset="{{ "img/groningen/groningen_martinitowerpeak.avif" | relURL }}" type="image/avif">
            <img src="{{ "img/groningen/groningen_martinitowerpeak.webp" | relURL }}" alt="Martinitower" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
          </picture>
        </div>
        <h3 class="text-white text-lg font-bold">BSc & MSc Projects</h3>
      </a>
      <!-- Kapteyn & Groningen -->
      <a href="{{ "kapteyn-groningen/" | relURL }}" class="group block">
        <div class="h-56 rounded-xl overflow-hidden mb-3">
          <picture>
            <source srcset="{{ "img/groningen/groningen_martinitower.avif" | relURL }}" type="image/avif">
            <img src="{{ "img/groningen/groningen_martinitower.webp" | relURL }}" alt="Groningen Martinitower" class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105">
          </picture>
        </div>
        <h3 class="text-white text-lg font-bold">Kapteyn & Groningen</h3>
      </a>
    </div>

  </div>
</section>
{{ end }}
