{{ define "main" }}
<section style="padding-top: 10rem; padding-bottom: 4rem;">
  <div class="container-site">
    <div class="text-center mb-14">
      <h1 class="section-heading text-4xl md:text-5xl">Join the Lab</h1>
    </div>

    {{ with .Content }}
    <div class="prose-content max-w-3xl mx-auto mb-12">
      {{ . }}
    </div>
    {{ end }}

    <!-- Image cards -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-16">
      <!-- PhD Positions -->
      <a href="{{ "join/phd-positions/" | relURL }}" class="group relative block h-72 rounded-xl overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-300 group-hover:scale-105" style="background-image: url('{{ "img/illustrations/kapteyn-building.avif" | relURL }}')"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-5">
          <h3 class="text-white text-xl font-bold">PhD Positions</h3>
        </div>
      </a>
      <!-- Postdoc Positions -->
      <a href="{{ "join/postdoc-positions/" | relURL }}" class="group relative block h-72 rounded-xl overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-300 group-hover:scale-105" style="background-image: url('{{ "img/illustrations/hero-bg.avif" | relURL }}')"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-5">
          <h3 class="text-white text-xl font-bold">Postdoc Positions</h3>
        </div>
      </a>
      <!-- BSc & MSc Projects -->
      <a href="{{ "join/student-projects/" | relURL }}" class="group relative block h-72 rounded-xl overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-300 group-hover:scale-105" style="background-image: url('{{ "img/illustrations/groningen-skyline.avif" | relURL }}')"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-5">
          <h3 class="text-white text-xl font-bold">BSc & MSc Projects</h3>
        </div>
      </a>
      <!-- Kapteyn & Groningen -->
      <a href="{{ "kapteyn-groningen/" | relURL }}" class="group relative block h-72 rounded-xl overflow-hidden">
        <div class="absolute inset-0 bg-cover bg-center transition-transform duration-300 group-hover:scale-105" style="background-image: url('{{ "img/illustrations/group-photo.avif" | relURL }}')"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-navy-950/90 via-navy-950/20 to-transparent"></div>
        <div class="absolute bottom-0 left-0 right-0 p-5">
          <h3 class="text-white text-xl font-bold">Kapteyn & Groningen</h3>
        </div>
      </a>
    </div>

    <!-- Groningen Impressions -->
    <div class="mt-8 mb-8">
      <h2 class="text-3xl font-bold text-white mb-8 text-center">Groningen Impressions</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <img src="{{ "img/illustrations/groningen-skyline.avif" | relURL }}" alt="Groningen skyline" class="w-full h-64 object-cover rounded-xl">
        <img src="{{ "img/illustrations/kapteyn-building.avif" | relURL }}" alt="Kapteyn building" class="w-full h-64 object-cover rounded-xl">
        <img src="{{ "img/illustrations/hero-bg.avif" | relURL }}" alt="Groningen" class="w-full h-64 object-cover rounded-xl">
      </div>
    </div>
  </div>
</section>
{{ end }}
