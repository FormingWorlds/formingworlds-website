{{ define "main" }}

<!-- ── HEADER ────────────────────────────────────────────────────── -->
<section style="padding-top: 6rem; padding-bottom: 3.5rem; border-bottom: 1px solid var(--color-ink-800);">
  <div class="container-site">
    <h1 class="section-heading">Join the lab.</h1>

    {{ with .Content }}
    <div class="prose-content mt-6" style="max-width: calc(var(--container-max) * 2 / 3);">
      {{ . }}
    </div>
    {{ end }}
  </div>
</section>

<!-- ── POSITION CARDS ───────────────────────────────────────────── -->
<section style="padding: 4rem 0 3rem;">
  <div class="container-site">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

      <a href="{{ "join/phd-positions/" | relURL }}" class="block card-img-hover relative overflow-hidden" style="aspect-ratio: 16/10; background: #000;">
        <img src="{{ "img/groningen/groningen_skyline.webp" | relURL }}" alt="PhD Positions" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(8,10,18,.1) 50%, rgba(8,10,18,.85));"></div>
        <div class="absolute left-5 right-5 bottom-5">
          <h3 class="text-white" style="font-family: var(--font-display); font-size: 1.625rem; letter-spacing: -0.015em; font-weight: 500;">PhD positions</h3>
        </div>
      </a>

      <a href="{{ "join/postdoc-positions/" | relURL }}" class="block card-img-hover relative overflow-hidden" style="aspect-ratio: 16/10; background: #000;">
        <img src="{{ "img/groningen/groningen_forum.webp" | relURL }}" alt="Postdoc Positions" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(8,10,18,.1) 50%, rgba(8,10,18,.85));"></div>
        <div class="absolute left-5 right-5 bottom-5">
          <h3 class="text-white" style="font-family: var(--font-display); font-size: 1.625rem; letter-spacing: -0.015em; font-weight: 500;">Postdoctoral positions</h3>
        </div>
      </a>

      <a href="{{ "join/student-projects/" | relURL }}" class="block card-img-hover relative overflow-hidden" style="aspect-ratio: 16/10; background: #000;">
        <img src="{{ "img/groningen/groningen_market.webp" | relURL }}" alt="BSc and MSc Projects" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(8,10,18,.1) 50%, rgba(8,10,18,.85));"></div>
        <div class="absolute left-5 right-5 bottom-5">
          <h3 class="text-white" style="font-family: var(--font-display); font-size: 1.625rem; letter-spacing: -0.015em; font-weight: 500;">BSc &amp; MSc projects</h3>
        </div>
      </a>

      <a href="{{ "kapteyn-groningen/" | relURL }}" class="block card-img-hover relative overflow-hidden" style="aspect-ratio: 16/10; background: #000;">
        <img src="{{ "img/groningen/groningen_martinitower.webp" | relURL }}" alt="Kapteyn and Groningen" class="absolute inset-0 w-full h-full object-cover">
        <div class="absolute inset-0" style="background: linear-gradient(180deg, rgba(8,10,18,.1) 50%, rgba(8,10,18,.85));"></div>
        <div class="absolute left-5 right-5 bottom-5">
          <h3 class="text-white" style="font-family: var(--font-display); font-size: 1.625rem; letter-spacing: -0.015em; font-weight: 500;">Kapteyn &amp; Groningen</h3>
        </div>
      </a>
    </div>
  </div>
</section>

{{ end }}
