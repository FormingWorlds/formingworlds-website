{{ define "main" }}
<article class="py-16">
  <div class="container-site max-w-3xl">
    <!-- Breadcrumb -->
    <nav class="text-sm text-slate-500 mb-6">
      <a href="{{ "join/" | relURL }}" class="hover:text-sky-600">Join</a>
      <span class="mx-2">/</span>
      <span class="text-slate-700">{{ .Title }}</span>
    </nav>

    <h1 class="section-heading mb-4">{{ .Title }}</h1>

    {{ with .Params.deadline }}
    <div class="bg-accent-500/10 border border-accent-500/30 rounded-lg px-4 py-3 mb-8">
      <p class="text-accent-600 font-medium text-sm">Application deadline: {{ . }}</p>
    </div>
    {{ end }}

    {{ with .Params.status }}
    {{ if eq . "closed" }}
    <div class="bg-slate-100 border border-slate-300 rounded-lg px-4 py-3 mb-8">
      <p class="text-slate-600 font-medium text-sm">This position is no longer accepting applications.</p>
    </div>
    {{ end }}
    {{ end }}

    <div class="prose-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
