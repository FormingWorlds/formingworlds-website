<header class="bg-navy-900 sticky top-0 z-50 shadow-lg">
  <nav class="container-site flex items-center justify-between h-16">
    <!-- Logo -->
    <a href="{{ "/" | relURL }}" class="flex items-center gap-3">
      <img src="{{ "img/brand/logo-white.svg" | relURL }}" alt="Forming Worlds" class="h-8">
      <span class="text-white font-bold text-lg tracking-tight hidden sm:inline">Forming Worlds</span>
    </a>

    <!-- Desktop nav -->
    <ul class="hidden md:flex items-center gap-8">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}"
           class="nav-link{{ if $.IsMenuCurrent "main" . }} nav-link-active{{ end }}">
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>

    <!-- Mobile hamburger -->
    <button id="mobile-menu-btn" class="md:hidden text-white p-2" aria-label="Menu">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path id="hamburger-icon" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
        <path id="close-icon" class="hidden" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
  </nav>

  <!-- Mobile menu -->
  <div id="mobile-menu" class="hidden md:hidden bg-navy-800 border-t border-navy-700">
    <ul class="container-site py-4 space-y-3">
      {{ range .Site.Menus.main }}
      <li>
        <a href="{{ .URL | relURL }}"
           class="block text-slate-200 hover:text-white py-2 text-sm font-medium tracking-wide uppercase">
          {{ .Name }}
        </a>
      </li>
      {{ end }}
    </ul>
  </div>
</header>

<script>
  const btn = document.getElementById('mobile-menu-btn');
  const menu = document.getElementById('mobile-menu');
  const hamburger = document.getElementById('hamburger-icon');
  const closeIcon = document.getElementById('close-icon');
  btn.addEventListener('click', () => {
    menu.classList.toggle('hidden');
    hamburger.classList.toggle('hidden');
    closeIcon.classList.toggle('hidden');
  });
</script>
