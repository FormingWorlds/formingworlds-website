{{ define "main" }}
<section style="padding-top: 10rem; padding-bottom: 4rem;">
  <div class="container-site">
    <h1 class="section-heading text-4xl md:text-5xl mb-12 text-center">Contact</h1>

    <div class="max-w-5xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-12">
      <!-- Left column: info -->
      <div class="space-y-8">
        <!-- Address -->
        <div class="flex items-start gap-4">
          <svg class="w-6 h-6 text-slate-400 mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <div>
            <h3 class="text-white font-semibold mb-1">Address</h3>
            <p class="text-slate-300 text-sm leading-relaxed">
              Kapteyn Astronomical Institute,<br>
              Landleven 12, 9747 AD<br>
              Groningen, The Netherlands
            </p>
          </div>
        </div>

        <!-- Email -->
        <div class="flex items-start gap-4">
          <svg class="w-6 h-6 text-slate-400 mt-1 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <div>
            <h3 class="text-white font-semibold mb-1">Email</h3>
            <p class="text-sm">
              <a href="mailto:{{ .Site.Params.email }}" class="text-sky-400 hover:text-sky-300">{{ .Site.Params.email }}</a><br>
              <a href="mailto:{{ .Site.Params.email2 }}" class="text-sky-400 hover:text-sky-300">{{ .Site.Params.email2 }}</a>
            </p>
          </div>
        </div>

        <!-- UG Logo -->
        <div class="mt-4">
          <img src="{{ "img/brand/rug-white.avif" | relURL }}" alt="University of Groningen" class="h-20 opacity-80">
        </div>
      </div>

      <!-- Right column: form -->
      <div>
        <form action="https://formspree.io/f/{{ .Site.Params.formspree.formId }}" method="POST" class="space-y-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="first-name" class="form-label">First Name</label>
              <input type="text" id="first-name" name="first_name" class="form-input">
            </div>
            <div>
              <label for="last-name" class="form-label">Last Name</label>
              <input type="text" id="last-name" name="last_name" class="form-input">
            </div>
          </div>
          <div>
            <label for="email" class="form-label">Email *</label>
            <input type="email" id="email" name="_replyto" required class="form-input">
          </div>
          <div>
            <label for="message" class="form-label">Message</label>
            <textarea id="message" name="message" rows="5" required class="form-input"></textarea>
          </div>
          <button type="submit" class="bg-sky-600 hover:bg-sky-500 text-white font-medium px-8 py-3 rounded-lg transition-colors w-full text-center">Send</button>
        </form>
      </div>
    </div>

  </div>
</section>
{{ end }}
